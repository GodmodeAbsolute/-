<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism Social UI</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 1100px;
            height: 85vh;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            border-right: 1px solid var(--glass-border);
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 12px;
        }

        .logo i { color: var(--accent); }

        .nav-menu {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nav-item {
            padding: 12px 16px;
            border-radius: 12px;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
        }

        .nav-item.active {
            border-left: 4px solid var(--accent);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 20px 30px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .search-bar {
            position: relative;
            width: 300px;
        }

        .search-bar input {
            width: 100%;
            padding: 10px 16px 10px 40px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            color: #fff;
            outline: none;
        }

        .search-bar i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--accent), #818cf8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* Content Views */
        .content-area {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .view-section {
            display: none;
        }

        .view-section.active {
            display: block;
        }

        /* Profile View */
        .profile-card {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(45deg, #ec4899, var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
        }

        .stats-container {
            display: flex;
            gap: 24px;
            margin-top: 12px;
        }

        .stat-box {
            text-align: center;
        }

        .stat-number {
            font-size: 1.25rem;
            font-weight: bold;
            color: #fff;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* Create Post Form */
        .create-post-box {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .create-post-box textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: #fff;
            resize: none;
            outline: none;
            height: 60px;
        }

        .btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            align-self: flex-end;
            transition: background 0.2s;
        }

        .btn:hover { background: var(--accent-hover); }

        /* Feed & Posts */
        .posts-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .post-card {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .post-time {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Messenger Area */
        .chat-container {
            display: flex;
            height: 100%;
            border-radius: 16px;
            overflow: hidden;
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--glass-border);
        }

        .chat-list {
            width: 280px;
            border-right: 1px solid var(--glass-border);
            overflow-y: auto;
        }

        .chat-item {
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .chat-item:hover, .chat-item.active {
            background: rgba(255, 255, 255, 0.05);
        }

        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .messages-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 60%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 0.9rem;
        }

        .message.incoming {
            background: rgba(255, 255, 255, 0.1);
            align-self: flex-start;
        }

        .message.outgoing {
            background: var(--accent);
            align-self: flex-end;
        }

        .chat-input-area {
            padding: 16px;
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 12px;
        }

        .chat-input-area input {
            flex: 1;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 8px 12px;
            color: #fff;
            outline: none;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: #1e293b;
            border: 1px solid var(--glass-border);
            padding: 24px;
            border-radius: 16px;
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .friends-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .friend-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(15, 23, 42, 0.4);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo">
            <i class="fa-solid fa-cube"></i>
            <span>GlassSocial</span>
        </div>
        <ul class="nav-menu">
            <li class="nav-item active" onclick="switchTab('profile')">
                <i class="fa-solid fa-user"></i> Профиль
            </li>
            <li class="nav-item" onclick="switchTab('feed')">
                <i class="fa-solid fa-newspaper"></i> Лента
            </li>
            <li class="nav-item" onclick="switchTab('messages')">
                <i class="fa-solid fa-message"></i> Сообщения
            </li>
            <li class="nav-item" onclick="switchTab('friends')">
                <i class="fa-solid fa-users"></i> Друзья
            </li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="header">
            <div class="search-bar">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="Поиск..." oninput="handleSearch()">
            </div>
            <div class="user-profile">
                <div class="avatar">AG</div>
                <span>Absolute Godmode</span>
            </div>
        </div>

        <div class="content-area">
            <!-- Profile View -->
            <div id="view-profile" class="view-section active">
                <div class="profile-card">
                    <div class="profile-header">
                        <div class="profile-avatar">AG</div>
                        <div>
                            <h2>Absolute Godmode</h2>
                            <p style="color: var(--text-muted);">@absolute_godmode</p>
                            <div class="stats-container">
                                <div class="stat-box">
                                    <div class="stat-number" id="stat-posts">0</div>
                                    <div class="stat-label">Постов</div>
                                </div>
                                <div class="stat-box">
                                    <div class="stat-number" id="stat-friends">0</div>
                                    <div class="stat-label">Друзей</div>
                                </div>
                                <div class="stat-box">
                                    <div class="stat-number" id="stat-subscribers">0</div>
                                    <div class="stat-label">Подписчиков</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="create-post-box">
                    <textarea id="postInput" placeholder="Что у вас нового?"></textarea>
                    <button class="btn" onclick="createPost()"><i class="fa-solid fa-paper-plane"></i> Опубликовать</button>
                </div>

                <h3>Мои публикации</h3>
                <br>
                <div id="myPostsList" class="posts-list"></div>
            </div>

            <!-- Feed View -->
            <div id="view-feed" class="view-section">
                <h3>Общая лента</h3>
                <br>
                <div id="globalFeedList" class="posts-list"></div>
            </div>

            <!-- Messages View -->
            <div id="view-messages" class="view-section" style="height: 100%;">
                <div class="chat-container">
                    <div class="chat-list" id="chatList"></div>
                    <div class="chat-main">
                        <div class="messages-area" id="messagesArea">
                            <p style="text-align: center; color: var(--text-muted); margin-top: 20px;">Выберите чат для начала общения</p>
                        </div>
                        <div class="chat-input-area">
                            <input type="text" id="messageInput" placeholder="Напишите сообщение...">
                            <button class="btn" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Friends View -->
            <div id="view-friends" class="view-section">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h3>Список друзей</h3>
                    <button class="btn" onclick="openAddMemberSubModal()"><i class="fa-solid fa-user-plus"></i> Добавить участника</button>
                </div>
                <div class="friends-list" id="friendsList"></div>
            </div>
        </div>
    </div>
</div>

<!-- Modal for adding members -->
<div class="modal-overlay" id="addMemberModal">
    <div class="modal">
        <h3>Добавить участника</h3>
        <input type="text" id="newFriendName" placeholder="Имя пользователя..." style="padding: 8px; border-radius: 6px; border: 1px solid var(--glass-border); background: #0f172a; color: #fff;">
        <div style="display: flex; gap: 8px; justify-content: flex-end;">
            <button class="btn" style="background: #475569;" onclick="closeModal()">Отмена</button>
            <button class="btn" onclick="addFriend()">Добавить</button>
        </div>
    </div>
</div>

<script>
    // Initial State & Storage Management
    const defaultData = {
        posts: [],
        friends: [
            { id: 1, name: 'Alex', handle: '@alex_dev', isSubscriber: true },
            { id: 2, name: 'Elena', handle: '@elena_design', isSubscriber: false }
        ],
        messages: {
            1: [{ sender: 'Alex', text: 'Привет! Как успехи с проектом?' }],
            2: [{ sender: 'Elena', text: 'Новый стек выглядит отлично!' }]
        }
    };

    let appState = JSON.parse(localStorage.getItem('glass_social_state')) || defaultData;
    let currentChatId = null;

    function saveData() {
        localStorage.setItem('glass_social_state', JSON.stringify(appState));
        updateStats();
    }

    // Tab Navigation
    function switchTab(tabName) {
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));

        event.currentTarget.classList.add('active');
        document.getElementById(`view-${tabName}`).classList.add('active');

        if (tabName === 'friends') renderFriends();
        if (tabName === 'messages') renderChatList();
        if (tabName === 'feed') renderFeed();
    }

    // Stats Calculation
    function updateStats() {
        document.getElementById('stat-posts').innerText = appState.posts.length;
        document.getElementById('stat-friends').innerText = appState.friends.length;
        
        // Count actual subscribers
        const subCount = appState.friends.filter(f => f.isSubscriber).length;
        document.getElementById('stat-subscribers').innerText = subCount;
    }

    // Posts Functionality
    function createPost() {
        const input = document.getElementById('postInput');
        if (!input.value.trim()) return;

        const newPost = {
            id: Date.now(),
            author: 'Absolute Godmode',
            handle: '@absolute_godmode',
            content: input.value,
            date: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        };

        appState.posts.unshift(newPost);
        input.value = '';
        saveData();
        renderPosts();
    }

    function renderPosts() {
        const myPostsContainer = document.getElementById('myPostsList');
        myPostsContainer.innerHTML = appState.posts.map(post => `
            <div class="post-card">
                <div class="post-header">
                    <div class="avatar">AG</div>
                    <div>
                        <strong>${post.author}</strong> <span class="post-time">${post.date}</span>
                    </div>
                </div>
                <p>${post.content}</p>
            </div>
        `).join('');
    }

    function renderFeed() {
        const feedContainer = document.getElementById('globalFeedList');
        if (appState.posts.length === 0) {
            feedContainer.innerHTML = '<p style="color: var(--text-muted);">Публикаций пока нет.</p>';
            return;
        }
        feedContainer.innerHTML = appState.posts.map(post => `
            <div class="post-card">
                <div class="post-header">
                    <div class="avatar">${post.author.slice(0, 2).toUpperCase()}</div>
                    <div>
                        <strong>${post.author}</strong> <span class="post-time">${post.date}</span>
                    </div>
                </div>
                <p>${post.content}</p>
            </div>
        `).join('');
    }

    // Friends Functionality
    function renderFriends(filter = '') {
        const list = document.getElementById('friendsList');
        const filtered = appState.friends.filter(f => f.name.toLowerCase().includes(filter.toLowerCase()));
        
        list.innerHTML = filtered.map(f => `
            <div class="friend-item">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <div class="avatar">${f.name.slice(0, 2).toUpperCase()}</div>
                    <div>
                        <strong>${f.name}</strong>
                        <p style="font-size: 0.8rem; color: var(--text-muted);">${f.handle}</p>
                    </div>
                </div>
                <button class="btn" onclick="openChat(${f.id})"><i class="fa-solid fa-comment"></i> Написать</button>
            </div>
        `).join('');
    }

    function openAddMemberSubModal() {
        document.getElementById('addMemberModal').classList.add('active');
    }

    function closeModal() {
        document.getElementById('addMemberModal').classList.remove('active');
    }

    function addFriend() {
        const input = document.getElementById('newFriendName');
        if (!input.value.trim()) return;

        const newFriend = {
            id: Date.now(),
            name: input.value,
            handle: `@${input.value.toLowerCase().replace(/\s+/g, '_')}`,
            isSubscriber: Math.random() < 0.5
        };

        appState.friends.push(newFriend);
        appState.messages[newFriend.id] = [];
        input.value = '';
        closeModal();
        saveData();
        renderFriends();
    }

    // Messenger System
    function renderChatList() {
        const container = document.getElementById('chatList');
        container.innerHTML = appState.friends.map(f => `
            <div class="chat-item ${currentChatId === f.id ? 'active' : ''}" onclick="selectChat(${f.id})">
                <div class="avatar">${f.name.slice(0, 2).toUpperCase()}</div>
                <div>
                    <strong>${f.name}</strong>
                </div>
            </div>
        `).join('');
    }

    function selectChat(friendId) {
        currentChatId = friendId;
        renderChatList();
        renderMessages();
    }

    function renderMessages() {
        const area = document.getElementById('messagesArea');
        if (!currentChatId) return;

        const msgs = appState.messages[currentChatId] || [];
        area.innerHTML = msgs.map(m => `
            <div class="message ${m.sender === 'me' ? 'outgoing' : 'incoming'}">
                ${m.text}
            </div>
        `).join('');
        area.scrollTop = area.scrollHeight;
    }

    function sendMessage() {
        const input = document.getElementById('messageInput');
        if (!input.value.trim() || !currentChatId) return;

        if (!appState.messages[currentChatId]) {
            appState.messages[currentChatId] = [];
        }

        appState.messages[currentChatId].push({
            sender: 'me',
            text: input.value
        });

        input.value = '';
        saveData();
        renderMessages();
    }

    function openChat(friendId) {
        switchTab('messages');
        selectChat(friendId);
    }

    // Global Search
    function handleSearch() {
        const query = document.getElementById('searchInput').value;
        renderFriends(query);
    }

    // App Initialization
    updateStats();
    renderPosts();
</script>
</body>
</html>
