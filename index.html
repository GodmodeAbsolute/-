<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Godmode</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💠</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --bg: #f4f6f9; 
            --surface: #ffffff; 
            --surface2: #f1f3f5; 
            --primary: #6366f1; 
            --primary-hover: #4f46e5;
            --primary-soft: #eef2ff; 
            --text: #0f172a; 
            --text-secondary: #64748b; 
            --text-tertiary: #94a3b8; 
            --border: #e2e8f0; 
            --danger: #ef4444; 
            --success: #10b981; 
            --radius-sm: 12px; 
            --radius: 18px; 
            --radius-lg: 24px; 
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.02); 
            --shadow: 0 4px 12px rgba(0,0,0,0.04); 
            --shadow-lg: 0 12px 32px rgba(0,0,0,0.08); 
        }
        .dark { 
            --bg: #090a0f; 
            --surface: #141620; 
            --surface2: #1b1e2b; 
            --primary: #818cf8; 
            --primary-hover: #6366f1;
            --primary-soft: #1e1b4b; 
            --text: #f8fafc; 
            --text-secondary: #94a3b8; 
            --text-tertiary: #64748b; 
            --border: #262b3d; 
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.2); 
            --shadow: 0 4px 12px rgba(0,0,0,0.3); 
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,sans-serif; background:var(--bg); color:var(--text); display:flex; justify-content:center; min-height:100vh; min-height:100dvh; -webkit-tap-highlight-color:transparent; -webkit-font-smoothing:antialiased; transition:background 0.25s ease, color 0.25s ease; }
        .app { width:100%; max-width:480px; min-height:100vh; background:var(--bg); display:flex; flex-direction:column; position:relative; box-shadow: 0 0 40px rgba(0,0,0,0.05); }
        .screen-center { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:28px; gap:16px; }
        .logo-icon { width:88px; height:88px; border-radius:26px; background:linear-gradient(135deg,#6366f1,#8b5cf6); display:flex; align-items:center; justify-content:center; box-shadow:0 12px 28px rgba(99,102,241,0.3); font-size:2.75rem; transform:translateZ(0); }
        .logo-text { font-size:2.25rem; font-weight:800; background:linear-gradient(135deg,#6366f1,#8b5cf6); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; letter-spacing:-0.5px; }
        input,textarea { width:100%; padding:14px 18px; border-radius:var(--radius); border:1.5px solid var(--border); font-size:0.95rem; background:var(--surface); color:var(--text); font-family:inherit; outline:none; transition:all 0.2s ease; }
        input:focus,textarea:focus { border-color:var(--primary); box-shadow:0 0 0 4px rgba(99,102,241,0.12); background:var(--surface); }
        button { padding:14px 20px; border-radius:var(--radius); background:var(--primary); color:#fff; font-weight:600; font-size:0.95rem; border:none; cursor:pointer; display:inline-flex; align-items:center; gap:8px; justify-content:center; font-family:inherit; -webkit-tap-highlight-color:transparent; touch-action:manipulation; min-height:52px; transition:all 0.2s cubic-bezier(0.16, 1, 0.3, 1); box-shadow:0 4px 12px rgba(99,102,241,0.2); }
        button:active { transform:scale(0.97); opacity:0.9; }
        button.secondary { background:var(--surface2); color:var(--text); border:1.5px solid var(--border); box-shadow:none; }
        button.ghost { background:transparent; color:var(--primary); padding:8px; min-height:auto; box-shadow:none; }
        button.danger { background:var(--danger); box-shadow:0 4px 12px rgba(239,68,68,0.2); } 
        button.success { background:var(--success); box-shadow:0 4px 12px rgba(16,185,129,0.2); }
        button.small { padding:10px 16px; font-size:0.85rem; min-height:42px; border-radius:var(--radius-sm); }
        button.full { width:100%; } 
        button.icon-only { width:44px; height:44px; min-height:44px; padding:0; border-radius:50%; box-shadow:none; }
        .error-box { background:rgba(239, 68, 68, 0.1); border:1.5px solid var(--danger); border-radius:var(--radius); padding:14px 16px; color:var(--danger); font-size:0.9rem; width:100%; font-weight:500; }
        .info-box { background:var(--primary-soft); border:1.5px solid var(--primary); border-radius:var(--radius); padding:16px; color:var(--primary); font-size:0.9rem; width:100%; text-align:center; font-weight:500; }
        .header { background:var(--surface); padding:14px 20px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:50; backdrop-filter:blur(10px); background-opacity:0.9; }
        .header-logo { display:flex; align-items:center; gap:8px; font-weight:800; font-size:1.25rem; color:var(--primary); letter-spacing:-0.3px; }
        .content { flex:1; overflow-y:auto; padding:16px 14px 110px; -webkit-overflow-scrolling:touch; }
        .card { background:var(--surface); border-radius:var(--radius-lg); padding:18px; margin-bottom:12px; border:1px solid var(--border); box-shadow:var(--shadow-sm); transition:transform 0.2s ease, box-shadow 0.2s ease; }
        .post-header { display:flex; align-items:center; gap:12px; margin-bottom:12px; cursor:pointer; }
        .post-avatar { width:46px; height:46px; border-radius:50%; background:linear-gradient(135deg,#6366f1,#8b5cf6); display:flex; align-items:center; justify-content:center; font-size:1rem; color:#fff; flex-shrink:0; font-weight:600; overflow:hidden; box-shadow:0 2px 8px rgba(99,102,241,0.25); }
        .post-avatar img { width:100%; height:100%; object-fit:cover; }
        .post-image { width:100%; border-radius:14px; margin-top:10px; max-height:420px; object-fit:cover; box-shadow:var(--shadow); }
        .post-actions { display:flex; gap:20px; margin-top:14px; color:var(--text-secondary); font-size:0.9rem; font-weight:500; }
        .post-actions span { cursor:pointer; display:flex; align-items:center; gap:6px; padding:6px 12px; border-radius:20px; transition:background 0.15s, color 0.15s; }
        .post-actions span:active { background:var(--primary-soft); color:var(--primary); }
        .comment-box { margin-top:14px; padding-top:14px; border-top:1px solid var(--border); }
        .comment { display:flex; gap:10px; margin-bottom:10px; font-size:0.9rem; align-items:flex-start; }
        .comment-avatar { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,#a5b4fc,#c4b5fd); display:flex; align-items:center; justify-content:center; font-size:0.7rem; color:#fff; flex-shrink:0; font-weight:600; overflow:hidden; }
        .comment-avatar img { width:100%; height:100%; object-fit:cover; }
        .comment-input-row { display:flex; gap:8px; margin-top:10px; }
        .comment-input-row input { flex:1; padding:10px 16px; border-radius:24px; font-size:0.9rem; }
        .chat-container { display:flex; flex-direction:column; height:72vh; background:var(--surface); border-radius:var(--radius-lg); overflow:hidden; border:1px solid var(--border); box-shadow:var(--shadow); }
        .chat-list { max-height:35%; overflow-y:auto; border-bottom:1px solid var(--border); }
        .chat-list-item { padding:14px 16px; cursor:pointer; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; font-weight:600; transition:background 0.15s; }
        .chat-list-item:active { background:var(--primary-soft); }
        .chat-list-item.active { background:var(--primary-soft); border-left:4px solid var(--primary); }
        .chat-messages { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:4px; background:var(--surface2); }
        .date-divider { text-align:center; font-size:0.75rem; color:var(--text-tertiary); margin:14px 0; font-weight:500; }
        .date-divider span { background:var(--surface); border:1px solid var(--border); padding:4px 14px; border-radius:12px; box-shadow:var(--shadow-sm); }
        .msg { padding:10px 16px; border-radius:20px; max-width:82%; word-break:break-word; font-size:0.92rem; line-height:1.45; position:relative; box-shadow:var(--shadow-sm); }
        .msg.sent { background:var(--primary); color:#fff; align-self:flex-end; border-bottom-right-radius:6px; }
        .msg.received { background:var(--surface); color:var(--text); align-self:flex-start; border-bottom-left-radius:6px; border:1px solid var(--border); }
        .msg .time { font-size:0.65rem; opacity:0.75; margin-top:4px; display:flex; align-items:center; gap:4px; justify-content:flex-end; font-weight:500; }
        .msg .checks { font-size:0.65rem; } .msg .checks.read { color:#38bdf8; }
        .msg img { max-width:220px; border-radius:12px; margin-top:6px; display:block; }
        .msg audio { max-width:200px; height:32px; margin-top:6px; }
        .chat-input-row { display:flex; gap:8px; padding:12px 16px; border-top:1px solid var(--border); background:var(--surface); align-items:center; }
        .chat-input-row input { flex:1; padding:12px 18px; border-radius:24px; border:1.5px solid var(--border); background:var(--surface2); }
        .bottom-nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; background:var(--surface); border-top:1px solid var(--border); display:flex; justify-content:space-around; padding:8px 6px max(12px,env(safe-area-inset-bottom)); z-index:100; backdrop-filter:blur(12px); background-opacity:0.95; box-shadow:0 -10px 30px rgba(0,0,0,0.04); }
        .nav-item { display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; color:var(--text-tertiary); font-size:0.7rem; font-weight:600; padding:8px 12px; border-radius:16px; transition:all 0.2s ease; touch-action:manipulation; -webkit-tap-highlight-color:transparent; border:none; background:none; font-family:inherit; }
        .nav-item i { font-size:1.35rem; pointer-events:none; transition:transform 0.2s ease; } 
        .nav-item.active { color:var(--primary); }
        .nav-item.active i { transform:translateY(-2px); }
        .badge-crown { color:#f59e0b; } .badge-verify { color:#6366f1; }
        .badge { display:inline-block; padding:4px 12px; border-radius:14px; font-size:0.75rem; font-weight:700; }
        .badge-pending { background:rgba(245, 158, 11, 0.15); color:#d97706; } 
        .badge-approved { background:rgba(16, 185, 129, 0.15); color:#059669; } 
        .badge-rejected { background:rgba(239, 68, 68, 0.15); color:#dc2626; }
        .toast { position:fixed; bottom:130px; left:50%; transform:translateX(-50%); background:var(--text); color:var(--bg); padding:12px 24px; border-radius:28px; font-size:0.9rem; font-weight:600; z-index:300; display:none; box-shadow:var(--shadow-lg); animation:fadeInUp 0.2s ease; }
        @keyframes fadeInUp { from { opacity:0; transform:translate(-50%, 10px); } to { opacity:1; transform:translate(-50%, 0); } }
        .link-text { color:var(--primary); cursor:pointer; font-weight:600; transition:opacity 0.15s; }
        .link-text:active { opacity:0.7; }
        .user-row { display:flex; align-items:center; gap:14px; justify-content:space-between; }
        .settings-item { display:flex; align-items:center; justify-content:space-between; padding:4px 2px; }
        .card[onclick], .settings-item[onclick], .chat-list-item { cursor:pointer; }
        .card[onclick]:active, .settings-item[onclick]:active { transform:scale(0.99); background:var(--surface2); }
        .toggle-switch { width:50px; height:30px; background:var(--border); border-radius:15px; position:relative; cursor:pointer; transition:background 0.25s ease; flex-shrink:0; }
        .toggle-switch.active { background:var(--primary); }
        .toggle-switch::after { content:''; position:absolute; top:3px; left:3px; width:24px; height:24px; background:#fff; border-radius:50%; transition:transform 0.25s cubic-bezier(0.16, 1, 0.3, 1); box-shadow:var(--shadow-sm); }
        .toggle-switch.active::after { transform:translateX(20px); }
        .profile-banner { width:100%; height:150px; object-fit:cover; border-radius:var(--radius-lg) var(--radius-lg) 0 0; background:linear-gradient(135deg,#6366f1,#8b5cf6,#a5b4fc); }
        .profile-avatar-lg { width:90px; height:90px; border-radius:50%; border:4px solid var(--surface); object-fit:cover; margin-top:-45px; position:relative; z-index:2; background:linear-gradient(135deg,#6366f1,#8b5cf6); display:flex; align-items:center; justify-content:center; font-size:2rem; color:#fff; font-weight:700; overflow:hidden; box-shadow:var(--shadow); }
        .profile-avatar-lg img { width:100%; height:100%; object-fit:cover; }
        .online-dot { width:14px; height:14px; background:var(--success); border-radius:50%; display:inline-block; border:3px solid var(--surface); position:absolute; bottom:2px; right:2px; z-index:3; animation:pulse 2s infinite; }
        @keyframes pulse { 0%,100%{transform:scale(1);opacity:1;} 50%{transform:scale(1.1);opacity:0.7;} }
        .owner-chip { background:linear-gradient(135deg,#f59e0b,#d97706); color:#fff; padding:4px 10px; border-radius:20px; font-size:0.7rem; font-weight:700; letter-spacing:0.5px; display:inline-flex; align-items:center; gap:4px; box-shadow:0 2px 6px rgba(245,158,11,0.3); }
        .post-preview-img { max-width:100%; max-height:220px; border-radius:14px; margin-top:10px; object-fit:cover; box-shadow:var(--shadow-sm); }
    </style>
</head>
<body>
<div class="app" id="app"></div>
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL='https://byniblcezicrvyyqbafc.supabase.co';
const SUPABASE_KEY='sb_publishable_exBhK1ZwxY3uSoErm0jVFA_gR97KaAy';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let currentUser=null,currentPage='feed',currentChatId=null,chatChannel=null;
let theme=localStorage.getItem('godmode_theme')||'light';
if(theme==='dark')document.body.classList.add('dark');
let mediaRecorder=null,audioChunks=[],isRecording=false;
let pendingPostImage=null;

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.style.display='block';clearTimeout(t._t);t._t=setTimeout(()=>t.style.display='none',2000);}
function timeAgo(d){const s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return'сейчас';if(s<3600)return Math.floor(s/60)+' мин';if(s<86400)return Math.floor(s/3600)+' ч';return new Date(d).toLocaleDateString('ru-RU');}
function formatTime(d){return new Date(d).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});}
function formatDate(d){const now=new Date();const date=new Date(d);if(date.toDateString()===now.toDateString())return'Сегодня';const yesterday=new Date(now);yesterday.setDate(yesterday.getDate()-1);if(date.toDateString()===yesterday.toDateString())return'Вчера';return date.toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'numeric'});}
function getInitials(n){return(n||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function avHtml(u){if(u?.avatar_url)return`<img src="${escapeHTML(u.avatar_url)}" alt="">`;return escapeHTML(getInitials(u?.full_name||'?'));}
function escapeHTML(str){const div=document.createElement('div');div.textContent=str||'';return div.innerHTML;}
function randAvatar(){return'https://i.pravatar.cc/150?img='+Math.floor(Math.random()*70);}

// ==================== АВТОРИЗАЦИЯ (пустые поля) ====================
function renderLogin(err){
    let h='<div class="screen-center"><div class="logo-icon">💠</div><div class="logo-text">Godmode</div>';
    if(err)h+=`<div class="error-box">${escapeHTML(err)}</div>`;
    h+='<input id="loginEmail" type="email" placeholder="Email" autocomplete="email"><input id="loginPass" type="password" placeholder="Пароль" autocomplete="current-password"><button class="full" id="btnLogin">Войти</button><p style="color:var(--text-secondary);">Нет аккаунта? <span class="link-text" id="linkRegister">Регистрация</span></p></div>';
    document.getElementById('app').innerHTML=h;
    document.getElementById('btnLogin').onclick=doLogin;
    document.getElementById('linkRegister').onclick=()=>renderRegister();
}

function renderRegister(err){
    let h='<div class="screen-center"><div class="logo-icon">💠</div><div class="logo-text">Godmode</div>';
    if(err)h+=`<div class="error-box">${escapeHTML(err)}</div>`;
    h+='<input id="regName" placeholder="Полное имя"><input id="regUser" placeholder="Юзернейм"><input id="regEmail" type="email" placeholder="Email"><input id="regPass" type="password" placeholder="Пароль (мин 6)"><button class="full" id="btnRegister">Зарегистрироваться</button><p style="color:var(--text-secondary);">Уже есть аккаунт? <span class="link-text" id="linkLogin">Войти</span></p></div>';
    document.getElementById('app').innerHTML=h;
    document.getElementById('btnRegister').onclick=doRegister;
    document.getElementById('linkLogin').onclick=()=>renderLogin();
}

async function doLogin(){
    const email=document.getElementById('loginEmail').value.trim();const pass=document.getElementById('loginPass').value;
    if(!email||!pass)return renderLogin('Заполните все поля');
    const{data,error}=await sb.auth.signInWithPassword({email,password:pass});
    if(error)return renderLogin(error.message);
    currentUser=data.user;await loadProfile();showMainApp();
}

async function doRegister(){
    const name=document.getElementById('regName').value.trim();const username=document.getElementById('regUser').value.trim();const email=document.getElementById('regEmail').value.trim();const pass=document.getElementById('regPass').value;
    if(!name||!username||!email||!pass)return renderRegister('Заполните все поля');
    if(pass.length<6)return renderRegister('Пароль минимум 6 символов');
    const{data,error}=await sb.auth.signUp({email,password:pass});
    if(error){if(error.message.includes('already'))return renderLogin('Этот email уже зарегистрирован. Войдите.');return renderRegister(error.message);}
    await sb.from('users').insert({id:data.user.id,email,username,full_name:name,avatar_url:randAvatar()});
    await sb.from('user_settings').insert({user_id:data.user.id});
    currentUser=data.user;
    currentUser.profile={id:data.user.id,email,username,full_name:name,is_owner:false,verified:false,avatar_url:randAvatar(),banner_url:'',bio:'',city:''};
    showMainApp();
}

async function loadProfile(){const{data}=await sb.from('users').select('*').eq('id',currentUser.id).single();if(data){currentUser.profile=data;}}

// ==================== ГЛАВНЫЙ ЭКРАН ====================
function showMainApp(){
    if(chatChannel){sb.removeChannel(chatChannel);chatChannel=null;}
    let h='<div class="header"><div class="header-logo">💠 Godmode</div>';
    if(currentUser.profile?.is_owner)h+='<span class="owner-chip"><i class="fas fa-crown"></i> OWNER</span>';
    h+='</div><div class="content" id="mainContent"></div><div class="bottom-nav" id="bottomNav">';
    h+='<button class="nav-item active" data-page="feed"><i class="fas fa-house"></i>Лента</button>';
    h+='<button class="nav-item" data-page="friends"><i class="fas fa-users"></i>Друзья</button>';
    h+='<button class="nav-item" data-page="chats"><i class="fas fa-message"></i>Чаты</button>';
    h+='<button class="nav-item" data-page="profile"><i class="fas fa-circle-user"></i>Профиль</button>';
    h+='<button class="nav-item" data-page="settings"><i class="fas fa-grid-2"></i>Ещё</button>';
    h+='</div>';
    document.getElementById('app').innerHTML=h;
    document.getElementById('bottomNav').onclick=(e)=>{const btn=e.target.closest('.nav-item');if(btn)nav(btn.dataset.page);};
    document.getElementById('mainContent').addEventListener('click',globalClickHandler);
    nav('feed');
}

async function nav(page){
    if(chatChannel){sb.removeChannel(chatChannel);chatChannel=null;}
    currentPage=page;currentChatId=null;
    document.querySelectorAll('#bottomNav .nav-item').forEach(n=>n.classList.remove('active'));
    const t=document.querySelector(`#bottomNav .nav-item[data-page="${page}"]`);
    if(t)t.classList.add('active');
    switch(page){
        case'feed':loadFeed();break;
        case'profile':await loadProfile();loadProfilePage();break;
        case'friends':loadFriends();break;
        case'chats':loadChats();break;
        case'settings':loadSettings();break;
        case'editProfile':loadEditProfile();break;
        case'moderation':loadModeration();break;
        case'channels':loadChannels();break;
        case'music':loadMusic();break;
        case'verify':loadVerify();break;
    }
}

function globalClickHandler(e){
    const t=e.target;
    if(t.closest('[data-uid]')){viewUserProfile(t.closest('[data-uid]').dataset.uid);return;}
    if(t.closest('[data-del]')){deletePost(t.closest('[data-del]').dataset.del);return;}
    if(t.closest('[data-like]')){likePost(t.closest('[data-like]').dataset.like);return;}
    if(t.closest('[data-comm]')){toggleComments(t.closest('[data-comm]').dataset.comm);return;}
    if(t.closest('[data-repost]')){repostPost(t.closest('[data-repost]').dataset.repost);return;}
    if(t.closest('[data-addcomm]')){addComment(t.closest('[data-addcomm]').dataset.addcomm);return;}
    if(t.closest('[data-uuid]')){viewUserProfile(t.closest('[data-uuid]').dataset.uuid);return;}
    if(t.closest('[data-fid]')){e.stopPropagation();toggleFriend(t.closest('[data-fid]').dataset.fid);return;}
    if(t.closest('[data-cid]')){openChat(t.closest('[data-cid]').dataset.cid);return;}
    if(t.closest('[data-app]')){approveVerification(t.closest('[data-app]').dataset.app,t.closest('[data-app]').dataset.uid);return;}
    if(t.closest('[data-rej]')){rejectVerification(t.closest('[data-rej]').dataset.rej);return;}
}

// ==================== ЛЕНТА С ФОТО ====================
async function loadFeed(){
    const{data:posts}=await sb.from('posts').select('*, users!posts_user_id_fkey(*)').order('created_at',{ascending:false}).limit(30);
    let h=`<div class="card"><textarea id="postText" placeholder="Что у вас нового?" rows="2" style="border:none;padding:4px 0;background:transparent;resize:none;width:100%;"></textarea><div id="postPreview"></div><div style="display:flex;gap:8px;margin-top:10px;"><button class="secondary small" id="btnAddImage"><i class="fas fa-image"></i> Фото</button><button class="full" id="btnCreatePost"><i class="fas fa-paper-plane"></i> Опубликовать</button></div><input type="file" id="postImageInput" accept="image/*" style="display:none;"></div>`;
    if(posts)posts.forEach(p=>{

        h+=`<div class="card"><div class="post-header" data-uid="${p.user_id}"><div class="post-avatar">${avHtml(u)}</div><div style="flex:1;"><strong>${escapeHTML(u.full_name||'?')}</strong>${u.verified?' <i class="fas fa-circle-check badge-verify"></i>':''}${u.is_owner?' <span class="owner-chip"><i class="fas fa-crown"></i> OWNER</span>':''}<div style="font-size:0.75rem;color:var(--text-tertiary);">${timeAgo(p.created_at)}</div></div>${p.user_id===currentUser.id?`<button class="ghost icon-only" data-del="${p.id}"><i class="fas fa-trash" style="color:var(--danger);"></i></button>`:''}</div><p style="white-space:pre-wrap;font-size:0.95rem;line-height:1.45;">${escapeHTML(p.text||'')}</p>${p.image_url?`<img src="${escapeHTML(p.image_url)}" class="post-image" alt="фото">`:''}<div class="post-actions"><span data-like="${p.id}"><i class="far fa-heart"></i> ${p.likes_count||0}</span><span data-comm="${p.id}"><i class="far fa-message"></i> ${p.comments_count||0}</span><span data-repost="${p.id}"><i class="fas fa-arrow-right-arrow-left"></i> ${p.reposts_count||0}</span></div><div class="comment-box" id="comments-${p.id}" style="display:none;"><div id="cl-${p.id}"></div><div class="comment-input-row"><input id="ci-${p.id}" placeholder="Комментарий..."><button class="ghost icon-only" data-addcomm="${p.id}"><i class="fas fa-paper-plane" style="color:var(--primary);"></i></button></div></div></div>`;
    });
    document.getElementById('mainContent').innerHTML=h||'<p style="text-align:center;color:var(--text-tertiary);padding:20px;">Пусто</p>';
    document.getElementById('btnCreatePost').onclick=createPost;

    document.getElementById('postImageInput').onchange=function(){const file=this.files[0];if(!file)return;const reader=new FileReader();reader.onload=function(e){pendingPostImage=e.target.result;document.getElementById('postPreview').innerHTML=`<img src="${e.target.result}" class="post-preview-img">`;};reader.readAsDataURL(file);};
}

async function createPost(){
    const text=document.getElementById('postText')?.value.trim();
    if(!text&&!pendingPostImage)return toast('Напишите текст или добавьте фото');
    let imageUrl=null;
    if(pendingPostImage){const blob=await(await fetch(pendingPostImage)).blob();const path=`post-images/${currentUser.id}/${Date.now()}.jpg`;await sb.storage.from('post-images').upload(path,blob);imageUrl=sb.storage.from('post-images').getPublicUrl(path).data.publicUrl;}
    await sb.from('posts').insert({user_id:currentUser.id,text:text||'',image_url:imageUrl});
    pendingPostImage=null;toast('✅ Опубликовано!');loadFeed();
}
async function deletePost(id){if(!confirm('Удалить?'))return;await sb.from('posts').delete().eq('id',id);toast('Удалён');loadFeed();}
async function likePost(id){const{data:ex}=await sb.from('likes').select('*').eq('user_id',currentUser.id).eq('post_id',id).single();if(ex){await sb.from('likes').delete().eq('user_id',currentUser.id).eq('post_id',id);await sb.rpc('decrement_likes',{post_id:id});}else{await sb.from('likes').insert({user_id:currentUser.id,post_id:id});await sb.rpc('increment_likes',{post_id:id});}loadFeed();}
async function repostPost(id){const{data:o}=await sb.from('posts').select('*').eq('id',id).single();if(!o)return;await sb.from('posts').insert({user_id:currentUser.id,text:o.text,image_url:o.image_url,reposted_from:id});await sb.rpc('increment_reposts',{post_id:id});loadFeed();}
async function toggleComments(pid){const el=document.getElementById('comments-'+pid);if(!el)return;if(el.style.display==='block'){el.style.display='none';return;}el.style.display='block';const{data:c}=await sb.from('comments').select('*, users!comments_user_id_fkey(*)').eq('post_id',pid).order('created_at',{ascending:true});document.getElementById('cl-'+pid).innerHTML=(c||[]).map(x=>`<div class="comment"><div class="comment-avatar">${avHtml(x.users)}</div><div><strong>${escapeHTML(x.users?.full_name||'?')}</strong>${x.users?.verified?' <i class="fas fa-circle-check badge-verify"></i>':''}<br><span style="color:var(--text);">${escapeHTML(x.text)}</span></div></div>`).join('')||'<p style="color:var(--text-tertiary);font-size:0.85rem;margin-bottom:8px;">Нет комментариев</p>';}
async function addComment(pid){const input=document.getElementById('ci-'+pid);if(!input||!input.value.trim())return;await sb.from('comments').insert({user_id:currentUser.id,post_id:pid,text:input.value.trim()});await sb.rpc('increment_comments',{post_id:pid});input.value='';toggleComments(pid);setTimeout(()=>toggleComments(pid),50);}

async function saveProfile(){

    await sb.from('users').update(updates).eq('id',currentUser.id);Object.assign(currentUser.profile,updates);toast('✅ Обновлено!');nav('profile');

async function uploadFile(bucket,file){const path=`${currentUser.id}/${Date.now()}.jpg`;await sb.storage.from(bucket).upload(path,file,{upsert:true});return sb.storage.from(bucket).getPublicUrl(path).data.publicUrl;}
function changeAvatar(){const input=document.createElement('input');input.type='file';input.accept='image/*';input.onchange=async function(){const f=input.files[0];if(!f)return;const url=await uploadFile('avatars',f);if(url){await sb.from('users').update({avatar_url:url}).eq('id',currentUser.id);currentUser.profile.avatar_url=url;toast('✅ Аватар!');nav('editProfile');}};input.click();}
function changeBanner(){const input=document.createElement('input');input.type='file';input.accept='image/*';input.onchange=async function(){const f=input.files[0];if(!f)return;const url=await uploadFile('banners',f);if(url){await sb.from('users').update({banner_url:url}).eq('id',currentUser.id);currentUser.profile.banner_url=url;toast('✅ Баннер!');nav('editProfile');}};input.click();}

async function loadFriends(){
    const{data:all}=await sb.from('users').select('*').neq('id',currentUser.id).order('full_name');
    const{data:mf}=await sb.from('friends').select('friend_id').eq('user_id',currentUser.id);
    const fids=new Set((mf||[]).map(f=>f.friend_id));window._all=all||[];window._fids=fids;
    document.getElementById('mainContent').innerHTML='<h2 style="margin-bottom:14px;">👥 Пользователи</h2><input id="su" placeholder="🔍 Поиск..." style="margin-bottom:12px;border-radius:24px;"><div id="ul"></div>';
    document.getElementById('su').oninput=()=>{const q=document.getElementById('su').value.toLowerCase();renderUsersList(window._all.filter(u=>u.full_name.toLowerCase().includes(q)||u.username.toLowerCase().includes(q)));};
    renderUsersList(window._all);

function renderUsersList(users){document.getElementById('ul').innerHTML=users.map(u=>`<div class="card user-row"><div data-uuid="${u.id}" style="display:flex;align-items:center;gap:12px;flex:1;cursor:pointer;"><div class="post-avatar">${avHtml(u)}</div><div><strong>${escapeHTML(u.full_name)}</strong>${u.verified?' <i class="fas fa-circle-check badge-verify"></i>':''}<div style="font-size:0.85rem;color:var(--text-secondary);">@${escapeHTML(u.username)}</div></div></div><button class="small ${window._fids.has(u.id)?'secondary':'success'}" data-fid="${u.id}">${window._fids.has(u.id)?'<i class="fas fa-user-minus"></i>':'<i class="fas fa-user-plus"></i> Добавить'}</button></div>`).join('');}
async function toggleFriend(fid){if(window._fids.has(fid)){await sb.from('friends').delete().eq('user_id',currentUser.id).eq('friend_id',fid);window._fids.delete(fid);}else{await sb.from('friends').insert({user_id:currentUser.id,friend_id:fid});window._fids.add(fid);}renderUsersList(window._all);}
async function viewUserProfile(uid){
    if(uid===currentUser.id){nav('profile');return;}

    document.getElementById('mainContent').innerHTML=`<div class="card" style="padding:0;overflow:hidden;"><img src="${escapeHTML(u.banner_url||'')}" class="profile-banner"><div style="padding:0 18px;"><div class="profile-avatar-lg">${avHtml(u)}<span class="online-dot"></span></div><div style="display:flex;align-items:center;gap:6px;margin-top:10px;"><h2 style="font-size:1.4rem;">${escapeHTML(u.full_name)}</h2>${u.verified?'<i class="fas fa-circle-check badge-verify"></i>':''}${u.is_owner?'<span class="owner-chip"><i class="fas fa-crown"></i> OWNER</span>':''}</div><p style="color:var(--text-secondary);font-size:0.9rem;margin-bottom:8px;">@${escapeHTML(u.username)}</p>${u.bio?`<p style="margin:6px 0;">${escapeHTML(u.bio)}</p>`:''}${u.city?`<p style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:14px;"><i class="fas fa-map-pin" style="color:var(--primary);"></i> ${escapeHTML(u.city)}</p>`:''}<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:18px;"><button class="full" onclick="startChat('${uid}','${escapeHTML(u.full_name)}')"><i class="fas fa-message"></i> Написать</button><button class="secondary full" onclick="nav('friends')">← Назад</button></div></div></div>`;
}

// ==================== ЧАТЫ ====================
async function loadChats(){
    if(chatChannel){sb.removeChannel(chatChannel);chatChannel=null;}
    const{data:chats}=await sb.from('chats').select('*').contains('participants',[currentUser.id]).order('created_at',{ascending:false});
    if(!chats||chats.length===0){document.getElementById('mainContent').innerHTML='<div class="info-box" style="margin-bottom:14px;">💬 Нет чатов</div><button class="secondary full" onclick="nav(\'friends\')">К друзьям</button>';return;}
    let h='<div class="chat-container"><div class="chat-list" id="clist"></div><div class="chat-messages" id="cmsg"><p style="text-align:center;color:var(--text-tertiary);margin:auto;">Выберите чат</p></div><div class="chat-input-row" id="cinput" style="display:none;"></div></div>';
    document.getElementById('mainContent').innerHTML=h;
    document.getElementById('clist').innerHTML=chats.map(c=>`<div class="chat-list-item" data-cid="${c.id}"><div class="post-avatar" style="width:38px;height:38px;font-size:0.9rem;">${getInitials(c.name||'?')}</div><span>${escapeHTML(c.name||'Чат')}</span></div>`).join('');
}

function openChat(cid){
    if(chatChannel){sb.removeChannel(chatChannel);chatChannel=null;}
    currentChatId=cid;
    document.querySelectorAll('.chat-list-item').forEach(el=>el.classList.remove('active'));
    document.querySelector(`[data-cid="${cid}"]`)?.classList.add('active');
    document.getElementById('cinput').style.display='flex';
    document.getElementById('cinput').innerHTML=`<button class="ghost icon-only" id="btnAttach"><i class="fas fa-paperclip" style="color:var(--text-secondary);"></i></button><input id="mi" placeholder="Сообщение..."><button class="ghost icon-only" id="btnVoice"><i class="fas fa-microphone" style="color:var(--text-secondary);"></i></button><button class="ghost icon-only" id="bsm"><i class="fas fa-paper-plane" style="color:var(--primary);"></i></button>`;
    document.getElementById('bsm').onclick=sendMessage;
    document.getElementById('mi').onkeydown=e=>{if(e.key==='Enter')sendMessage();};
    document.getElementById('btnAttach').onclick=sendChatImage;
    document.getElementById('btnVoice').onclick=toggleVoiceRecord;
    refreshMessages(cid);
    chatChannel=sb.channel(`chat-${cid}`).on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:`chat_id=eq.${cid}`},payload=>{appendMessage(payload.new);}).subscribe();
}

async function refreshMessages(cid){const{data:msgs}=await sb.from('messages').select('*, users!messages_from_user_id_fkey(*)').eq('chat_id',cid).order('created_at',{ascending:true});const c=document.getElementById('cmsg');if(!c)return;let html='',lastDate='';(msgs||[]).forEach(m=>{const d=formatDate(m.created_at);if(d!==lastDate){html+=`<div class="date-divider"><span>${d}</span></div>`;lastDate=d;}html+=renderMessage(m);});c.innerHTML=html||'<p style="text-align:center;color:var(--text-tertiary);margin:auto;">Нет сообщений</p>';c.scrollTop=c.scrollHeight;markAsRead(cid);}
function renderMessage(m){let content='';if(m.attachment_type==='image'&&m.attachment_url)content=`<img src="${escapeHTML(m.attachment_url)}" alt="фото">`;else if(m.attachment_type==='voice'&&m.attachment_url)content=`<audio controls><source src="${escapeHTML(m.attachment_url)}" type="audio/webm"></audio>`;else content=escapeHTML(m.text||'');const time=formatTime(m.created_at);const checks=m.from_user_id===currentUser.id?`<span class="checks ${m.read_at?'read':''}">${m.read_at?'✓✓':'✓'}</span>`:'';return`<div class="msg ${m.from_user_id===currentUser.id?'sent':'received'}">${m.from_user_id!==currentUser.id?`<strong style="font-size:0.75rem;color:var(--primary);">${escapeHTML(m.users?.full_name||'?')}</strong><br>`:''}${content}<div class="time">${time} ${checks}</div></div>`;}
function appendMessage(m){const c=document.getElementById('cmsg');if(!c)return;c.insertAdjacentHTML('beforeend',renderMessage(m));c.scrollTop=c.scrollHeight;markAsRead(currentChatId);}
async function markAsRead(cid){await sb.from('messages').update({read_at:new Date().toISOString()}).eq('chat_id',cid).neq('from_user_id',currentUser.id).is('read_at',null);}
async function sendMessage(){const input=document.getElementById('mi');if(!input||!input.value.trim()||!currentChatId)return;const text=input.value.trim();input.value='';const{data:msg}=await sb.from('messages').insert({chat_id:currentChatId,from_user_id:currentUser.id,text}).select('*, users!messages_from_user_id_fkey(*)').single();if(msg)appendMessage(msg);}
function sendChatImage(){const input=document.createElement('input');input.type='file';input.accept='image/*';input.onchange=async function(){const file=input.files[0];if(!file)return;toast('📷 Загрузка...');const path=`chat-images/${currentChatId}/${Date.now()}.jpg`;await sb.storage.from('chat-images').upload(path,file);const url=sb.storage.from('chat-images').getPublicUrl(path).data.publicUrl;const{data:msg}=await sb.from('messages').insert({chat_id:currentChatId,from_user_id:currentUser.id,text:'📷 Фото',attachment_url:url,attachment_type:'image'}).select('*, users!messages_from_user_id_fkey(*)').single();if(msg)appendMessage(msg);};input.click();}
function toggleVoiceRecord(){if(isRecording){stopVoiceRecord();return;}if(!navigator.mediaDevices)return toast('Нет микрофона');navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{mediaRecorder=new MediaRecorder(stream);audioChunks=[];mediaRecorder.ondataavailable=e=>audioChunks.push(e.data);mediaRecorder.onstop=async()=>{const blob=new Blob(audioChunks,{type:'audio/webm'});const path=`voice-messages/${currentChatId}/${Date.now()}.webm`;await sb.storage.from('voice-messages').upload(path,blob);const url=sb.storage.from('voice-messages').getPublicUrl(path).data.publicUrl;const{data:msg}=await sb.from('messages').insert({chat_id:currentChatId,from_user_id:currentUser.id,text:'🎤 Голосовое',attachment_url:url,attachment_type:'voice'}).select('*, users!messages_from_user_id_fkey(*)').single();if(msg)appendMessage(msg);stream.getTracks().forEach(t=>t.stop());};mediaRecorder.start();isRecording=true;document.getElementById('btnVoice').innerHTML='<i class="fas fa-stop" style="color:var(--danger);"></i>';toast('🔴 Запись...');}).catch(()=>toast('Нет доступа'));}
function stopVoiceRecord(){if(mediaRecorder&&isRecording){mediaRecorder.stop();isRecording=false;document.getElementById('btnVoice').innerHTML='<i class="fas fa-microphone" style="color:var(--text-secondary);"></i>';}}
async function startChat(uid,uname){const{data:ex}=await sb.from('chats').select('*').contains('participants',[currentUser.id,uid]).single();if(ex){nav('chats');setTimeout(()=>openChat(ex.id),300);return;}const{data:chat}=await sb.from('chats').insert({type:'dm',name:uname,owner_id:currentUser.id,participants:[currentUser.id,uid]}).select().single();if(chat){nav('chats');setTimeout(()=>openChat(chat.id),300);}}

function loadSettings(){
    let h='<h2 style="margin-bottom:14px;">⚙️ Настройки</h2>';
    h+=`<div class="card"><div class="settings-item" id="toggleTheme"><div><strong>🌙 Тёмная тема</strong></div><div class="toggle-switch ${theme==='dark'?'active':''}" id="themeSwitch"></div></div></div>`;
    if(currentUser.profile?.is_owner)h+='<div class="card" onclick="nav(\'moderation\')"><div class="settings-item"><div><strong>👑 Панель модерации</strong></div><i class="fas fa-chevron-right" style="color:var(--text-tertiary);"></i></div></div>';
    h+='<div class="card" onclick="nav(\'channels\')"><div class="settings-item"><div><strong>📢 Каналы</strong></div><i class="fas fa-chevron-right" style="color:var(--text-tertiary);"></i></div></div>';
    h+='<div class="card" onclick="nav(\'verify\')"><div class="settings-item"><div><strong>✅ Верификация</strong></div><i class="fas fa-chevron-right" style="color:var(--text-tertiary);"></i></div></div>';
    document.getElementById('mainContent').innerHTML=h;document.getElementById('toggleTheme').onclick=toggleTheme;
}
function toggleTheme(){theme=theme==='dark'?'light':'dark';localStorage.setItem('godmode_theme',theme);document.body.classList.toggle('dark',theme==='dark');loadSettings();}

async function loadModeration(){
    const{data,error}=await sb.from('verification_requests').select('*, users!verification_requests_user_id_fkey(*)').order('created_at',{ascending:false});
    let h='<h2 style="margin-bottom:14px;">👑 Панель модерации</h2><h3 style="margin-bottom:10px;font-size:1.1rem;">📋 Заявки на верификацию</h3>';
    if(data&&data.length>0){data.forEach(r=>{const u=r.users||{};h+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;"><div><strong>${escapeHTML(u.full_name||'Неизвестный')}</strong> <span style="color:var(--text-secondary);font-size:0.85rem;">@${escapeHTML(u.username||'?')}</span></div><span class="badge badge-${r.status==='approved'?'approved':r.status==='rejected'?'rejected':'pending'}">${r.status==='approved'?'Одобрено':r.status==='rejected'?'Отклонено':'На проверке'}</span></div><p style="margin:8px 0;font-size:0.92rem;color:var(--text-secondary);">${escapeHTML(r.reason||'')}</p>${r.status==='pending'?`<div style="margin-top:10px;display:flex;gap:8px;"><button class="success small" data-app="${r.id}" data-uid="${r.user_id}"><i class="fas fa-check"></i> Одобрить</button><button class="danger small" data-rej="${r.id}"><i class="fas fa-xmark"></i> Отклонить</button></div>`:''}</div>`;});}else{h+='<p style="color:var(--text-tertiary);">Нет заявок на рассмотрение</p>';}
    h+='<button class="secondary full" onclick="nav(\'settings\')" style="margin-top:14px;">← Назад</button>';
    document.getElementById('mainContent').innerHTML=h;
}
async function approveVerification(verId,userId){const{error:err1}=await sb.from('verification_requests').update({status:'approved'}).eq('id',verId);const{error:err2}=await sb.from('users').update({verified:true}).eq('id',userId);if(err1||err2){toast('Ошибка: '+(err1?.message||err2?.message));}else{toast('✅ Верификация одобрена!');}loadModeration();}
async function rejectVerification(verId){await sb.from('verification_requests').update({status:'rejected'}).eq('id',verId);toast('Отклонено');loadModeration();}

function loadChannels(){document.getElementById('mainContent').innerHTML='<div class="card"><h2 style="margin-bottom:14px;">📢 Каналы</h2><button class="full" onclick="createChannel()" style="margin-bottom:10px;">Создать</button><button class="secondary full" onclick="nav(\'settings\')">← Назад</button></div>';}
async function createChannel(){const n=prompt('Название:'),t=prompt('Тема:');if(n&&t)await sb.from('channels').insert({owner_id:currentUser.id,name:n,theme:t});toast('Создан!');}

function loadVerify(){const p=currentUser.profile||{};document.getElementById('mainContent').innerHTML=`<div class="card"><h2 style="margin-bottom:14px;">✅ Верификация</h2>${p.is_owner?'<p style="color:var(--text-secondary);">Вы OWNER</p>':p.verified?'<p class="badge-verify" style="font-weight:600;"><i class="fas fa-circle-check"></i> Вы верифицированы</p>':'<textarea id="vr" placeholder="Укажите причину для верификации..." style="margin-bottom:12px;"></textarea><button class="full" onclick="reqVerify()">Отправить заявку</button>'}<button class="secondary full" onclick="nav(\'settings\')" style="margin-top:14px;">← Назад</button></div>`;}
async function reqVerify(){const r=document.getElementById('vr')?.value.trim();if(r)await sb.from('verification_requests').insert({user_id:currentUser.id,reason:r});toast('Отправлено!');nav('settings');}

async function doLogout(){if(chatChannel)sb.removeChannel(chatChannel);await sb.auth.signOut();currentUser=null;renderLogin();}

(async()=>{const{data}=await sb.auth.getSession();if(data.session){currentUser=data.session.user;await loadProfile();showMainApp();}else renderLogin();})();
</script>
</body>
</html>
