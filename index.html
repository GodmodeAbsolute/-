<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя Соцсеть</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #0f172a; color: #fff; padding-bottom: 60px; }
        
        /* Шапка */
        header { background: #1e293b; padding: 15px; text-align: center; font-weight: bold; font-size: 20px; border-bottom: 1px solid #334155; }
        
        /* Лента постов */
        .feed { max-width: 500px; margin: 20px auto; padding: 0 10px; }
        .post { background: #1e293b; border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #334155; }
        .author { font-weight: bold; color: #38bdf8; margin-bottom: 8px; }
        .content { line-height: 1.4; }
        
        /* Кнопка создания поста */
        .create-post { background: #38bdf8; color: #0f172a; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; font-size: 16px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <header>Моя Соцсеть</header>

    <div class="feed">
        <button class="create-post">+ Написать пост</button>

        <div class="post">
            <div class="author">@admin</div>
            <div class="content">Привет всем! Это самый первый пост в моей собственной соцсети, созданной с телефона 🚀</div>
        </div>
    </div>

</body>
</html>
