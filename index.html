<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram (Web Clone)</title>
    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #0f141c;
            --sidebar-bg: #17212b;
            --chat-bg: #0e1621;
            --panel-bg: #17212b;
            --text-color: #f5f5f5;
            --text-secondary: #8292a2;
            --accent-color: #2b5278;
            --accent-hover: #3b6c9d;
            --my-message: #2b5278;
            --other-message: #182533;
            --border-color: #0f141c;
            --hover-color: #202b36;
            --active-color: #2b5278;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Авторизация */
        #auth-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .auth-card {
            background: var(--sidebar-bg);
            padding: 40px 30px;
            border-radius: 16px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        .auth-card h2 {
            margin-bottom: 24px;
            color: var(--text-color);
            font-weight: 500;
        }

        .auth-card input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 14px;
            background: var(--chat-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-color);
            outline: none;
            font-size: 15px;
            transition: border-color 0.2s;
        }

        .auth-card input:focus {
            border-color: var(--accent-color);
        }

        .auth-card button {
            width: 100%;
            padding: 14px;
            background: var(--accent-color);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 6px;
        }

        .auth-card button:hover {
            background: var(--accent-hover);
        }

        .auth-switch {
            margin-top: 20px;
            font-size: 14px;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .auth-switch:hover {
            color: var(--text-color);
        }

        /* Интерфейс мессенджера */
        #app-screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: row;
        }

        /* Сайдбар */
        .sidebar {
            width: 340px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            height: 100%;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .menu-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 18px;
            padding: 4px;
        }

        .search-wrapper {
            flex: 1;
            position: relative;
        }

        .sidebar-header input {
            width: 100%;
            padding: 8px 12px 8px 36px;
            background: var(--chat-bg);
            border: none;
            border-radius: 20px;
            color: var(--text-color);
            outline: none;
            font-size: 14px;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 14px;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            padding: 10px 15px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: background 0.15s;
            gap: 13px;
        }

        .chat-item:hover {
            background: var(--hover-color);
        }

        .chat-item.active {
            background: var(--active-color);
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6aa9ef, #437fad);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 600;
            color: white;
            font-size: 18px;
            flex-shrink: 0;
        }

        .chat-info {
            flex: 1;
            overflow: hidden;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            padding-bottom: 10px;
        }

        .chat-item:last-child .chat-info {
            border-bottom: none;
        }

        .chat-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .chat-name {
            font-weight: 600;
            font-size: 15px;
            color: var(--text-color);
        }

        .chat-time {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .chat-last-message {
            font-size: 13px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Область чата */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--chat-bg);
            height: 100%;
            position: relative;
        }

        .chat-header {
            padding: 10px 20px;
            background: var(--panel-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 10;
        }

        .chat-header .avatar {
            width: 40px;
            height: 40px;
            font-size: 15px;
        }

        .chat-header-info .chat-name {
            font-size: 15px;
        }

        .chat-status {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 1px;
        }

        .messages-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background-image: radial-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 0);
            background-size: 24px 24px;
        }

        .message {
            max-width: 65%;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.45;
            position: relative;
            word-break: break-word;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .message.my {
            background: var(--my-message);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.other {
            background: var(--other-message);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message-user {
            font-size: 12px;
            color: #6aa9ef;
            margin-bottom: 2px;
            font-weight: 600;
        }

        .message-footer {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 4px;
            margin-top: 2px;
            float: right;
            margin-left: 8px;
        }

        .message-time {
            font-size: 10px;
            color: var(--text-secondary);
        }

        .message-ticks {
            font-size: 11px;
            color: #4ea4f3;
        }

        .chat-input-area {
            padding: 12px 20px;
            background: var(--panel-bg);
            display: flex;
            gap: 12px;
            align-items: center;
            border-top: 1px solid var(--border-color);
        }

        .chat-input-area input {
            flex: 1;
            padding: 12px 16px;
            background: var(--chat-bg);
            border: none;
            border-radius: 20px;
            color: var(--text-color);
            outline: none;
            font-size: 14px;
        }

        .send-btn {
            background: var(--accent-color);
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.2s, transform 0.1s;
        }

        .send-btn:hover {
            background: var(--accent-hover);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .back-btn {
            display: none;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 20px;
            cursor: pointer;
            margin-right: 5px;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
            }
            .chat-area {
                display: none;
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                z-index: 100;
            }
            body.chat-open .sidebar {
                display: none;
            }
            body.chat-open .chat-area {
                display: flex;
            }
            .back-btn {
                display: block;
            }
        }
    </style>
</head>
<body>

    <!-- Экран авторизации -->
    <div id="auth-screen">
        <div class="auth-card">
            <h2 id="auth-title">Вход в Telegram</h2>
            <input type="email" id="email" placeholder="Электронная почта">
            <input type="password" id="password" placeholder="Пароль">
            <button id="auth-btn" onclick="handleAuth()">Войти</button>
            <div class="auth-switch" onclick="toggleAuthMode()">Нет аккаунта? Зарегистрироваться</div>
        </div>
    </div>

    <!-- Основной экран приложения -->
    <div id="app-screen">
        <div class="sidebar">
            <div class="sidebar-header">
                <button class="menu-btn">☰</button>
                <div class="search-wrapper">
                    <span class="search-icon">🔍</span>
                    <input type="text" placeholder="Поиск">
                </div>
            </div>
            <div class="chat-list" id="chat-list">
                <div class="chat-item active" onclick="openChat('Общий чат')">
                    <div class="avatar">G</div>
                    <div class="chat-info">
                        <div class="chat-header-row">
                            <span class="chat-name">Общий чат</span>
                            <span class="chat-time">только что</span>
                        </div>
                        <div class="chat-last-message">Добро пожаловать в клон Telegram!</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="chat-area">
            <div class="chat-header">
                <button class="back-btn" onclick="closeChat()">✕</button>
                <div class="avatar" id="current-chat-avatar">G</div>
                <div class="chat-header-info">
                    <div class="chat-name" id="current-chat-name">Общий чат</div>
                    <div class="chat-status">в сети</div>
                </div>
            </div>
            <div class="messages-container" id="messages-container"></div>
            <div class="chat-input-area">
                <input type="text" id="message-input" placeholder="Сообщение..." onkeypress="checkEnter(event)">
                <button class="send-btn" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://byniblcezicrvyyqbafc.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_exBhK1ZwxY3uSoErm0jVFA_gR97KaAy';
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let isSignUp = false;
        let currentUser = null;

        async function checkUser() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                currentUser = session.user;
                showApp();
            }
        }

        function toggleAuthMode() {
            isSignUp = !isSignUp;
            document.getElementById('auth-title').innerText = isSignUp ? 'Регистрация' : 'Вход в Telegram';
            document.getElementById('auth-btn').innerText = isSignUp ? 'Зарегистрироваться' : 'Войти';
            document.querySelector('.auth-switch').innerText = isSignUp ? 'Уже есть аккаунт? Войти' : 'Нет аккаунта? Зарегистрироваться';
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) return alert('Заполни все поля!');

            if (isSignUp) {
                const { data, error } = await supabaseClient.auth.signUp({ email, password });
                if (error) alert(error.message);
                else alert('Регистрация успешна! Теперь войди в систему.');
            } else {
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) alert(error.message);
                else {
                    currentUser = data.user;
                    showApp();
                }
            }
        }

        function showApp() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'flex';
            loadMessages();
            subscribeToMessages();
        }

        async function loadMessages() {
            const container = document.getElementById('messages-container');
            container.innerHTML = '';

            const { data, error } = await supabaseClient
                .from('messages')
                .select('*')
                .order('created_at', { ascending: true });

            if (error) {
                console.error('Ошибка загрузки сообщений:', error);
                return;
            }

            if (data) {
                data.forEach(msg => appendMessage(msg));
            }
        }

        function appendMessage(msg) {
            const container = document.getElementById('messages-container');
            const isMy = currentUser && msg.user_id === currentUser.id;

            const div = document.createElement('div');
            div.className = `message ${isMy ? 'my' : 'other'}`;
            
            const time = new Date(msg.created_at).toLocaleTimeString([], { hour: '2-2-digit', minute: '2-digit' });
            const username = msg.email ? msg.email.split('@')[0] : 'user';

            div.innerHTML = `
                ${!isMy ? `<div class="message-user">${escapeHtml(username)}</div>` : ''}
                <div style="display: inline;">${escapeHtml(msg.text)}</div>
                <div class="message-footer">
                    <span class="message-time">${time}</span>
                    ${isMy ? '<span class="message-ticks">✓✓</span>' : ''}
                </div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text || !currentUser) return;

            const { error } = await supabaseClient.from('messages').insert([
                { 
                    text: text, 
                    user_id: currentUser.id,
                    email: currentUser.email 
                }
            ]);

            if (error) {
                alert('Ошибка отправки: ' + error.message);
            } else {
                input.value = '';
            }
        }

        function subscribeToMessages() {
            supabaseClient
                .channel('public:messages')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                    appendMessage(payload.new);
                })
                .subscribe();
        }

        function checkEnter(e) {
            if (e.key === 'Enter') sendMessage();
        }

        function openChat(name) {
            document.getElementById('current-chat-name').innerText = name;
            document.getElementById('current-chat-avatar').innerText = name[0];
            document.body.classList.add('chat-open');
        }

        function closeChat() {
            document.body.classList.remove('chat-open');
        }

        function escapeHtml(text) {
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        checkUser();
    </script>
</body>
</html>
