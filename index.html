
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Godmode Network</title>
  
  <!-- PWA мета-теги -->
  <link rel="manifest" href="manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Godmode">
  <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/192/domain.png">

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    :root {
      --bg-main: #0b0f19;
      --bg-card: #131b2e;
      --accent-gradient: linear-gradient(135deg, #a855f7, #ec4899);
      --badge-owner: linear-gradient(135deg, #e11d48, #9333ea);
      --text-main: #f8fafc;
      --text-muted: #64748b;
      --transition-speed: 0.25s ease;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
    
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #05070c;
      color: var(--text-main);
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .app-container {
      width: 100%;
      max-width: 460px;
      background: var(--bg-main);
      min-height: 100vh;
      position: relative;
      padding-bottom: 80px;
      border-left: 1px solid rgba(255, 255, 255, 0.05);
      border-right: 1px solid rgba(255, 255, 255, 0.05);
    }

    .tab-content { animation: fadeIn var(--transition-speed); }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .tg-header {
      height: 60px;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      position: sticky;
      top: 0;
      background: rgba(11, 15, 25, 0.85);
      backdrop-filter: blur(12px);
      z-index: 10;
    }

    .tg-header-title {
      font-weight: 800;
      font-size: 18px;
      letter-spacing: 0.5px;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-btn {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff;
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all var(--transition-speed);
    }

    .header-btn:active { transform: scale(0.92); background: rgba(255, 255, 255, 0.15); }

    .banner {
      width: 100%;
      height: 160px;
      background: linear-gradient(135deg, #1e1b4b, #311042);
      background-size: cover;
      background-position: center;
      cursor: pointer;
    }

    .profile-sec { padding: 0 16px; position: relative; }

    .avatar-wrapper {
      position: relative;
      width: 96px;
      height: 96px;
      margin-top: -48px;
      display: inline-block;
      cursor: pointer;
    }

    .avatar {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 4px solid var(--bg-main);
      object-fit: cover;
      background: #1e293b;
    }

    .cam-badge {
      position: absolute;
      bottom: 2px;
      right: 2px;
      background: #d946ef;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid var(--bg-main);
      color: #fff;
      font-size: 13px;
    }

    .user-title {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .user-name { font-size: 22px; font-weight: 800; color: #fff; }

    .owner-tag {
      background: var(--badge-owner);
      color: #fff;
      font-size: 10px;
      font-weight: 800;
      padding: 3px 8px;
      border-radius: 6px;
      letter-spacing: 0.5px;
    }

    .verified-icon { color: #38bdf8; font-size: 15px; }

    .online-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #10b981;
      margin-top: 4px;
      font-weight: 600;
    }

    .online-dot {
      width: 7px;
      height: 7px;
      background: #10b981;
      border-radius: 50%;
      box-shadow: 0 0 8px #10b981;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 18px 0;
    }

    .stat-card {
      background: var(--bg-card);
      padding: 14px 10px;
      border-radius: 14px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.03);
    }

    .stat-num { font-size: 18px; font-weight: 800; color: #fff; }
    .stat-lbl { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    .info-card {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 14px;
      border: 1px solid rgba(255,255,255,0.03);
    }

    .info-icon-box {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .info-text-val { font-size: 14px; font-weight: 700; color: #f1f5f9; line-height: 1.3; }
    .info-text-lbl { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    .post-box, .post-card {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 14px;
      margin: 12px 16px;
      border: 1px solid rgba(255,255,255,0.03);
    }

    textarea, input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: #fff;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
      outline: none;
      font-family: inherit;
    }

    .btn-main {
      width: 100%;
      background: var(--accent-gradient);
      border: none;
      color: #fff;
      padding: 12px;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
    }

    .nav-bar {
      position: fixed;
      bottom: 0;
      width: 100%;
      max-width: 460px;
      height: 60px;
      background: rgba(11, 15, 25, 0.95);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255,255,255,0.05);
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 20;
    }

    .nav-item {
      color: var(--text-muted);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    .nav-item.active { color: #a855f7; font-weight: 800; }

    .modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      backdrop-filter: blur(6px);
      display: none; align-items: center; justify-content: center; z-index: 100;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: #0f172a;
      padding: 22px;
      border-radius: 20px;
      width: 90%;
      max-width: 400px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .hidden { display: none !important; }

    .auth-toggle { display: flex; gap: 8px; margin-bottom: 14px; }
    .auth-toggle button {
      flex: 1; padding: 10px; background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08); color: var(--text-muted);
      border-radius: 10px; cursor: pointer; font-weight: 600;
    }
    .auth-toggle button.active {
      background: rgba(255,255,255,0.15);
      color: #fff;
      border-color: #a855f7;
    }
  </style>
</head>
<body>

<div class="app-container">
  <header class="tg-header">
    <div class="tg-header-title">GODMODE NETWORK</div>
    <div style="display:flex; gap:8px;">
      <button class="header-btn" title="Редактировать" onclick="openModal('modal-edit')">✏️</button>
      <button class="header-btn" title="Выйти" onclick="logout()">🚪</button>
    </div>
  </header>

  <div id="tab-profile" class="tab-content">
    <div id="banner" class="banner" onclick="document.getElementById('banner-file').click()"></div>
    <input type="file" id="banner-file" class="hidden" accept="image/*" onchange="uploadImg(event, 'banner')">

    <div class="profile-sec">
      <div class="avatar-wrapper" onclick="document.getElementById('avatar-file').click()">
        <img id="avatar" class="avatar" src="">
        <div class="cam-badge">📷</div>
      </div>
      <input type="file" id="avatar-file" class="hidden" accept="image/*" onchange="uploadImg(event, 'avatar')">

      <div class="user-title">
        <span id="disp-fullname" class="user-name">Загрузка...</span>
        <span id="disp-owner-badge" class="owner-tag hidden">OWNER</span>
        <span id="disp-verified" class="verified-icon hidden">✔</span>
      </div>

      <div class="online-status">
        <span class="online-dot"></span> в сети
      </div>

      <div class="stats">
        <div class="stat-card"><div id="cnt-friends" class="stat-num">0</div><div class="stat-lbl">Друзей</div></div>
        <div class="stat-card"><div id="cnt-subs" class="stat-num">0</div><div class="stat-lbl">Подписчиков</div></div>
        <div class="stat-card"><div id="cnt-posts" class="stat-num">0</div><div class="stat-lbl">Постов</div></div>
      </div>

      <div class="info-card">
        <div class="info-icon-box">👤</div>
        <div>
          <div id="disp-username" class="info-text-val">@...</div>
          <div class="info-text-lbl">Имя пользователя</div>
        </div>
      </div>

      <div class="info-card">
        <div class="info-icon-box">📄</div>
        <div>
          <div id="disp-bio" class="info-text-val">...</div>
          <div class="info-text-lbl">О себе</div>
        </div>
      </div>

      <div class="info-card">
        <div class="info-icon-box">📍</div>
        <div>
          <div id="disp-city" class="info-text-val">...</div>
          <div class="info-text-lbl">Город</div>
        </div>
      </div>
    </div>

    <div class="post-box">
      <textarea id="post-text" placeholder="Написать пост..." rows="2"></textarea>
      <button class="btn-main" onclick="addPost()">Опубликовать</button>
    </div>

    <div id="posts-list"></div>
  </div>

  <div id="tab-friends" class="tab-content hidden" style="padding:20px;">
    <h3>Друзья</h3>
    <p style="color:var(--text-muted); font-size:13px; margin-top:10px;">У вас пока нет добавленных друзей.</p>
  </div>

  <div id="tab-chats" class="tab-content hidden" style="padding:20px;">
    <h3>Сообщения</h3>
    <p style="color:var(--text-muted); font-size:13px; margin-top:10px;">Диалоги отсутствуют.</p>
  </div>

  <div id="tab-settings" class="tab-content hidden" style="padding:20px;">
    <h3 style="margin-bottom:15px;">Настройки</h3>
    <button class="btn-main" style="background:#e11d48;" onclick="logout()">Выйти из аккаунта</button>
  </div>

  <nav class="nav-bar">
    <button class="nav-item active" onclick="switchTab('profile', this)"><span>👤</span>Профиль</button>
    <button class="nav-item" onclick="switchTab('friends', this)"><span>👥</span>Друзья</button>
    <button class="nav-item" onclick="switchTab('chats', this)"><span>💬</span>Чаты</button>
    <button class="nav-item" onclick="switchTab('settings', this)"><span>⚙️</span>Настройки</button>
  </nav>
</div>

<div id="modal-auth" class="modal">
  <div class="modal-content">
    <div class="auth-toggle">
      <button id="btn-mode-login" class="active" onclick="setAuthMode('login')">Вход</button>
      <button id="btn-mode-reg" onclick="setAuthMode('reg')">Регистрация</button>
    </div>

    <div id="reg-name-field" class="hidden">
      <input type="text" id="auth-name" placeholder="Имя и Фамилия">
    </div>
    <input type="text" id="auth-nick" placeholder="Юзернейм (@username)">
    <input type="password" id="auth-pass" placeholder="Пароль">

    <button class="btn-main" id="btn-auth-submit" onclick="handleAuth()">Войти</button>
  </div>
</div>

<div id="modal-edit" class="modal">
  <div class="modal-content">
    <h3 style="margin-bottom:12px;">Редактировать профиль</h3>
    <input type="text" id="edit-fullname" placeholder="Имя">
    <textarea id="edit-bio" placeholder="О себе" rows="2"></textarea>
    <input type="text" id="edit-city" placeholder="Город">
    <button class="btn-main" onclick="saveProfile()">Сохранить</button>
    <button class="header-btn" style="width:100%; margin-top:8px; border-radius:10px;" onclick="closeModal('modal-edit')">Отмена</button>
  </div>
</div>

<script>
  const SUPABASE_URL = 'ТВОЙ_SUPABASE_URL';
  const SUPABASE_KEY = 'ТВОЙ_SUPABASE_ANON_KEY';
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const DEFAULT_AVATAR = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 24 24' fill='%2364748b'><path d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z'/></svg>";

  let currentAuthMode = 'login';
  let currentUser = null;

  function normalizeUsername(raw) {
    if (!raw) return '';
    let clean = raw.trim().toLowerCase();
    if (!clean.startsWith('@')) clean = '@' + clean;
    return clean;
  }

  window.onload = async () => {
    const savedNick = localStorage.getItem('godmode_active_nick');
    if (savedNick) {
      await fetchUserFromSupabase(savedNick);
    } else {
      openModal('modal-auth');
    }
  };

  async function fetchUserFromSupabase(nick) {
    const { data, error } = await supabaseClient
      .from('profiles')
      .select('*')
      .eq('username', nick)
      .single();

    if (data && !error) {
      currentUser = data;
      closeModal('modal-auth');
      renderProfile();
    } else {
      localStorage.removeItem('godmode_active_nick');
      openModal('modal-auth');
    }
  }

  function setAuthMode(mode) {
    currentAuthMode = mode;
    if (mode === 'login') {
      document.getElementById('btn-mode-login').classList.add('active');
      document.getElementById('btn-mode-reg').classList.remove('active');
      document.getElementById('reg-name-field').classList.add('hidden');
      document.getElementById('btn-auth-submit').innerText = 'Войти';
    } else {
      document.getElementById('btn-mode-reg').classList.add('active');
      document.getElementById('btn-mode-login').classList.remove('active');
      document.getElementById('reg-name-field').classList.remove('hidden');
      document.getElementById('btn-auth-submit').innerText = 'Зарегистрироваться';
    }
  }

  async function handleAuth() {
    const rawNick = document.getElementById('auth-nick').value;
    const pass = document.getElementById('auth-pass').value.trim();

    if (!rawNick || !pass) return alert('Заполните все поля!');
    const nick = normalizeUsername(rawNick);

    if (currentAuthMode === 'login') {
      const { data, error } = await supabaseClient
        .from('profiles')
        .select('*')
        .eq('username', nick)
        .single();

      if (!data || error) return alert('Пользователь не найден!');
      if (data.password !== pass) return alert('Неверный пароль!');
      
      currentUser = data;
    } else {
      const name = document.getElementById('auth-name').value.trim();
      if (!name) return alert('Введите имя!');

      const { data: existing } = await supabaseClient
        .from('profiles')
        .select('username')
        .eq('username', nick)
        .single();

      if (existing) return alert('Этот юзернейм уже занят!');

      const newUserData = {
        username: nick,
        password: pass,
        fullname: name,
        bio: 'Пользователь Godmode Network',
        city: 'Москва',
        is_owner: nick === '@absolute_godmode',
        is_verified: nick === '@absolute_godmode',
        friends: [],
        subscribers: [],
        avatar: DEFAULT_AVATAR,
        banner: '',
        posts: []
      };

      const { error: insError } = await supabaseClient
        .from('profiles')
        .insert([newUserData]);

      if (insError) return alert('Ошибка регистрации в базе: ' + insError.message);
      currentUser = newUserData;
    }

    localStorage.setItem('godmode_active_nick', currentUser.username);
    closeModal('modal-auth');
    renderProfile();
  }

  function logout() {
    localStorage.removeItem('godmode_active_nick');
    currentUser = null;
    document.getElementById('auth-nick').value = '';
    document.getElementById('auth-pass').value = '';
    openModal('modal-auth');
  }

  async function saveUserData() {
    if (!currentUser || !currentUser.username) return;
    await supabaseClient
      .from('profiles')
      .update({
        fullname: currentUser.fullname,
        bio: currentUser.bio,
        city: currentUser.city,
        avatar: currentUser.avatar,
        banner: currentUser.banner,
        posts: currentUser.posts
      })
      .eq('username', currentUser.username);
  }

  function renderProfile() {
    if (!currentUser) return;

    document.getElementById('disp-fullname').innerText = currentUser.fullname || 'Без имени';
    document.getElementById('disp-username').innerText = currentUser.username || '@username';
    document.getElementById('disp-bio').innerText = currentUser.bio || 'Нет описания';
    document.getElementById('disp-city').innerText = currentUser.city || 'Не указан';

    document.getElementById('cnt-friends').innerText = currentUser.friends ? currentUser.friends.length : 0;
    document.getElementById('cnt-subs').innerText = currentUser.subscribers ? currentUser.subscribers.length : 0;

    if (currentUser.is_owner) {
      document.getElementById('disp-owner-badge').classList.remove('hidden');
    } else {
      document.getElementById('disp-owner-badge').classList.add('hidden');
    }

    if (currentUser.is_verified) {
      document.getElementById('disp-verified').classList.remove('hidden');
    } else {
      document.getElementById('disp-verified').classList.add('hidden');
    }

    document.getElementById('avatar').src = currentUser.avatar || DEFAULT_AVATAR;
    
    if (currentUser.banner) {
      document.getElementById('banner').style.backgroundImage = `url('${currentUser.banner}')`;
    } else {
      document.getElementById('banner').style.backgroundImage = 'none';
    }

    renderPosts();
  }

  async function saveProfile() {
    currentUser.fullname = document.getElementById('edit-fullname').value.trim();
    currentUser.bio = document.getElementById('edit-bio').value.trim();
    currentUser.city = document.getElementById('edit-city').value.trim();

    await saveUserData();
    renderProfile();
    closeModal('modal-edit');
  }

  function uploadImg(e, type) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (evt) => {
      if (type === 'avatar') currentUser.avatar = evt.target.result;
      if (type === 'banner') currentUser.banner = evt.target.result;
      await saveUserData();
      renderProfile();
    };
    reader.readAsDataURL(file);
  }

  async function addPost() {
    const txt = document.getElementById('post-text').value.trim();
    if (!txt) return;
    
    if (!currentUser.posts) currentUser.posts = [];
    currentUser.posts.unshift({ text: txt, date: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) });
    
    document.getElementById('post-text').value = '';
    await saveUserData();
    renderPosts();
  }

  function renderPosts() {
    const posts = currentUser.posts || [];
    document.getElementById('cnt-posts').innerText = posts.length;
    const container = document.getElementById('posts-list');
    
    if (posts.length === 0) {
      container.innerHTML = '<p style="padding:0 16px; color:var(--text-muted); font-size:13px;">Постов пока нет.</p>';
      return;
    }
    container.innerHTML = posts.map(p => `
      <div class="post-card">
        <div style="display:flex; justify-content:space-between; margin-bottom:6px;">
          <b style="font-size:13px;">${currentUser.fullname}</b>
          <span style="font-size:11px; color:var(--text-muted);">${p.date}</span>
        </div>
        <p style="font-size:14px; color:#e2e8f0;">${p.text}</p>
      </div>
    `).join('');
  }

  function switchTab(tab, btn) {
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
    document.getElementById(`tab-${tab}`).classList.remove('hidden');
  }

  function openModal(id) {
    if (id === 'modal-edit' && currentUser) {
      document.getElementById('edit-fullname').value = currentUser.fullname || '';
      document.getElementById('edit-bio').value = currentUser.bio || '';
      document.getElementById('edit-city').value = currentUser.city || '';
    }
    document.getElementById(id).classList.add('active');
  }

  closeModal = (id) => document.getElementById(id).classList.remove('active');
</script>
</body>
</html>
