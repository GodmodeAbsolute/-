<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InnoSphere</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #f0f2f5; --surface: #ffffff; --primary: #4f46e5;
            --text: #1e293b; --text-soft: #64748b; --border: #e2e8f0;
            --danger: #ef4444; --success: #10b981; --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg); color: var(--text);
            display: flex; justify-content: center; min-height: 100vh;
        }
        .app {
            width: 100%; max-width: 480px; min-height: 100vh;
            background: var(--bg); display: flex; flex-direction: column;
        }
        .screen-center {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 100vh; padding: 20px; gap: 14px;
        }
        .logo { font-size: 2.5rem; font-weight: 800; color: var(--primary); }
        input, textarea {
            width: 100%; padding: 15px; border-radius: 14px;
            border: 2px solid var(--border); font-size: 1rem;
            background: var(--surface); color: var(--text); font-family: inherit;
        }
        button {
            width: 100%; padding: 15px; border-radius: 14px;
            background: var(--primary); color: white; font-weight: 700;
            font-size: 1rem; border: none; cursor: pointer;
        }
        button:active { opacity: 0.8; transform: scale(0.98); }
        button.secondary { background: #f1f5f9; color: var(--text); border: 1px solid var(--border); }
        button.danger { background: var(--danger); }
        button.success { background: var(--success); }
        button.small { width: auto; padding: 8px 14px; font-size: 0.85rem; display: inline-flex; align-items: center; gap: 4px; }
        .error-box {
            background: #fef2f2; border: 2px solid #ef4444; border-radius: 14px;
            padding: 14px; color: #dc2626; font-size: 0.9rem; width: 100%;
        }
        .header {
            background: var(--surface); padding: 14px 16px; display: flex;
            align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border);
            font-weight: 800; font-size: 1.2rem; color: var(--primary);
            position: sticky; top: 0; z-index: 10;
        }
        .content { flex: 1; overflow-y: auto; padding: 12px; padding-bottom: 80px; }
        .card {
            background: var(--surface); border-radius: var(--radius);
            padding: 15px; margin-bottom: 10px; border: 1px solid var(--border);
        }
        .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; cursor: pointer; }
        .post-avatar {
            width: 40px; height: 40px; border-radius: 50%; background: #ddd;
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem; color: #999;
        }
        .post-actions { display: flex; gap: 20px; margin-top: 10px; color: var(--text-soft); font-size: 0.9rem; }
        .post-actions span { cursor: pointer; display: flex; align-items: center; gap: 4px; }
        .comment-box {
            margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border);
        }
        .comment {
            display: flex; gap: 8px; margin-bottom: 8px; font-size: 0.85rem;
            align-items: flex-start;
        }
        .comment-avatar {
            width: 28px; height: 28px; border-radius: 50%; background: #ddd;
            display: flex; align-items: center; justify-content: center; font-size: 0.7rem; flex-shrink: 0;
        }
        .comment-input-row { display: flex; gap: 8px; margin-top: 8px; }
        .comment-input-row input { flex: 1; padding: 10px; font-size: 0.85rem; }
        .chat-container { display: flex; flex-direction: column; height: 70vh; }
        .chat-list { max-height: 40%; overflow-y: auto; border-bottom: 1px solid var(--border); }
        .chat-list-item {
            padding: 12px; cursor: pointer; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 10px;
        }
        .chat-list-item.active { background: #eef2ff; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 6px; }
        .msg {
            padding: 8px 14px; border-radius: 16px; max-width: 80%; word-break: break-word;
        }
        .msg.sent { background: var(--primary); color: white; align-self: flex-end; }
        .msg.received { background: #f1f5f9; align-self: flex-start; }
        .chat-input-row { display: flex; gap: 8px; padding: 8px; border-top: 1px solid var(--border); }
        .chat-input-row input { flex: 1; padding: 10px; }
        .bottom-nav {
            position: sticky; bottom: 0; background: var(--surface);
            border-top: 1px solid var(--border); display: flex;
            justify-content: space-around; padding: 8px 4px 12px; z-index: 10;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            gap: 2px; cursor: pointer; color: var(--text-soft); font-size: 0.7rem; font-weight: 500;
        }
        .nav-item i { font-size: 1.3rem; }
        .nav-item.active { color: var(--primary); }
        .badge-crown { color: #f59e0b; }
        .badge-verify { color: #3b82f6; }
        .badge-notif {
            position: absolute; top: -4px; right: -4px;
            background: var(--danger); color: white; border-radius: 50%;
            width: 16px; height: 16px; font-size: 0.6rem;
            display: flex; align-items: center; justify-content: center;
        }
        .toast {
            position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
            background: #1e293b; color: white; padding: 10px 20px;
            border-radius: 20px; font-size: 0.85rem; z-index: 99; display: none;
        }
        .link-text { color: var(--primary); cursor: pointer; font-weight: 600; text-decoration: underline; }
        .user-row {
            display: flex; align-items: center; gap: 10px; padding: 10px;
            cursor: pointer; border-radius: 10px;
        }
        .user-row:active { background: #f1f5f9; }
    </style>
</head>
<body>
    <div class="app" id="app"></div>
    <div class="toast" id="toast"></div>

    <script>
        const SUPABASE_URL = 'https://byniblcezicrvyyqbafc.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_exBhK1ZwxY3uSoErm0jVFA_gR97KaAy';
        const OWNER_EMAIL = 'ilyabelyev344@gmail.com';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;
        let currentPage = 'feed';
        let currentChatId = null;
        let chatRefreshInterval = null;

        function toast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2000);
        }

        function timeAgo(d) {
            const s = Math.floor((Date.now() - new Date(d)) / 1000);
            if (s < 60) return 'сейчас';
            if (s < 3600) return Math.floor(s/60) + ' мин';
            if (s < 86400) return Math.floor(s/3600) + ' ч';
            return new Date(d).toLocaleDateString('ru-RU');
        }

        // ==================== АВТОРИЗАЦИЯ ====================
        function renderLogin(err) {
            let h = '<div class="screen-center">';
            h += '<div class="logo"><i class="fas fa-cube"></i> InnoSphere</div>';
            if (err) h += `<div class="error-box">${err}</div>`;
            h += `<input id="loginEmail" type="email" placeholder="Email" value="${OWNER_EMAIL}">`;
            h += '<input id="loginPass" type="password" placeholder="Пароль" value="Assasin2)">';
            h += '<button onclick="doLogin()">Войти</button>';
            h += '<p>Нет аккаунта? <span class="link-text" onclick="renderRegister()">Регистрация</span></p>';
            h += '</div>';
            document.getElementById('app').innerHTML = h;
        }

        function renderRegister(err) {
            let h = '<div class="screen-center">';
            h += '<div class="logo"><i class="fas fa-cube"></i> InnoSphere</div>';
            if (err) h += `<div class="error-box">${err}</div>`;
            h += '<input id="regName" placeholder="Полное имя">';
            h += '<input id="regUser" placeholder="Юзернейм">';
            h += '<input id="regEmail" type="email" placeholder="Email">';
            h += '<input id="regPass" type="password" placeholder="Пароль">';
            h += '<button onclick="doRegister()">Зарегистрироваться</button>';
            h += '<p>Уже есть аккаунт? <span class="link-text" onclick="renderLogin()">Войти</span></p>';
            h += '</div>';
            document.getElementById('app').innerHTML = h;
        }

        async function doLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPass').value;
            if (!email || !pass) return renderLogin('Заполните все поля');
            const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
            if (error) return renderLogin(error.message);
            currentUser = data.user;
            await loadProfile();
            showMainApp();
        }

        async function doRegister() {
            const name = document.getElementById('regName').value.trim();
            const username = document.getElementById('regUser').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const pass = document.getElementById('regPass').value;
            if (!name || !username || !email || !pass) return renderRegister('Заполните все поля');
            if (pass.length < 6) return renderRegister('Пароль минимум 6 символов');
            const { data, error } = await sb.auth.signUp({ email, password: pass });
            if (error) {
                if (error.message.includes('already')) return renderLogin('Уже зарегистрирован. Войдите.');
                return renderRegister(error.message);
            }
            const isOwner = (email === OWNER_EMAIL);
            await sb.from('users').insert({
                id: data.user.id, email, username, full_name: name,
                is_owner: isOwner, verified: isOwner
            });
            await sb.from('user_settings').insert({ user_id: data.user.id });
            currentUser = data.user;
            currentUser.profile = { id: data.user.id, email, username, full_name: name, is_owner: isOwner, verified: isOwner, avatar_url: 'https://i.pravatar.cc/150?img=' + Math.floor(Math.random()*70), banner_url: 'https://picsum.photos/480/140', bio: '' };
            showMainApp();
        }

        async function loadProfile() {
            const { data } = await sb.from('users').select('*').eq('id', currentUser.id).single();
            if (data) currentUser.profile = data;
        }

        // ==================== ГЛАВНЫЙ ЭКРАН ====================
        function showMainApp() {
            let h = '<div class="header"><span><i class="fas fa-cube"></i> InnoSphere</span>';
            h += '<span style="font-size:0.9rem;">';
            if (currentUser.profile?.is_owner) h += ' <i class="fas fa-crown badge-crown"></i>';
            if (currentUser.profile?.verified) h += ' <i class="fas fa-check-circle badge-verify"></i>';
            h += '</span></div>';
            h += '<div class="content" id="mainContent"></div>';
            h += '<div class="bottom-nav">';
            h += '<div class="nav-item active" data-p="feed" onclick="nav(\'feed\')"><i class="fas fa-newspaper"></i>Лента</div>';
            h += '<div class="nav-item" data-p="friends" onclick="nav(\'friends\')"><i class="fas fa-user-friends"></i>Друзья</div>';
            h += '<div class="nav-item" data-p="chats" onclick="nav(\'chats\')"><i class="fas fa-comment-dots"></i>Чаты</div>';
            h += '<div class="nav-item" data-p="profile" onclick="nav(\'profile\')"><i class="fas fa-user"></i>Профиль</div>';
            h += '<div class="nav-item" data-p="more" onclick="nav(\'more\')"><i class="fas fa-ellipsis-h"></i>Ещё</div>';
            h += '</div>';
            document.getElementById('app').innerHTML = h;
            nav('feed');
        }

        function nav(page) {
            currentPage = page;
            if (chatRefreshInterval) { clearInterval(chatRefreshInterval); chatRefreshInterval = null; }
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            const t = document.querySelector(`.nav-item[data-p="${page}"]`);
            if (t) t.classList.add('active');
            switch (page) {
                case 'feed': loadFeed(); break;
                case 'profile': loadProfilePage(); break;
                case 'friends': loadFriends(); break;
                case 'chats': loadChats(); break;
                case 'more': loadMore(); break;
                case 'channels': loadChannels(); break;
                case 'music': loadMusic(); break;
                case 'verify': loadVerify(); break;
            }
        }

        // ==================== ЛЕНТА ====================
        async function loadFeed() {
            const { data: posts } = await sb.from('posts').select('*, users!posts_user_id_fkey(*)').order('created_at', { ascending: false }).limit(30);
            let h = `<div class="card"><textarea id="postText" placeholder="Что у вас нового?" rows="2"></textarea><button onclick="createPost()" style="margin-top:8px;"><i class="fas fa-paper-plane"></i> Опубликовать</button></div>`;
            if (posts && posts.length > 0) {
                posts.forEach(p => {
                    const u = p.users || {};
                    h += `
                    <div class="card" id="post-${p.id}">
                        <div class="post-header" onclick="viewUserProfile('${p.user_id}')">
                            <div class="post-avatar"><i class="fas fa-user"></i></div>
                            <div>
                                <strong>${u.full_name || 'Пользователь'}</strong>
                                ${u.is_owner ? '<i class="fas fa-crown badge-crown"></i>' : ''}
                                ${u.verified ? '<i class="fas fa-check-circle badge-verify"></i>' : ''}
                                <div style="font-size:0.7rem; color:var(--text-soft);">${timeAgo(p.created_at)}</div>
                            </div>
                            ${p.user_id === currentUser.id ? `<span onclick="deletePost('${p.id}')" style="margin-left:auto; color:var(--danger); cursor:pointer; font-size:0.8rem;"><i class="fas fa-trash"></i></span>` : ''}
                        </div>
                        <p style="white-space:pre-wrap; font-size:0.95rem;">${p.text || ''}</p>
                        <div class="post-actions">
                            <span onclick="likePost('${p.id}')"><i class="far fa-heart"></i> ${p.likes_count||0}</span>
                            <span onclick="toggleComments('${p.id}')"><i class="far fa-comment"></i> ${p.comments_count||0}</span>
                            <span onclick="repostPost('${p.id}')"><i class="fas fa-retweet"></i> ${p.reposts_count||0}</span>
                        </div>
                        <div class="comment-box" id="comments-${p.id}" style="display:none;">
                            <div id="commentsList-${p.id}"></div>
                            <div class="comment-input-row">
                                <input id="commentInput-${p.id}" placeholder="Комментарий...">
                                <button class="small" onclick="addComment('${p.id}')"><i class="fas fa-paper-plane"></i></button>
                            </div>
                        </div>
                    </div>`;
                });
            } else {
                h += '<div class="card"><p style="text-align:center; color:var(--text-soft);">Нет постов</p></div>';
            }
            document.getElementById('mainContent').innerHTML = h;
        }

        async function createPost() {
            const text = document.getElementById('postText')?.value.trim();
            if (!text) return toast('Напишите текст');
            await sb.from('posts').insert({ user_id: currentUser.id, text });
            toast('Опубликовано!');
            loadFeed();
        }

        async function deletePost(id) {
            if (!confirm('Удалить пост?')) return;
            await sb.from('posts').delete().eq('id', id);
            toast('Пост удалён');
            loadFeed();
        }

        async function likePost(id) {
            const { data: ex } = await sb.from('likes').select('*').eq('user_id', currentUser.id).eq('post_id', id).single();
            if (ex) {
                await sb.from('likes').delete().eq('user_id', currentUser.id).eq('post_id', id);
                await sb.rpc('decrement_likes', { post_id: id });
            } else {
                await sb.from('likes').insert({ user_id: currentUser.id, post_id: id });
                await sb.rpc('increment_likes', { post_id: id });
            }
            loadFeed();
        }

        async function repostPost(id) {
            const { data: orig } = await sb.from('posts').select('*').eq('id', id).single();
            if (!orig) return;
            await sb.from('posts').insert({ user_id: currentUser.id, text: orig.text, reposted_from: id });
            await sb.rpc('increment_reposts', { post_id: id });
            toast('Репост!');
            loadFeed();
        }

        async function toggleComments(postId) {
            const el = document.getElementById('comments-' + postId);
            if (!el) return;
            if (el.style.display === 'block') { el.style.display = 'none'; return; }
            el.style.display = 'block';
            const { data: comments } = await sb.from('comments').select('*, users!comments_user_id_fkey(*)').eq('post_id', postId).order('created_at', { ascending: true });
            const list = document.getElementById('commentsList-' + postId);
            list.innerHTML = (comments || []).map(c => `
                <div class="comment">
                    <div class="comment-avatar"><i class="fas fa-user"></i></div>
                    <div><strong>${c.users?.full_name || '?'}</strong>: ${c.text}</div>
                </div>
            `).join('') || '<p style="font-size:0.8rem; color:var(--text-soft);">Нет комментариев</p>';
        }

        async function addComment(postId) {
            const input = document.getElementById('commentInput-' + postId);
            if (!input || !input.value.trim()) return;
            await sb.from('comments').insert({ user_id: currentUser.id, post_id: postId, text: input.value.trim() });
            await sb.rpc('increment_comments', { post_id: postId });
            input.value = '';
            toggleComments(postId);
            toggleComments(postId);
        }

        // ==================== ПРОФИЛЬ ====================
        function loadProfilePage() {
            const p = currentUser.profile || {};
            document.getElementById('mainContent').innerHTML = `
            <div class="card" style="text-align:center;">
                <div style="font-size:4rem; margin-bottom:8px;"><i class="fas fa-user-circle"></i></div>
                <h2>${p.full_name || 'Пользователь'}</h2>
                <p style="color:var(--text-soft);">@${p.username || ''}</p>
                ${p.is_owner ? '<p class="badge-crown"><i class="fas fa-crown"></i> Владелец</p>' : ''}
                ${p.verified ? '<p class="badge-verify"><i class="fas fa-check-circle"></i> Верифицирован</p>' : ''}
                <button onclick="editProfile()" class="secondary" style="margin-top:8px;"><i class="fas fa-pen"></i> Редактировать</button>
                <button onclick="doLogout()" class="danger" style="margin-top:8px;"><i class="fas fa-sign-out-alt"></i> Выйти</button>
            </div>`;
        }

        function editProfile() {
            const p = currentUser.profile || {};
            const name = prompt('Имя:', p.full_name);
            if (!name) return;
            const bio = prompt('О себе:', p.bio || '');
            sb.from('users').update({ full_name: name, bio }).eq('id', currentUser.id).then(() => {
                currentUser.profile.full_name = name;
                currentUser.profile.bio = bio;
                toast('Профиль обновлён!');
                loadProfilePage();
            });
        }

        // ==================== ДРУЗЬЯ ====================
        async function loadFriends() {
            const { data: allUsers } = await sb.from('users').select('*').neq('id', currentUser.id).order('full_name');
            const { data: myFriends } = await sb.from('friends').select('friend_id').eq('user_id', currentUser.id);
            const friendIds = new Set((myFriends || []).map(f => f.friend_id));

            let h = '<h2 style="margin-bottom:12px;"><i class="fas fa-user-friends"></i> Пользователи</h2>';
            h += '<input id="searchUser" placeholder="Поиск..." oninput="searchUsers()" style="margin-bottom:12px;">';
            h += '<div id="usersList"></div>';

            document.getElementById('mainContent').innerHTML = h;
            window._allUsers = allUsers || [];
            window._friendIds = friendIds;
            renderUsersList(allUsers || [], friendIds);
        }

        function renderUsersList(users, friendIds) {
            const list = document.getElementById('usersList');
            if (!list) return;
            list.innerHTML = users.map(u => `
                <div class="card user-row" style="justify-content:space-between;">
                    <div onclick="viewUserProfile('${u.id}')" style="display:flex; align-items:center; gap:10px; flex:1;">
                        <div class="post-avatar"><i class="fas fa-user"></i></div>
                        <div>
                            <strong>${u.full_name}</strong>
                            <div style="font-size:0.75rem; color:var(--text-soft);">@${u.username}</div>
                        </div>
                    </div>
                    <button class="small ${friendIds.has(u.id) ? 'secondary' : 'success'}" onclick="toggleFriend('${u.id}')">
                        ${friendIds.has(u.id) ? '<i class="fas fa-user-minus"></i> Удалить' : '<i class="fas fa-user-plus"></i> Добавить'}
                    </button>
                </div>
            `).join('');
        }

        function searchUsers() {
            const q = document.getElementById('searchUser')?.value.toLowerCase() || '';
            const filtered = (window._allUsers || []).filter(u =>
                u.full_name.toLowerCase().includes(q) || u.username.toLowerCase().includes(q)
            );
            renderUsersList(filtered, window._friendIds);
        }

        async function toggleFriend(friendId) {
            if (window._friendIds.has(friendId)) {
                await sb.from('friends').delete().eq('user_id', currentUser.id).eq('friend_id', friendId);
                window._friendIds.delete(friendId);
                toast('Удалён из друзей');
            } else {
                await sb.from('friends').insert({ user_id: currentUser.id, friend_id: friendId });
                window._friendIds.add(friendId);
                toast('Добавлен в друзья!');
            }
            renderUsersList(window._allUsers || [], window._friendIds);
        }

        async function viewUserProfile(userId) {
            const { data: u } = await sb.from('users').select('*').eq('id', userId).single();
            if (!u) return toast('Пользователь не найден');
            const { data: posts } = await sb.from('posts').select('*').eq('user_id', userId).order('created_at', { ascending: false });
            const isFriend = window._friendIds?.has(userId);

            let h = `
            <div class="card" style="text-align:center;">
                <div style="font-size:4rem;"><i class="fas fa-user-circle"></i></div>
                <h2>${u.full_name} ${u.is_owner ? '<i class="fas fa-crown badge-crown"></i>' : ''} ${u.verified ? '<i class="fas fa-check-circle badge-verify"></i>' : ''}</h2>
                <p style="color:var(--text-soft);">@${u.username}</p>
                <p>${u.bio || ''}</p>
                <p>Постов: ${posts?.length || 0}</p>
                ${userId !== currentUser.id ? `
                    <button class="small ${isFriend ? 'secondary' : 'success'}" onclick="toggleFriend('${userId}'); viewUserProfile('${userId}');">
                        ${isFriend ? 'Удалить из друзей' : 'Добавить в друзья'}
                    </button>
                    <button class="small" onclick="startChat('${userId}')" style="margin-left:8px;">
                        <i class="fas fa-comment"></i> Написать
                    </button>
                ` : ''}
                <button class="secondary small" onclick="nav('friends')" style="margin-top:8px;">← Назад</button>
            </div>`;
            if (posts && posts.length > 0) {
                h += '<h3>Посты</h3>';
                posts.forEach(p => {
                    h += `<div class="card"><p>${p.text || ''}</p><div style="font-size:0.75rem; color:var(--text-soft);">${timeAgo(p.created_at)}</div></div>`;
                });
            }
            document.getElementById('mainContent').innerHTML = h;
        }

        // ==================== ЧАТЫ ====================
        async function loadChats() {
            const { data: chats } = await sb.from('chats').select('*').or(`owner_id.eq.${currentUser.id},participants.cs.{${currentUser.id}}`);
            let h = '<h2><i class="fas fa-comment-dots"></i> Чаты</h2>';
            h += '<button onclick="createGroupChat()" class="small" style="margin-bottom:12px;"><i class="fas fa-plus"></i> Создать беседу</button>';
            h += '<div class="chat-container"><div class="chat-list" id="chatList"></div>';
            h += '<div class="chat-messages" id="chatMessages"><p style="text-align:center; color:var(--text-soft);">Выберите чат</p></div>';
            h += '<div class="chat-input-row" id="chatInput" style="display:none;"></div></div>';
            document.getElementById('mainContent').innerHTML = h;

            const chatList = document.getElementById('chatList');
            if (chats && chats.length > 0) {
                chatList.innerHTML = chats.map(c => `
                    <div class="chat-list-item ${currentChatId === c.id ? 'active' : ''}" onclick="openChat('${c.id}')">
                        <strong>${c.name || 'Чат'}</strong>
                    </div>
                `).join('');
            } else {
                chatList.innerHTML = '<p style="padding:12px; color:var(--text-soft);">Нет чатов</p>';
            }
        }

        async function createGroupChat() {
            const name = prompt('Название беседы:');
            if (!name) return;
            const { data: chat } = await sb.from('chats').insert({
                type: 'group', name, owner_id: currentUser.id,
                participants: [currentUser.id]
            }).select().single();
            if (chat) {
                toast('Беседа создана!');
                currentChatId = chat.id;
                loadChats();
                openChat(chat.id);
            }
        }

        async function startChat(userId) {
            const { data: existing } = await sb.from('chats').select('*').eq('type', 'dm').contains('participants', [currentUser.id, userId]).single();
            if (existing) {
                currentChatId = existing.id;
                nav('chats');
                openChat(existing.id);
                return;
            }
            const { data: otherUser } = await sb.from('users').select('full_name').eq('id', userId).single();
            const { data: chat } = await sb.from('chats').insert({
                type: 'dm', name: otherUser?.full_name || 'Чат',
                participants: [currentUser.id, userId], owner_id: currentUser.id
            }).select().single();
            if (chat) {
                currentChatId = chat.id;
                nav('chats');
                openChat(chat.id);
            }
        }

        async function openChat(chatId) {
            currentChatId = chatId;
            document.querySelectorAll('.chat-list-item').forEach(el => el.classList.remove('active'));
            document.querySelector(`.chat-list-item[onclick="openChat('${chatId}')"]`)?.classList.add('active');

            await refreshChatMessages(chatId);

            document.getElementById('chatInput').style.display = 'flex';
            document.getElementById('chatInput').innerHTML = `
                <input id="msgInput" placeholder="Сообщение..." style="flex:1;">
                <button class="small" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
            `;

            if (chatRefreshInterval) clearInterval(chatRefreshInterval);
            chatRefreshInterval = setInterval(() => refreshChatMessages(chatId), 2000);
        }

        async function refreshChatMessages(chatId) {
            const { data: messages } = await sb.from('messages').select('*, users!messages_from_user_id_fkey(*)').eq('chat_id', chatId).order('created_at', { ascending: true });
            const msgContainer = document.getElementById('chatMessages');
            if (!msgContainer) return;
            msgContainer.innerHTML = (messages || []).map(m => `
                <div class="msg ${m.from_user_id === currentUser.id ? 'sent' : 'received'}">
                    ${m.from_user_id !== currentUser.id ? `<strong style="font-size:0.75rem;">${m.users?.full_name || '?'}</strong><br>` : ''}
                    ${m.text}
                </div>
            `).join('');
            msgContainer.scrollTop = msgContainer.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('msgInput');
            if (!input || !input.value.trim() || !currentChatId) return;
            await sb.from('messages').insert({
                chat_id: currentChatId,
                from_user_id: currentUser.id,
                text: input.value.trim()
            });
            input.value = '';
            await refreshChatMessages(currentChatId);
        }

        // ==================== ЕЩЁ ====================
        function loadMore() {
            document.getElementById('mainContent').innerHTML = `
            <div class="card" onclick="nav('channels')" style="cursor:pointer;"><h3><i class="fas fa-bullhorn"></i> Каналы</h3></div>
            <div class="card" onclick="nav('music')" style="cursor:pointer;"><h3><i class="fas fa-music"></i> Музыка</h3></div>
            <div class="card" onclick="nav('verify')" style="cursor:pointer;"><h3><i class="fas fa-check-circle"></i> Верификация</h3></div>`;
        }

        function loadChannels() {
            document.getElementById('mainContent').innerHTML = `
            <div class="card"><h2>Каналы</h2><button onclick="createChannel()"><i class="fas fa-plus"></i> Создать</button>
            <button class="secondary small" onclick="nav('more')" style="margin-top:8px;">← Назад</button></div>`;
        }

        async function createChannel() {
            const name = prompt('Название:');
            if (!name) return;
            const theme = prompt('Тематика:');
            if (!theme) return;
            await sb.from('channels').insert({ owner_id: currentUser.id, name, theme });
            toast('Канал создан!');
        }

        function loadMusic() {
            document.getElementById('mainContent').innerHTML = `
            <div class="card"><h2>Музыка</h2><button onclick="uploadMusic()"><i class="fas fa-upload"></i> Загрузить</button>
            <button class="secondary small" onclick="nav('more')" style="margin-top:8px;">← Назад</button></div>`;
        }

        async function uploadMusic() {
            const artist = prompt('Исполнитель:');
            const title = prompt('Название:');
            if (!artist || !title) return;
            await sb.from('music').insert({ owner_id: currentUser.id, artist, title, status: 'pending' });
            toast('Трек на проверке!');
        }

        function loadVerify() {
            const p = currentUser.profile || {};
            document.getElementById('mainContent').innerHTML = `
            <div class="card"><h2>Верификация</h2>
            ${p.is_owner ? '<p class="badge-crown">👑 Владелец</p>' : p.verified ? '<p class="badge-verify">✓ Верифицирован</p>' :
            '<textarea id="verReason" placeholder="Почему вы?" rows="3"></textarea><button onclick="reqVerify()" style="margin-top:8px;">Отправить</button>'}
            <button class="secondary small" onclick="nav('more')" style="margin-top:8px;">← Назад</button></div>`;
        }

        async function reqVerify() {
            const reason = document.getElementById('verReason')?.value.trim();
            if (!reason) return toast('Укажите причину');
            await sb.from('verification_requests').insert({ user_id: currentUser.id, reason, status: 'pending' });
            toast('Заявка отправлена!');
        }

        async function doLogout() {
            if (chatRefreshInterval) clearInterval(chatRefreshInterval);
            await sb.auth.signOut();
            currentUser = null;
            renderLogin();
        }

        // ЗАПУСК
        (async () => {
            const { data } = await sb.auth.getSession();
            if (data.session) {
                currentUser = data.session.user;
                await loadProfile();
                showMainApp();
            } else {
                renderLogin();
            }
        })();
    </script>
</body>
</html>
