<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Godmode</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💠</text></svg>">
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/service-worker.js');
      }
    </script>
    <style>
        :root { --bg:#f5f5f5; --surface:#fff; --surface2:#f8f9fa; --primary:#6366f1; --primary-soft:#eef2ff; --text:#1a1a1a; --text-secondary:#6b7280; --text-tertiary:#9ca3af; --border:#e5e7eb; --danger:#ef4444; --success:#10b981; --radius-sm:10px; --radius:16px; --radius-lg:20px; --shadow-sm:0 1px 2px rgba(0,0,0,0.04); --shadow:0 1px 3px rgba(0,0,0,0.06); --shadow-lg:0 8px 24px rgba(0,0,0,0.08); }
        .dark { --bg:#0f0f0f; --surface:#1a1a1a; --surface2:#222; --primary:#818cf8; --primary-soft:#1e1b4b; --text:#f1f1f1; --text-secondary:#a1a1aa; --text-tertiary:#71717a; --border:#27272a; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,sans-serif; background:var(--bg); color:var(--text); display:flex; justify-content:center; min-height:100dvh; -webkit-tap-highlight-color:transparent; -webkit-font-smoothing:antialiased; transition:background 0.3s,color 0.3s; }
        .app { width:100%; max-width:480px; min-height:100dvh; background:var(--bg); display:flex; flex-direction:column; }
        .screen-center { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100dvh; padding:24px; gap:14px; }
        .logo-icon { width:80px; height:80px; border-radius:22px; background:linear-gradient(135deg,var(--primary),#8b5cf6); display:flex; align-items:center; justify-content:center; box-shadow:0 8px 32px rgba(99,102,241,0.35); font-size:2.5rem; }
        .logo-text { font-size:2rem; font-weight:800; background:linear-gradient(135deg,var(--primary),#8b5cf6); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        input,textarea { width:100%; padding:14px 16px; border-radius:var(--radius); border:1.5px solid var(--border); font-size:1rem; background:var(--surface); color:var(--text); font-family:inherit; outline:none; }
        input:focus,textarea:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(99,102,241,0.15); }
        button { padding:14px 20px; border-radius:var(--radius); background:var(--primary); color:#fff; font-weight:600; font-size:1rem; border:none; cursor:pointer; display:inline-flex; align-items:center; gap:8px; justify-content:center; font-family:inherit; -webkit-tap-highlight-color:transparent; touch-action:manipulation; min-height:50px; }
        button:active { transform:scale(0.96); opacity:0.9; }
        button.secondary { background:var(--surface2); color:var(--text); border:1.5px solid var(--border); }
        button.ghost { background:transparent; color:var(--primary); padding:8px; min-height:auto; }
        button.danger { background:var(--danger); } button.success { background:var(--success); }
        button.small { padding:10px 16px; font-size:0.85rem; min-height:40px; border-radius:var(--radius-sm); }
        button.full { width:100%; } button.icon-only { width:42px; height:42px; min-height:42px; padding:0; border-radius:50%; }
        .error-box { background:#fef2f2; border:1.5px solid var(--danger); border-radius:var(--radius); padding:14px; color:var(--danger); font-size:0.9rem; width:100%; }
        .info-box { background:var(--primary-soft); border:1.5px solid var(--primary); border-radius:var(--radius); padding:16px; color:var(--primary); font-size:0.9rem; width:100%; text-align:center; }
        .header { background:var(--surface); padding:12px 16px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:50; }
        .header-logo { display:flex; align-items:center; gap:8px; font-weight:700; font-size:1.2rem; color:var(--primary); }
        .content { flex:1; overflow-y:auto; padding:12px 12px 100px; -webkit-overflow-scrolling:touch; }
        .card { background:var(--surface); border-radius:var(--radius-lg); padding:16px; margin-bottom:10px; border:1px solid var(--border); box-shadow:var(--shadow-sm); }
        .post-header { display:flex; align-items:center; gap:10px; margin-bottom:10px; cursor:pointer; }
        .avatar { width:42px; height:42px; border-radius:50%; background:linear-gradient(135deg,var(--primary),#8b5cf6); display:flex; align-items:center; justify-content:center; font-size:1rem; color:#fff; flex-shrink:0; font-weight:600; overflow:hidden; }
        .avatar img { width:100%; height:100%; object-fit:cover; }
        .post-actions { display:flex; gap:24px; margin-top:12px; color:var(--text-secondary); font-size:0.9rem; }
        .post-actions span { cursor:pointer; display:flex; align-items:center; gap:5px; padding:4px 8px; border-radius:20px; }
        .comment-box { margin-top:12px; padding-top:12px; border-top:1px solid var(--border); }
        .comment { display:flex; gap:8px; margin-bottom:8px; font-size:0.9rem; align-items:flex-start; }
        .chat-container { display:flex; flex-direction:column; height:70vh; background:var(--surface); border-radius:var(--radius-lg); overflow:hidden; border:1px solid var(--border); }
        .chat-list { max-height:35%; overflow-y:auto; border-bottom:1px solid var(--border); }
        .chat-list-item { padding:14px 16px; cursor:pointer; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; font-weight:500; }
        .chat-messages { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:2px; background:var(--surface2); }
        .date-divider { text-align:center; font-size:0.7rem; color:var(--text-tertiary); margin:12px 0; }
        .date-divider span { background:var(--surface2); padding:4px 12px; border-radius:10px; }
        .msg { padding:8px 14px; border-radius:18px; max-width:82%; word-break:break-word; font-size:0.9rem; line-height:1.4; position:relative; }
        .msg.sent { background:var(--primary); color:#fff; align-self:flex-end; border-bottom-right-radius:4px; }
        .msg.received { background:var(--surface); align-self:flex-start; border-bottom-left-radius:4px; box-shadow:var(--shadow-sm); }
        .msg .time { font-size:0.6rem; opacity:0.7; margin-top:2px; display:flex; align-items:center; gap:3px; justify-content:flex-end; }
        .msg .checks { font-size:0.6rem; } .msg .checks.read { color:#4fc3f7; }
        .msg img { max-width:220px; border-radius:12px; margin-top:4px; display:block; }
        .msg audio { max-width:180px; height:28px; margin-top:4px; }
        .msg-reactions { display:flex; gap:2px; margin-top:2px; flex-wrap:wrap; }
        .msg-reaction { background:var(--surface); border-radius:10px; padding:1px 6px; font-size:0.75rem; cursor:pointer; border:1px solid var(--border); }
        .msg-menu { position:absolute; background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow-lg); z-index:50; padding:4px; min-width:150px; display:none; }
        .msg-menu button { width:100%; justify-content:flex-start; padding:10px 14px; background:transparent; color:var(--text); border-radius:8px; }
        .chat-input-row { display:flex; gap:6px; padding:10px 12px; border-top:1px solid var(--border); background:var(--surface); align-items:center; }
        .chat-input-row input { flex:1; padding:10px 16px; border-radius:24px; border:1.5px solid var(--border); background:var(--surface2); }
        .emoji-picker { position:absolute; bottom:60px; right:8px; background:var(--surface); border-radius:var(--radius-lg); box-shadow:var(--shadow-lg); padding:10px; display:grid; grid-template-columns:repeat(7,1fr); gap:4px; z-index:100; border:1px solid var(--border); }
        .emoji-picker span { font-size:1.4rem; cursor:pointer; padding:6px; text-align:center; border-radius:8px; }
        .bottom-nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; background:var(--surface); border-top:1px solid var(--border); display:flex; justify-content:space-around; padding:6px 4px max(10px,env(safe-area-inset-bottom)); z-index:100; }
        .nav-item { display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; color:var(--text-tertiary); font-size:0.65rem; font-weight:500; padding:10px 14px; border-radius:12px; transition:0.15s; touch-action:manipulation; -webkit-tap-highlight-color:transparent; border:none; background:none; font-family:inherit; }
        .nav-item i { font-size:1.4rem; pointer-events:none; } .nav-item.active { color:var(--primary); }
        .badge-crown { color:#f59e0b; } .badge-verify { color:#6366f1; }
        .badge { display:inline-block; padding:3px 10px; border-radius:12px; font-size:0.7rem; font-weight:600; }
        .toast { position:fixed; bottom:120px; left:50%; transform:translateX(-50%); background:#1a1a1a; color:#fff; padding:12px 24px; border-radius:24px; font-size:0.85rem; font-weight:500; z-index:300; display:none; box-shadow:var(--shadow-lg); }
        .dark .toast { background:#f1f1f1; color:#1a1a1a; }
        .link-text { color:var(--primary); cursor:pointer; font-weight:600; }
        .user-row { display:flex; align-items:center; gap:12px; justify-content:space-between; }
        .settings-item { display:flex; align-items:center; justify-content:space-between; padding:16px; cursor:pointer; }
        .toggle-switch { width:48px; height:28px; background:var(--border); border-radius:14px; position:relative; cursor:pointer; transition:0.2s; flex-shrink:0; }
        .toggle-switch.active { background:var(--primary); }
        .toggle-switch::after { content:''; position:absolute; top:3px; left:3px; width:22px; height:22px; background:#fff; border-radius:50%; transition:0.2s; }
        .toggle-switch.active::after { left:23px; }
        .profile-banner { width:100%; height:140px; object-fit:cover; border-radius:var(--radius-lg) var(--radius-lg) 0 0; background:linear-gradient(135deg,#6366f1,#8b5cf6); }
        .profile-avatar-lg { width:84px; height:84px; border-radius:50%; border:4px solid var(--surface); object-fit:cover; margin-top:-42px; position:relative; z-index:2; background:linear-gradient(135deg,#6366f1,#8b5cf6); display:flex; align-items:center; justify-content:center; font-size:1.8rem; color:#fff; font-weight:700; overflow:hidden; }
        .profile-avatar-lg img { width:100%; height:100%; object-fit:cover; }
        .online-dot { width:12px; height:12px; background:var(--success); border-radius:50%; display:inline-block; border:2px solid var(--surface); position:absolute; bottom:2px; right:2px; z-index:3; animation:pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.5;} }
        .owner-chip { background:linear-gradient(135deg,#f59e0b,#d97706); color:#fff; padding:4px 10px; border-radius:20px; font-size:0.7rem; font-weight:700; letter-spacing:0.5px; display:inline-flex; align-items:center; gap:4px; }
        .reply-preview { border-left:3px solid var(--primary); padding-left:8px; margin-bottom:4px; font-size:0.8rem; opacity:0.8; cursor:pointer; }
    </style>
</head>
<body>
<div class="app" id="app"></div>
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL='https://byniblcezicrvyyqbafc.supabase.co';
const SUPABASE_KEY='sb_publishable_exBhK1ZwxY3uSoErm0jVFA_gR97KaAy';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let currentUser=null,currentPage='feed',currentChatId=null,chatChannel=null,typingChannel=null;
let theme=localStorage.getItem('godmode_theme')||'light';
if(theme==='dark')document.body.classList.add('dark');
let mediaRecorder=null,audioChunks=[],isRecording=false;
let pendingPostImage=null,replyToMessage=null,editingMessage=null;
let longPressTimer=null;

function toast(m,t='info'){const el=document.getElementById('toast');el.textContent=m;el.style.display='block';el.style.background=t==='error'?'#ef4444':t==='success'?'#10b981':'#1a1a1a';clearTimeout(el._t);el._t=setTimeout(()=>el.style.display='none',2500);}
function timeAgo(d){const s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return'сейчас';if(s<3600)return Math.floor(s/60)+' мин';if(s<86400)return Math.floor(s/3600)+' ч';return new Date(d).toLocaleDateString('ru-RU');}
function formatTime(d){return new Date(d).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});}
function formatDate(d){const now=new Date();const date=new Date(d);if(date.toDateString()===now.toDateString())return'Сегодня';const yesterday=new Date(now);yesterday.setDate(yesterday.getDate()-1);if(date.toDateString()===yesterday.toDateString())return'Вчера';return date.toLocaleDateString('ru-RU',{day:'numeric',month:'long'});}
function getInitials(n){return(n||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function avHtml(u){if(u?.avatar_url)return`<img src="${escapeHTML(u.avatar_url)}" alt="">`;return escapeHTML(getInitials(u?.full_name||'?'));}
function escapeHTML(str){const div=document.createElement('div');div.textContent=str||'';return div.innerHTML;}
function randAvatar(){return'https://i.pravatar.cc/150?img='+Math.floor(Math.random()*70);}

// ==================== АВТОРИЗАЦИЯ ====================
function renderLogin(err){
    let h='<div class="screen-center"><div class="logo-icon">💠</div><div class="logo-text">Godmode</div>';
    if(err)h+=`<div class="error-box">${escapeHTML(err)}</div>`;
    h+='<input id="loginEmail" type="email" placeholder="Email"><input id="loginPass" type="password" placeholder="Пароль"><button class="full" id="btnLogin">Войти</button><p style="color:var(--text-secondary);">Нет аккаунта? <span class="link-text" id="linkRegister">Регистрация</span></p></div>';
    document.getElementById('app').innerHTML=h;
    document.getElementById('btnLogin').onclick=doLogin;
    document.getElementById('linkRegister').onclick=renderRegister;
}

function renderRegister(err){
    let h='<div class="screen-center"><div class="logo-icon">💠</div><div class="logo-text">Godmode</div>';
    if(err)h+=`<div class="error-box">${escapeHTML(err)}</div>`;
    h+='<input id="regName" placeholder="Полное имя"><input id="regUser" placeholder="Юзернейм"><input id="regEmail" type="email" placeholder="Email"><input id="regPass" type="password" placeholder="Пароль (мин 6)"><button class="full" id="btnRegister">Зарегистрироваться</button><p style="color:var(--text-secondary);">Уже есть аккаунт? <span class="link-text" id="linkLogin">Войти</span></p></div>';
    document.getElementById('app').innerHTML=h;
    document.getElementById('btnRegister').onclick=doRegister;
    document.getElementById('linkLogin').onclick=renderLogin;
}

async function doLogin(){
    const email=document.getElementById('loginEmail').value.trim();const pass=document.getElementById('loginPass').value;
    if(!email||!pass)return renderLogin('Заполните все поля');
    const{data,error}=await sb.auth.signInWithPassword({email,password:pass});
    if(error)return renderLogin(error.message);
    currentUser=data.user;await loadProfile();showMainApp();
}

async function doRegister(){
    const name=document.getElementById('regName').value.trim();const username=document.getElementById('regUser').value.trim();const email=document.getElementById('regEmail').value.trim();const pass=document.getElementById('regPass').value;
    if(!name||!username||!email||!pass)return renderRegister('Заполните все поля');
    if(pass.length<6)return renderRegister('Пароль минимум 6 символов');
    const{data,error}=await sb.auth.signUp({email,password:pass});
    if(error){if(error.message.includes('already'))return renderLogin('Уже зарегистрирован. Войдите.');return renderRegister(error.message);}
    await sb.from('users').insert({id:data.user.id,email,username,full_name:name,avatar_url:randAvatar()});
    await sb.from('user_settings').insert({user_id:data.user.id});
    currentUser=data.user;
    currentUser.profile={id:data.user.id,email,username,full_name:name,is_owner:false,verified:false,avatar_url:randAvatar(),banner_url:'',bio:'',city:'',status:'online'};
    showMainApp();
}

async function loadProfile(){const{data}=await sb.from('users').select('*').eq('id',currentUser.id).single();if(data)currentUser.profile=data;}

// ==================== ГЛАВНЫЙ ЭКРАН ====================
function showMainApp(){
    if(chatChannel){sb.removeChannel(chatChannel);chatChannel=null;}
    if(typingChannel){sb.removeChannel(typingChannel);typingChannel=null;}
    let h='<div class="header"><div class="header-logo">💠 Godmode</div>';
    if(currentUser.profile?.is_owner)h+='<span class="owner-chip"><i class="fas fa-crown"></i> OWNER</span>';
    h+='</div><div class="content" id="mainContent"></div><div class="bottom-nav" id="bottomNav">';
    h+='<button class="nav-item active" data-page="feed"><i class="fas fa-house"></i>Лента</button>';
    h+='<button class="nav-item" data-page="friends"><i class="fas fa-users"></i>Друзья</button>';
    h+='<button class="nav-item" data-page="chats"><i class="fas fa-message"></i>Чаты</button>';
    h+='<button class="nav-item" data-page="profile"><i class="fas fa-circle-user"></i>Профиль</button>';
    h+='<button class="nav-item" data-page="settings"><i class="fas fa-grid-2"></i>Ещё</button>';
    h+='</div>';
    document.getElementById('app').innerHTML=h;
    document.getElementById('bottomNav').onclick=(e)=>{const btn=e.target.closest('.nav-item');if(btn)nav(btn.dataset.page);};
    document.getElementById('mainContent').addEventListener('click',globalClickHandler);
    document.getElementById('mainContent').addEventListener('touchstart',globalTouchStart);
    document.getElementById('mainContent').addEventListener('touchend',globalTouchEnd);
    nav('feed');
}

function nav(page){
    if(chatChannel){sb.removeChannel(chatChannel);chatChannel=null;}
    if(typingChannel){sb.removeChannel(typingChannel);typingChannel=null;}
    currentPage=page;currentChatId=null;
    document.querySelectorAll('#bottomNav .nav-item').forEach(n=>n.classList.remove('active'));
    const t=document.querySelector(`#bottomNav .nav-item[data-page="${page}"]`);
    if(t)t.classList.add('active');
    switch(page){
        case'feed':loadFeed();break;case'profile':loadProfile().then(loadProfilePage);break;
        case'friends':loadFriends();break;case'chats':loadChats();break;
        case'settings':loadSettings();break;case'editProfile':loadEditProfile();break;
        case'moderation':loadModeration();break;case'channels':loadChannels();break;
        case'music':loadMusic();break;case'verify':loadVerify();break;
    }
}

function globalTouchStart(e){const t=e.target.closest('.msg');if(t){longPressTimer=setTimeout(()=>showMessageMenu(t),500);}}
function globalTouchEnd(){clearTimeout(longPressTimer);}

function globalClickHandler(e){
    const t=e.target;
    if(t.closest('[data-uid]')){viewUserProfile(t.closest('[data-uid]').dataset.uid);return;}
    if(t.closest('[data-del]')){deletePost(t.closest('[data-del]').dataset.del);return;}
    if(t.closest('[data-like]')){likePost(t.closest('[data-like]').dataset.like);return;}
    if(t.closest('[data-comm]')){toggleComments(t.closest('[data-comm]').dataset.comm);return;}
    if(t.closest('[data-repost]')){repostPost(t.closest('[data-repost]').dataset.repost);return;}
    if(t.closest('[data-addcomm]')){addComment(t.closest('[data-addcomm]').dataset.addcomm);return;}
    if(t.closest('[data-uuid]')){viewUserProfile(t.closest('[data-uuid]').dataset.uuid);return;}
    if(t.closest('[data-fid]')){e.stopPropagation();toggleFriend(t.closest('[data-fid]').dataset.fid);return;}
    if(t.closest('[data-cid]')){openChat(t.closest('[data-cid]').dataset.cid);return;}
    if(t.closest('[data-app]')){approveVerification(t.closest('[data-app]').dataset.app,t.closest('[data-app]').dataset.uid);return;}
    if(t.closest('[data-rej]')){rejectVerification(t.closest('[data-rej]').dataset.rej);return;}
    if(t.closest('[data-react]')){addReaction(t.closest('[data-react]').dataset.react,t.closest('[data-react]').dataset.mid);return;}
    if(t.closest('[data-reply]')){replyToMsg(t.closest('[data-reply]').dataset.reply);return;}
    if(t.closest('[data-edit]')){editMsg(t.closest('[data-edit]').dataset.edit);return;}
    if(t.closest('[data-delmsg]')){deleteMsg(t.closest('[data-delmsg]').dataset.delmsg,true);return;}
}

// ==================== ЛЕНТА ====================
async function loadFeed(){
    const{data:posts}=await sb.from('posts').select('*, users!posts_user_id_fkey(*)').order('created_at',{ascending:false}).limit(30);
    let h=`<div class="card"><textarea id="postText" placeholder="Что у вас нового?" rows="2" style="border:none;padding:4px 0;background:transparent;resize:none;width:100%;"></textarea><div id="postPreview"></div><div style="display:flex;gap:8px;margin-top:8px;"><button class="secondary small" id="btnAddImage"><i class="fas fa-image"></i> Фото</button><button class="full" id="btnCreatePost"><i class="fas fa-paper-plane"></i> Опубликовать</button></div><input type="file" id="postImageInput" accept="image/*" style="display:none;"></div>`;
    if(posts)posts.forEach(p=>{
        const u=p.users||{};

}

async function createPost(){const t=document.getElementById('postText')?.value.trim();if(!t&&!pendingPostImage)return toast('Напишите текст или добавьте фото','error');let img=null;if(pendingPostImage){const b=await(await fetch(pendingPostImage)).blob();const p=`post-images/${currentUser.id}/${Date.now()}.jpg`;await sb.storage.from('post-images').upload(p,b);img=sb.storage.from('post-images').getPublicUrl(p).data.publicUrl;}await sb.from('posts').insert({user_id:currentUser.id,text:t||'',image_url:img});pendingPostImage=null;toast('✅ Опубликовано!','success');loadFeed();}
async function deletePost(id){if(!confirm('Удалить?'))return;await sb.from('posts').delete().eq('id',id);toast('Удалён');loadFeed();}
async function likePost(id){const{data:ex}=await sb.from('likes').select('*').eq('user_id',currentUser.id).eq('post_id',id).single();if(ex){await sb.from('likes').delete().eq('user_id',currentUser.id).eq('post_id',id);await sb.rpc('decrement_likes',{post_id:id});}else{await sb.from('likes').insert({user_id:currentUser.id,post_id:id});await sb.rpc('increment_likes',{post_id:id});}loadFeed();}
async function repostPost(id){const{data:o}=await sb.from('posts').select('*').eq('id',id).single();if(!o)return;await sb.from('posts').insert({user_id:currentUser.id,text:o.text,image_url:o.image_url,reposted_from:id});await sb.rpc('increment_reposts',{post_id:id});loadFeed();}
async function toggleComments(pid){const el=document.getElementById('comments-'+pid);if(!el)return;if(el.style.display==='block'){el.style.display='none';return;}el.style.display='block';const{data:c}=await sb.from('comments').select('*, users!comments_user_id_fkey(*)').eq('post_id',pid).order('created_at',{ascending:true});document.getElementById('cl-'+pid).innerHTML=(c||[]).map(x=>`<div class="comment"><div class="avatar avatar-sm">${avHtml(x.users)}</div><div><strong>${escapeHTML(x.users?.full_name||'?')}</strong><br>${escapeHTML(x.text)}</div></div>`).join('')||'<p>Нет комментариев</p>';}
async function addComment(pid){const input=document.getElementById('ci-'+pid);if(!input||!input.value.trim())return;await sb.from('comments').insert({user_id:currentUser.id,post_id:pid,text:input.value.trim()});await sb.rpc('increment_comments',{post_id:pid});input.value='';toggleComments(pid);setTimeout(()=>toggleComments(pid),50);}

function loadProfilePage(){const p=currentUser.profile||{};let h=`<div class="card" style="padding:0;overflow:hidden;"><img src="${escapeHTML(p.banner_url||'https://picsum.photos/480/160')}" class="profile-banner"><div style="padding:0 16px;position:relative;"><div style="position:relative;display:inline-block;"><div class="profile-avatar-lg">${avHtml(p)}<span class="online-dot"></span></div></div></div><div style="padding:12px 16px 16px;"><h2>${escapeHTML(p.full_name||'?')}${p.verified?' <i class="fas fa-circle-check badge-verify"></i>':''}${p.is_owner?' <span class="owner-chip"><i class="fas fa-crown"></i> OWNER</span>':''}</h2><p style="color:var(--text-secondary);">@${escapeHTML(p.username||'')}</p>${p.bio?`<p>${escapeHTML(p.bio)}</p>`:''}${p.city?`<p><i class="fas fa-map-pin"></i> ${escapeHTML(p.city)}</p>`:''}<button class="secondary full" onclick="nav('editProfile')"><i class="fas fa-pen"></i> Редактировать</button><button class="danger full" id="btnLogout" style="margin-top:8px;"><i class="fas fa-right-from-bracket"></i> Выйти</button></div></div>`;document.getElementById('mainContent').innerHTML=h;document.getElementById('btnLogout').onclick=doLogout;}
function loadEditProfile(){const p=currentUser.profile||{};let h='<h2>✏️ Редактирование</h2><div class="card">';h+=`<div style="display:flex;gap:12px;margin-bottom:12px;"><button class="secondary small" onclick="changeAvatar()"><i class="fas fa-camera"></i> Аватар</button><button class="secondary small" onclick="changeBanner()"><i class="fas fa-image"></i> Баннер</button></div>`;h+=`<input id="editName" value="${escapeHTML(p.full_name||'')}" placeholder="Имя" style="margin-bottom:8px;">`;h+=`<input id="editBio" value="${escapeHTML(p.bio||'')}" placeholder="О себе" style="margin-bottom:8px;">`;h+=`<input id="editCity" value="${escapeHTML(p.city||'')}" placeholder="Город" style="margin-bottom:8px;">`;h+='<button class="full" id="btnSaveProfile"><i class="fas fa-check"></i> Сохранить</button><button class="secondary full" onclick="nav(\'profile\')" style="margin-top:8px;">← Назад</button></div>';document.getElementById('mainContent').innerHTML=h;document.getElementById('btnSaveProfile').onclick=saveProfile;}
async function saveProfile(){const u={full_name:document.getElementById('editName').value.trim(),bio:document.getElementById('editBio').value.trim(),city:document.getElementById('editCity').value.trim()};await sb.from('users').update(u).eq('id',currentUser.id);Object.assign(currentUser.profile,u);toast('✅ Обновлено!','success');nav('profile');}
async function uploadFile(bucket,file){const p=`${currentUser.id}/${Date.now()}.jpg`;await sb.storage.from(bucket).upload(p,file,{upsert:true});return sb.storage.from(bucket).getPublicUrl(p).data.publicUrl;}
function changeAvatar(){const i=document.createElement('input');i.type='file';i.accept='image/*';i.onchange=async function(){const f=i.files[0];if(!f)return;const url=await uploadFile('avatars',f);if(url){await sb.from('users').update({avatar_url:url}).eq('id',currentUser.id);currentUser.profile.avatar_url=url;toast('✅ Аватар!','success');nav('editProfile');}};i.click();}
function changeBanner(){const i=document.createElement('input');i.type='file';i.accept='image/*';i.onchange=async function(){const f=i.files[0];if(!f)return;const url=await uploadFile('banners',f);if(url){await sb.from('users').update({banner_url:url}).eq('id',currentUser.id);currentUser.profile.banner_url=url;toast('✅ Баннер!','success');nav('editProfile');}};i.click();}

async function loadFriends(){const{data:all}=await sb.from('users').select('*').neq('id',currentUser.id).order('full_name');const{data:mf}=await sb.from('friends').select('friend_id').eq('user_id',currentUser.id);const fids=new Set((mf||[]).map(f=>f.friend_id));window._all=all||[];window._fids=fids;document.getElementById('mainContent').innerHTML='<h2>👥 Пользователи</h2><input id="su" placeholder="🔍 Поиск..." style="margin-bottom:10px;border-radius:24px;"><div id="ul"></div>';document.getElementById('su').oninput=()=>{const q=document.getElementById('su').value.toLowerCase();renderUsersList(window._all.filter(u=>u.full_name.toLowerCase().includes(q)||u.username.toLowerCase().includes(q)));};renderUsersList(window._all);}
function renderUsersList(users){document.getElementById('ul').innerHTML=users.map(u=>`<div class="card user-row"><div data-uuid="${u.id}" style="display:flex;align-items:center;gap:12px;flex:1;cursor:pointer;"><div class="avatar">${avHtml(u)}</div><div><strong>${escapeHTML(u.full_name)}</strong>${u.verified?' <i class="fas fa-circle-check badge-verify"></i>':''}<div>@${escapeHTML(u.username)}</div></div></div><button class="small ${window._fids.has(u.id)?'secondary':'success'}" data-fid="${u.id}">${window._fids.has(u.id)?'<i class="fas fa-user-minus"></i>':'<i class="fas fa-user-plus"></i> Добавить'}</button></div>`).join('');}
async function toggleFriend(fid){if(window._fids.has(fid)){await sb.from('friends').delete().eq('user_id',currentUser.id).eq('friend_id',fid);window._fids.delete(fid);}else{await sb.from('friends').insert({user_id:currentUser.id,friend_id:fid});window._fids.add(fid);}renderUsersList(window._all);}
async function viewUserProfile(uid){if(uid===currentUser.id){nav('profile');return;}const{data:u}=await sb.from('users').select('*').eq('id',uid).single();if(!u)return;document.getElementById('mainContent').innerHTML=`<div class="card" style="padding:0;"><img src="${escapeHTML(u.banner_url||'')}" class="profile-banner"><div style="padding:12px 16px;"><div class="profile-avatar-lg" style="margin-top:-42px;">${avHtml(u)}</div><h2>${escapeHTML(u.full_name)}${u.verified?' <i class="fas fa-circle-check badge-verify"></i>':''}${u.is_owner?' <span class="owner-chip">OWNER</span>':''}</h2><p>@${escapeHTML(u.username)}</p>${u.bio?`<p>${escapeHTML(u.bio)}</p>`:''}${u.city?`<p><i class="fas fa-map-pin"></i> ${escapeHTML(u.city)}</p>`:''}<button class="small" onclick="startChat('${uid}','${escapeHTML(u.full_name)}')">Написать</button><button class="secondary full" onclick="nav('friends')" style="margin-top:8px;">← Назад</button></div></div>`;}

async function loadChats(){
    if(chatChannel){sb.removeChannel(chatChannel);chatChannel=null;}
    if(typingChannel){sb.removeChannel(typingChannel);typingChannel=null;}
    const{data:chats}=await sb.from('chats').select('*').contains('participants',[currentUser.id]).order('created_at',{ascending:false});
    if(!chats||chats.length===0){document.getElementById('mainContent').innerHTML='<div class="info-box">💬 Нет чатов<br><br>📌 Друзья → Написать</div><button class="secondary full" onclick="nav(\'friends\')">К друзьям</button>';return;}
    let h='<div class="chat-container"><div class="chat-list" id="clist"></div><div class="chat-messages" id="cmsg"><p>Выберите чат</p></div><div class="chat-input-row" id="cinput" style="display:none;"></div></div>';
    document.getElementById('mainContent').innerHTML=h;
    document.getElementById('clist').innerHTML=chats.map(c=>`<div class="chat-list-item" data-cid="${c.id}"><div class="avatar avatar-sm">${getInitials(c.name||'?')}</div><span>${escapeHTML(c.name||'Чат')}</span></div>`).join('');
}

function openChat(cid){
    if(chatChannel){sb.removeChannel(chatChannel);chatChannel=null;}
    if(typingChannel){sb.removeChannel(typingChannel);typingChannel=null;}
    currentChatId=cid;
    document.querySelectorAll('.chat-list-item').forEach(el=>el.classList.remove('active'));
    document.querySelector(`[data-cid="${cid}"]`)?.classList.add('active');
    document.getElementById('cinput').style.display='flex';
    document.getElementById('cinput').innerHTML=`
        <button class="ghost icon-only" id="btnEmoji"><i class="fas fa-face-smile" style="color:var(--text-secondary);"></i></button>
        <button class="ghost icon-only" id="btnAttach"><i class="fas fa-paperclip" style="color:var(--text-secondary);"></i></button>
        <input id="mi" placeholder="Сообщение..." autocomplete="off">
        <button class="ghost icon-only" id="btnVoice"><i class="fas fa-microphone" style="color:var(--text-secondary);"></i></button>
        <button class="ghost icon-only" id="bsm"><i class="fas fa-paper-plane" style="color:var(--primary);"></i></button>
    `;
    document.getElementById('bsm').onclick=sendMessage;
    document.getElementById('mi').onkeydown=e=>{if(e.key==='Enter')sendMessage();};
    document.getElementById('btnEmoji').onclick=toggleEmojiPicker;
    document.getElementById('btnAttach').onclick=sendChatImage;
    document.getElementById('btnVoice').onclick=toggleVoiceRecord;
    refreshMessages(cid);
    chatChannel=sb.channel(`chat-${cid}`).on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:`chat_id=eq.${cid}`},payload=>{appendMessage(payload.new);markAsRead(cid);}).subscribe();
}

async function refreshMessages(cid){
    const{data:msgs}=await sb.from('messages').select('*, users!messages_from_user_id_fkey(*), reply_to_msg:messages!messages_reply_to_fkey(*, users!messages_from_user_id_fkey(*))').eq('chat_id',cid).order('created_at',{ascending:true});
    const c=document.getElementById('cmsg');if(!c)return;
    let html='',lastDate='';
    (msgs||[]).forEach(m=>{const d=formatDate(m.created_at);if(d!==lastDate){html+=`<div class="date-divider"><span>${d}</span></div>`;lastDate=d;}html+=renderMessage(m);});
    c.innerHTML=html||'<p style="text-align:center;">Нет сообщений</p>';c.scrollTop=c.scrollHeight;
}

function renderMessage(m){
    let content='',replyHTML='';
    if(m.reply_to_msg&&m.reply_to){replyHTML=`<div class="reply-preview" onclick="scrollToMessage('${m.reply_to}')">↩ ${escapeHTML((m.reply_to_msg.text||'').substring(0,50))}</div>`;}
    if(m.attachment_type==='image'&&m.attachment_url)content=`<img src="${escapeHTML(m.attachment_url)}" alt="фото">`;
    else if(m.attachment_type==='voice'&&m.attachment_url)content=`<audio controls><source src="${escapeHTML(m.attachment_url)}" type="audio/webm"></audio>`;
    else content=escapeHTML(m.text||'');
    const time=formatTime(m.created_at);
    const checks=m.from_user_id===currentUser.id?`<span class="checks ${m.read_at?'read':''}">${m.read_at?'✓✓':'✓'}</span>`:'';
    return`<div class="msg ${m.from_user_id===currentUser.id?'sent':'received'}" id="msg-${m.id}" data-msgid="${m.id}">${m.from_user_id!==currentUser.id?`<strong style="font-size:0.7rem;">${escapeHTML(m.users?.full_name||'?')}</strong><br>`:''}${replyHTML}${content}<div class="time">${time} ${checks}</div></div>`;
}

function appendMessage(m){const c=document.getElementById('cmsg');if(!c)return;c.insertAdjacentHTML('beforeend',renderMessage(m));c.scrollTop=c.scrollHeight;}
async function markAsRead(cid){await sb.from('messages').update({read_at:new Date().toISOString()}).eq('chat_id',cid).neq('from_user_id',currentUser.id).is('read_at',null);}

async function sendMessage(){
    const input=document.getElementById('mi');if(!input||!input.value.trim()||!currentChatId)return;
    const text=input.value.trim();input.value='';
    if(editingMessage){await sb.from('messages').update({text,edited_at:new Date().toISOString()}).eq('id',editingMessage.id);editingMessage=null;refreshMessages(currentChatId);return;}
    const msgData={chat_id:currentChatId,from_user_id:currentUser.id,text};
    if(replyToMessage){msgData.reply_to=replyToMessage.id;replyToMessage=null;}
    await sb.from('messages').insert(msgData);
}

function replyToMsg(msgId){replyToMessage={id:msgId};openChat(currentChatId);document.getElementById('mi')?.focus();}
function editMsg(msgId){sb.from('messages').select('*').eq('id',msgId).single().then(({data})=>{if(data&&data.from_user_id===currentUser.id){editingMessage=data;openChat(currentChatId);document.getElementById('mi').value=data.text||'';document.getElementById('mi').focus();}});}
async function deleteMsg(msgId,forEveryone){if(forEveryone){await sb.from('messages').update({deleted_for_everyone:true}).eq('id',msgId);refreshMessages(currentChatId);}}
async function addReaction(emoji,msgId){await sb.from('message_reactions').upsert({message_id:msgId,user_id:currentUser.id,reaction:emoji});refreshMessages(currentChatId);}
function scrollToMessage(msgId){const el=document.getElementById('msg-'+msgId);if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.style.background='var(--primary-soft)';setTimeout(()=>el.style.background='',1500);}}

function showMessageMenu(msgEl){
    const msgId=msgEl.dataset.msgid;const isMine=msgEl.classList.contains('sent');
    closeAllMenus();
    const menu=document.createElement('div');menu.className='msg-menu';menu.id='msgMenu';menu.style.display='block';
    menu.style.position='fixed';menu.style.bottom='100px';menu.style.left='50%';menu.style.transform='translateX(-50%)';
    menu.innerHTML=`
        <button onclick="addReaction('❤️','${msgId}');closeAllMenus();">❤️</button>
        <button onclick="addReaction('🔥','${msgId}');closeAllMenus();">🔥</button>
        <button onclick="addReaction('👍','${msgId}');closeAllMenus();">👍</button>
        <button onclick="addReaction('😢','${msgId}');closeAllMenus();">😢</button>
        <button data-reply="${msgId}" onclick="replyToMsg('${msgId}');closeAllMenus();"><i class="fas fa-reply"></i> Ответить</button>
        ${isMine?`<button data-edit="${msgId}" onclick="editMsg('${msgId}');closeAllMenus();"><i class="fas fa-pen"></i> Изменить</button>`:''}
        <button data-delmsg="${msgId}" onclick="deleteMsg('${msgId}',true);closeAllMenus();"><i class="fas fa-trash"></i> Удалить</button>
    `;
    document.body.appendChild(menu);
    setTimeout(()=>document.addEventListener('click',closeAllMenus,{once:true}),0);
}

function closeAllMenus(){const m=document.getElementById('msgMenu');if(m)m.remove();const p=document.getElementById('emojiPicker');if(p)p.remove();}

function toggleEmojiPicker(){
    let picker=document.getElementById('emojiPicker');if(picker){picker.remove();return;}
    const emojis=['😀','😂','❤️','🔥','👍','😢','😡','🎉','💀','👀','🙏','💪','🤔','😎','🥳','🤯','😴','🤗','🫡','💩','👋','🫶','✨','🌟'];
    picker=document.createElement('div');picker.id='emojiPicker';picker.className='emoji-picker';
    picker.innerHTML=emojis.map(e=>`<span>${e}</span>`).join('');
    document.getElementById('cinput').appendChild(picker);
    picker.querySelectorAll('span').forEach(s=>{s.onclick=()=>{document.getElementById('mi').value+=s.textContent;picker.remove();};});
    setTimeout(()=>document.addEventListener('click',function close(e){if(!picker.contains(e.target)&&e.target.id!=='btnEmoji'){picker.remove();document.removeEventListener('click',close);}},0));
}

function sendChatImage(){
    const input=document.createElement('input');input.type='file';input.accept='image/*';
    input.onchange=async function(){const file=input.files[0];if(!file)return;toast('📷 Загрузка...');const path=`chat-images/${currentChatId}/${Date.now()}.jpg`;await sb.storage.from('chat-images').upload(path,file);const url=sb.storage.from('chat-images').getPublicUrl(path).data.publicUrl;const{data:msg}=await sb.from('messages').insert({chat_id:currentChatId,from_user_id:currentUser.id,text:'📷 Фото',attachment_url:url,attachment_type:'image'}).select('*, users!messages_from_user_id_fkey(*)').single();if(msg)appendMessage(msg);};input.click();
}

function toggleVoiceRecord(){
    if(isRecording){stopVoiceRecord();return;}
    if(!navigator.mediaDevices)return toast('Нет микрофона','error');
    navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
        mediaRecorder=new MediaRecorder(stream);audioChunks=[];
        mediaRecorder.ondataavailable=e=>audioChunks.push(e.data);
        mediaRecorder.onstop=async()=>{const blob=new Blob(audioChunks,{type:'audio/webm'});const path=`voice-messages/${currentChatId}/${Date.now()}.webm`;await sb.storage.from('voice-messages').upload(path,blob);const url=sb.storage.from('voice-messages').getPublicUrl(path).data.publicUrl;const{data:msg}=await sb.from('messages').insert({chat_id:currentChatId,from_user_id:currentUser.id,text:'🎤 Голосовое',attachment_url:url,attachment_type:'voice'}).select('*, users!messages_from_user_id_fkey(*)').single();if(msg)appendMessage(msg);stream.getTracks().forEach(t=>t.stop());};
        mediaRecorder.start();isRecording=true;document.getElementById('btnVoice').innerHTML='<i class="fas fa-stop" style="color:var(--danger);"></i>';toast('🔴 Запись...');
    }).catch(()=>toast('Нет доступа','error'));
}

function stopVoiceRecord(){if(mediaRecorder&&isRecording){mediaRecorder.stop();isRecording=false;document.getElementById('btnVoice').innerHTML='<i class="fas fa-microphone" style="color:var(--text-secondary);"></i>';toast('✅ Отправлено!','success');}}

async function startChat(uid,uname){const{data:ex}=await sb.from('chats').select('*').contains('participants',[currentUser.id,uid]).single();if(ex){nav('chats');setTimeout(()=>openChat(ex.id),300);return;}const{data:chat}=await sb.from('chats').insert({type:'dm',name:uname,owner_id:currentUser.id,participants:[currentUser.id,uid]}).select().single();if(chat){nav('chats');setTimeout(()=>openChat(chat.id),300);}}

function loadSettings(){
    let h='<h2>⚙️ Настройки</h2>';
    h+=`<div class="card"><div class="settings-item" id="toggleTheme"><div><strong>🌙 Тёмная тема</strong></div><div class="toggle-switch ${theme==='dark'?'active':''}" id="themeSwitch"></div></div></div>`;
    if(currentUser.profile?.is_owner)h+='<div class="card" onclick="nav(\'moderation\')"><div class="settings-item"><div><strong>👑 Панель модерации</strong></div><i class="fas fa-chevron-right"></i></div></div>';
    h+='<div class="card" onclick="nav(\'channels\')"><div class="settings-item"><div><strong>📢 Каналы</strong></div><i class="fas fa-chevron-right"></i></div></div>';
    h+='<div class="card" onclick="nav(\'verify\')"><div class="settings-item"><div><strong>✅ Верификация</strong></div><i class="fas fa-chevron-right"></i></div></div>';
    document.getElementById('mainContent').innerHTML=h;document.getElementById('toggleTheme').onclick=toggleTheme;
}
function toggleTheme(){theme=theme==='dark'?'light':'dark';localStorage.setItem('godmode_theme',theme);document.body.classList.toggle('dark',theme==='dark');loadSettings();}

async function loadModeration(){const{data}=await sb.from('verification_requests').select('*, users!verification_requests_user_id_fkey(*)').order('created_at',{ascending:false});let h='<h2>👑 Модерация</h2>';if(data&&data.length>0){data.forEach(r=>{const u=r.users||{};h+=`<div class="card"><strong>${escapeHTML(u.full_name||'?')}</strong><p>${escapeHTML(r.reason||'')}</p>${r.status==='pending'?`<button class="success small" data-app="${r.id}" data-uid="${r.user_id}">✓</button><button class="danger small" data-rej="${r.id}">✗</button>`:`<span class="badge badge-${r.status==='approved'?'approved':'rejected'}">${r.status==='approved'?'Одобрено':'Отклонено'}</span>`}</div>`;});}else h+='<p>Нет заявок</p>';h+='<button class="secondary full" onclick="nav(\'settings\')">← Назад</button>';document.getElementById('mainContent').innerHTML=h;}
async function approveVerification(verId,userId){await sb.from('verification_requests').update({status:'approved'}).eq('id',verId);await sb.from('users').update({verified:true}).eq('id',userId);toast('✅ Одобрено!','success');loadModeration();}
async function rejectVerification(verId){await sb.from('verification_requests').update({status:'rejected'}).eq('id',verId);toast('Отклонено');loadModeration();}

function loadChannels(){document.getElementById('mainContent').innerHTML='<div class="card"><h2>📢 Каналы</h2><button class="full" onclick="createChannel()">Создать</button><button class="secondary full" onclick="nav(\'settings\')">← Назад</button></div>';}
async function createChannel(){const n=prompt('Название:'),t=prompt('Тема:');if(n&&t)await sb.from('channels').insert({owner_id:currentUser.id,name:n,theme:t});toast('Создан!');}

function loadVerify(){const p=currentUser.profile||{};document.getElementById('mainContent').innerHTML=`<div class="card"><h2>✅ Верификация</h2>${p.is_owner?'<p class="badge-crown">👑 Владелец</p>':p.verified?'<p class="badge-verify">✓ Верифицирован</p>':'<textarea id="vr" placeholder="Причина"></textarea><button class="full" onclick="reqVerify()">Отправить</button>'}<button class="secondary full" onclick="nav(\'settings\')">← Назад</button></div>`;}
async function reqVerify(){const r=document.getElementById('vr')?.value.trim();if(r)await sb.from('verification_requests').insert({user_id:currentUser.id,reason:r});toast('Отправлено!');nav('settings');}

async function doLogout(){if(chatChannel)sb.removeChannel(chatChannel);if(typingChannel)sb.removeChannel(typingChannel);await sb.auth.signOut();currentUser=null;renderLogin();}

// ==================== ЗАПУСК ====================
(async()=>{const{data}=await sb.auth.getSession();if(data.session){currentUser=data.session.user;await loadProfile();showMainApp();}else renderLogin();})();
</script>
</body>
</html>
