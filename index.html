<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Telegram</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Telegram">
  <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg">

  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    :root {
      --tg-bg: #0e1621;
      --tg-header-bg: #17212b;
      --tg-sidebar: #17212b;
      --tg-hover: #202b36;
      --tg-border: #0f141c;
      --tg-accent: #2481cc;
      --tg-accent-hover: #1b6cae;
      --tg-text: #f5f5f5;
      --tg-text-muted: #707579;
      --tg-bubble-out: #2b5278;
      --tg-bubble-in: #182533;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
    
    body {
      font-family: 'Roboto', sans-serif;
      background-color: #000;
      color: var(--tg-text);
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .app-container {
      width: 100%;
      max-width: 480px;
      background: var(--tg-bg);
      height: 100vh;
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Верхний бар */
    .tg-header {
      height: 56px;
      background: var(--tg-header-bg);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      z-index: 10;
      border-bottom: 1px solid var(--tg-border);
    }

    .tg-header-title {
      font-size: 18px;
      font-weight: 500;
      color: var(--tg-text);
    }

    .icon-btn {
      background: none;
      border: none;
      color: var(--tg-text-muted);
      font-size: 20px;
      cursor: pointer;
      padding: 8px;
      border-radius: 50%;
    }
    .icon-btn:hover { background: var(--tg-hover); color: var(--tg-text); }

    /* Контент вкладки */
    .tab-content {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .hidden { display: none !important; }

    /* Список чатов */
    .chat-item {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      gap: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .chat-item:hover { background: var(--tg-hover); }

    .chat-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      object-fit: cover;
      background: #2b5278;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 500;
      font-size: 20px;
      color: #fff;
      flex-shrink: 0;
    }

    .chat-info {
      flex: 1;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      padding-bottom: 10px;
    }
    .chat-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .chat-name { font-weight: 500; font-size: 16px; color: var(--tg-text); }
    .chat-time { font-size: 12px; color: var(--tg-text-muted); }
    .chat-preview { font-size: 14px; color: var(--tg-text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 250px; }

    /* Профиль (Экран канала / Юзера) */
    .profile-header-bg {
      height: 140px;
      background: var(--tg-accent);
      position: relative;
    }
    .profile-details {
      padding: 0 16px;
      position: relative;
      margin-bottom: 20px;
    }
    .profile-avatar-large {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 3px solid var(--tg-bg);
      object-fit: cover;
      margin-top: -40px;
      background: #2b5278;
    }
    .profile-name { font-size: 20px; font-weight: 700; margin-top: 8px; display: flex; align-items: center; gap: 6px; }
    .profile-username { color: var(--tg-text-muted); font-size: 14px; margin-top: 2px; }
    .profile-bio { font-size: 14px; margin-top: 12px; color: var(--tg-text); line-height: 1.4; }

    /* Посты (Лента канала) */
    .post-card {
      background: var(--tg-header-bg);
      padding: 12px 16px;
      margin-bottom: 8px;
    }
    .post-header { display: flex; justify-content: space-between; font-size: 12px; color: var(--tg-text-muted); margin-bottom: 6px; }
    .post-text { font-size: 14px; color: var(--tg-text); line-height: 1.4; }

    /* Поле ввода поста/сообщения */
    .composer {
      padding: 10px 16px;
      background: var(--tg-header-bg);
      display: flex;
      gap: 10px;
      align-items: center;
      border-top: 1px solid var(--tg-border);
    }
    .composer input, .composer textarea {
      flex: 1;
      background: var(--tg-bg);
      border: none;
      color: var(--tg-text);
      padding: 10px 14px;
      border-radius: 20px;
      outline: none;
      font-size: 14px;
      font-family: inherit;
    }
    .send-btn {
      background: var(--tg-accent);
      color: #fff;
      border: none;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .send-btn:active { background: var(--tg-accent-hover); }

    /* Нижняя навигация Telegram */
    .tg-nav {
      height: 52px;
      background: var(--tg-header-bg);
      border-top: 1px solid var(--tg-border);
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 10;
    }
    .tg-nav-item {
      flex: 1;
      background: none;
      border: none;
      color: var(--tg-text-muted);
      font-size: 11px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      cursor: pointer;
      font-weight: 500;
    }
    .tg-nav-item.active { color: var(--tg-accent); }
    .tg-nav-item span { font-size: 18px; }

    /* Модальные окна */
    .modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      display: none; align-items: center; justify-content: center; z-index: 100;
    }
    .modal.active { display: flex; }
    .modal-box {
      background: var(--tg-header-bg);
      padding: 24px;
      border-radius: 14px;
      width: 85%;
      max-width: 360px;
    }
    .modal-box h3 { margin-bottom: 16px; font-weight: 500; }
    .modal-box input, .modal-box textarea {
      width: 100%; background: var(--tg-bg); border: 1px solid var(--tg-border);
      color: #fff; padding: 10px 12px; border-radius: 8px; margin-bottom: 12px; outline: none; font-family: inherit;
    }
    .btn-tg {
      width: 100%; background: var(--tg-accent); border: none; color: #fff;
      padding: 10px; border-radius: 8px; font-weight: 500; cursor: pointer;
    }
    .btn-tg:active { background: var(--tg-accent-hover); }

    .badge-verified { color: var(--tg-accent); font-size: 15px; }
  </style>
</head>
<body>

<div class="app-container">
  
  <!-- ШАПКА -->
  <header class="tg-header">
    <div id="header-title" class="tg-header-title">Чаты</div>
    <div style="display:flex; gap:4px;">
      <button class="icon-btn" onclick="openModal('modal-edit')" title="Изменить профиль">✏️</button>
      <button class="icon-btn" onclick="logout()" title="Выйти">🚪</button>
    </div>
  </header>

  <!-- ВКЛАДКА: ЧАТЫ -->
  <div id="tab-chats" class="tab-content">
    <div class="chat-item" onclick="alert('Диалоги в разработке')">
      <div class="chat-avatar" style="background:#d75a4a;">T</div>
      <div class="chat-info">
        <div class="chat-row">
          <span class="chat-name">Telegram Team</span>
          <span class="chat-time">12:00</span>
        </div>
        <div class="chat-preview">Добро пожаловать в мессенджер!</div>
      </div>
    </div>
  </div>

  <!-- ВКЛАДКА: ПРОФИЛЬ / КАНАЛ -->
  <div id="tab-profile" class="tab-content hidden">
    <div id="banner" class="profile-header-bg" onclick="document.getElementById('banner-file').click()"></div>
    <input type="file" id="banner-file" class="hidden" accept="image/*" onchange="uploadImg(event, 'banner')">

    <div class="profile-details">
      <img id="avatar" class="profile-avatar-large" src="" onclick="document.getElementById('avatar-file').click()">
      <input type="file" id="avatar-file" class="hidden" accept="image/*" onchange="uploadImg(event, 'avatar')">

      <div class="profile-name">
        <span id="disp-fullname">Загрузка...</span>
        <span id="disp-verified" class="badge-verified hidden">✓</span>
      </div>
      <div id="disp-username" class="profile-username">@username</div>
      <div id="disp-bio" class="profile-bio">Информация о профиле...</div>
    </div>

    <!-- Поле написания поста -->
    <div class="composer">
      <textarea id="post-text" placeholder="Сообщение..." rows="1"></textarea>
      <button class="send-btn" onclick="addPost()">➤</button>
    </div>

    <div id="posts-list"></div>
  </div>

  <!-- ВКЛАДКА: НАСТРОЙКИ -->
  <div id="tab-settings" class="tab-content hidden" style="padding:16px;">
    <h3 style="margin-bottom: 16px; font-weight:500;">Настройки</h3>
    <button class="btn-tg" style="background:#e11d48;" onclick="logout()">Выйти из аккаунта</button>
  </div>

  <!-- НИЖНЯЯ ПАНЕЛЬ TELEGRAM -->
  <nav class="tg-nav">
    <button class="tg-nav-item" onclick="switchTab('chats', 'Чаты', this)"><span>💬</span>Чаты</button>
    <button class="tg-nav-item active" onclick="switchTab('profile', 'Профиль', this)"><span>👤</span>Профиль</button>
    <button class="tg-nav-item" onclick="switchTab('settings', 'Настройки', this)"><span>⚙️</span>Настройки</button>
  </nav>

</div>

<!-- МОДАЛКА ВХОДА / РЕГИСТРАЦИИ -->
<div id="modal-auth" class="modal">
  <div class="modal-box">
    <div style="display:flex; gap:8px; margin-bottom:16px;">
      <button class="btn-tg" id="btn-mode-login" onclick="setAuthMode('login')">Вход</button>
      <button class="btn-tg" id="btn-mode-reg" style="background:var(--tg-hover);" onclick="setAuthMode('reg')">Регистрация</button>
    </div>
    <div id="reg-name-field" class="hidden">
      <input type="text" id="auth-name" placeholder="Имя">
    </div>
    <input type="text" id="auth-nick" placeholder="Юзернейм (@username)">
    <input type="password" id="auth-pass" placeholder="Пароль">
    <button class="btn-tg" id="btn-auth-submit" onclick="handleAuth()">Войти</button>
  </div>
</div>

<!-- МОДАЛКА РЕДАКТИРОВАНИЯ -->
<div id="modal-edit" class="modal">
  <div class="modal-box">
    <h3>Изменить профиль</h3>
    <input type="text" id="edit-fullname" placeholder="Имя">
    <textarea id="edit-bio" placeholder="О себе" rows="2"></textarea>
    <button class="btn-tg" onclick="saveProfile()">Сохранить</button>
    <button class="btn-tg" style="background:transparent; color:var(--tg-text-muted); margin-top:8px;" onclick="closeModal('modal-edit')">Отмена</button>
  </div>
</div>

<script>
  // ЗАМЕНИТЬ НА СВОИ ДАННЫЕ SUPABASE
  const SUPABASE_URL = 'ТВОЙ_SUPABASE_URL';
  const SUPABASE_KEY = 'ТВОЙ_SUPABASE_ANON_KEY';
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const DEFAULT_AVATAR = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 24 24' fill='%23ffffff'><path d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z'/></svg>";

  let currentAuthMode = 'login';
  let currentUser = null;

  function normalizeUsername(raw) {
    if (!raw) return '';
    let clean = raw.trim().toLowerCase();
    if (!clean.startsWith('@')) clean = '@' + clean;
    return clean;
  }

  window.onload = async () => {
    const savedNick = localStorage.getItem('godmode_active_nick');
    if (savedNick) {
      await fetchUserFromSupabase(savedNick);
    } else {
      openModal('modal-auth');
    }
  };

  async function fetchUserFromSupabase(nick) {
    const { data, error } = await supabaseClient
      .from('profiles')
      .select('*')
      .eq('username', nick)
      .single();

    if (data && !error) {
      currentUser = data;
      closeModal('modal-auth');
      renderProfile();
    } else {
      localStorage.removeItem('godmode_active_nick');
      openModal('modal-auth');
    }
  }

  function setAuthMode(mode) {
    currentAuthMode = mode;
    const btnLogin = document.getElementById('btn-mode-login');
    const btnReg = document.getElementById('btn-mode-reg');
    if (mode === 'login') {
      btnLogin.style.background = 'var(--tg-accent)';
      btnReg.style.background = 'var(--tg-hover)';
      document.getElementById('reg-name-field').classList.add('hidden');
      document.getElementById('btn-auth-submit').innerText = 'Войти';
    } else {
      btnReg.style.background = 'var(--tg-accent)';
      btnLogin.style.background = 'var(--tg-hover)';
      document.getElementById('reg-name-field').classList.remove('hidden');
      document.getElementById('btn-auth-submit').innerText = 'Зарегистрироваться';
    }
  }

  async function handleAuth() {
    const rawNick = document.getElementById('auth-nick').value;
    const pass = document.getElementById('auth-pass').value.trim();
    if (!rawNick || !pass) return alert('Заполните все поля!');
    const nick = normalizeUsername(rawNick);

    if (currentAuthMode === 'login') {
      const { data, error } = await supabaseClient
        .from('profiles').select('*').eq('username', nick).single();
      if (!data || error) return alert('Пользователь не найден!');
      if (data.password !== pass) return alert('Неверный пароль!');
      currentUser = data;
    } else {
      const name = document.getElementById('auth-name').value.trim();
      if (!name) return alert('Введите имя!');
      const { data: existing } = await supabaseClient.from('profiles').select('username').eq('username', nick).single();
      if (existing) return alert('Этот юзернейм занят!');

      currentUser = {
        username: nick, password: pass, fullname: name,
        bio: 'Мессенджер Telegram', is_verified: nick === '@absolute_godmode',
        avatar: DEFAULT_AVATAR, banner: '', posts: []
      };
      await supabaseClient.from('profiles').insert([currentUser]);
    }

    localStorage.setItem('godmode_active_nick', currentUser.username);
    closeModal('modal-auth');
    renderProfile();
  }

  function logout() {
    localStorage.removeItem('godmode_active_nick');
    currentUser = null;
    openModal('modal-auth');
  }

  async function saveUserData() {
    if (!currentUser) return;
    await supabaseClient.from('profiles').update({
      fullname: currentUser.fullname, bio: currentUser.bio,
      avatar: currentUser.avatar, banner: currentUser.banner, posts: currentUser.posts
    }).eq('username', currentUser.username);
  }

  function renderProfile() {
    if (!currentUser) return;
    document.getElementById('disp-fullname').innerText = currentUser.fullname;
    document.getElementById('disp-username').innerText = currentUser.username;
    document.getElementById('disp-bio').innerText = currentUser.bio || '';
    
    if (currentUser.is_verified) {
      document.getElementById('disp-verified').classList.remove('hidden');
    } else {
      document.getElementById('disp-verified').classList.add('hidden');
    }

    document.getElementById('avatar').src = currentUser.avatar || DEFAULT_AVATAR;
    if (currentUser.banner) {
      document.getElementById('banner').style.backgroundImage = `url('${currentUser.banner}')`;
    }
    renderPosts();
  }

  async function saveProfile() {
    currentUser.fullname = document.getElementById('edit-fullname').value.trim();
    currentUser.bio = document.getElementById('edit-bio').value.trim();
    await saveUserData();
    renderProfile();
    closeModal('modal-edit');
  }

  function uploadImg(e, type) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (evt) => {
      if (type === 'avatar') currentUser.avatar = evt.target.result;
      if (type === 'banner') currentUser.banner = evt.target.result;
      await saveUserData();
      renderProfile();
    };
    reader.readAsDataURL(file);
  }

  async function addPost() {
    const txt = document.getElementById('post-text').value.trim();
    if (!txt) return;
    if (!currentUser.posts) currentUser.posts = [];
    currentUser.posts.unshift({ text: txt, date: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) });
    document.getElementById('post-text').value = '';
    await saveUserData();
    renderPosts();
  }

  function renderPosts() {
    const posts = currentUser.posts || [];
    const container = document.getElementById('posts-list');
    if (posts.length === 0) {
      container.innerHTML = '<p style="padding:16px; color:var(--tg-text-muted); font-size:13px; text-align:center;">Нет записей</p>';
      return;
    }
    container.innerHTML = posts.map(p => `
      <div class="post-card">
        <div class="post-header">
          <span>${currentUser.fullname}</span>
          <span>${p.date}</span>
        </div>
        <div class="post-text">${p.text}</div>
      </div>
    `).join('');
  }

  function switchTab(tab, title, btn) {
    document.querySelectorAll('.tg-nav-item').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
    document.getElementById(`tab-${tab}`).classList.remove('hidden');
    document.getElementById('header-title').innerText = title;
  }

  function openModal(id) {
    if (id === 'modal-edit' && currentUser) {
      document.getElementById('edit-fullname').value = currentUser.fullname || '';
      document.getElementById('edit-bio').value = currentUser.bio || '';
    }
    document.getElementById(id).classList.add('active');
  }

  function closeModal(id) { document.getElementById(id).classList.remove('active'); }
</script>
</body>
</html>
