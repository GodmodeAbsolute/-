<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Godmode Network</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-main: #0a0d14;
      --bg-card: rgba(18, 24, 38, 0.75);
      --accent-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .app-container {
      width: 100%;
      max-width: 460px;
      background: rgba(13, 17, 26, 0.95);
      min-height: 100vh;
      position: relative;
      padding-bottom: 80px;
      border-left: 1px solid rgba(255, 255, 255, 0.05);
      border-right: 1px solid rgba(255, 255, 255, 0.05);
    }

    .tg-header {
      height: 60px;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      position: sticky;
      top: 0;
      background: #0d111a;
      z-index: 10;
    }

    .tg-header-title {
      font-weight: 800;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .btn-sm {
      background: rgba(255,255,255,0.1);
      border: none;
      color: #fff;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
    }

    .banner {
      width: 100%;
      height: 140px;
      background: linear-gradient(135deg, #3b82f6, #ec4899);
      background-size: cover;
      background-position: center;
      cursor: pointer;
      display: flex;
      align-items: flex-end;
      padding: 10px;
    }

    .profile-sec { padding: 0 20px; position: relative; }
    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 3px solid var(--bg-main);
      margin-top: -40px;
      object-fit: cover;
      background: #1e293b;
      cursor: pointer;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 15px 0;
    }
    .stat-card {
      background: var(--bg-card);
      padding: 10px;
      border-radius: 12px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .post-box, .post-card {
      background: var(--bg-card);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 12px;
      margin: 10px 20px;
    }

    textarea, input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 8px;
      outline: none;
    }

    .btn-main {
      width: 100%;
      background: var(--accent-gradient);
      border: none;
      color: #fff;
      padding: 10px;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
    }

    .auth-toggle {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }
    .auth-toggle button {
      flex: 1;
      padding: 8px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text-muted);
      border-radius: 8px;
      cursor: pointer;
    }
    .auth-toggle button.active {
      background: rgba(255,255,255,0.2);
      color: #fff;
      font-weight: bold;
    }

    .nav-bar {
      position: fixed;
      bottom: 0;
      width: 100%;
      max-width: 460px;
      height: 60px;
      background: #0d111a;
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex;
      justify-content: space-around;
      align-items: center;
    }
    .nav-item { color: var(--text-muted); background: none; border: none; cursor: pointer; font-size: 13px; }
    .nav-item.active { color: #fff; font-weight: 700; }

    .modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      display: none; align-items: center; justify-content: center; z-index: 100;
    }
    .modal.active { display: flex; }
    .modal-content { background: #121826; padding: 20px; border-radius: 16px; width: 90%; max-width: 400px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="app-container">
  <header class="tg-header">
    <div class="tg-header-title">GODMODE NETWORK</div>
    <div>
      <button class="btn-sm" onclick="openModal('modal-edit')">Редактировать</button>
      <button class="btn-sm" onclick="logout()">Выход</button>
    </div>
  </header>

  <!-- ВКЛАДКА ПРОФИЛЬ -->
  <div id="tab-profile">
    <div id="banner" class="banner" onclick="document.getElementById('banner-file').click()">
      <span style="background:rgba(0,0,0,0.6); font-size:11px; padding:4px 8px; border-radius:6px;">📷 Изменить баннер</span>
    </div>
    <input type="file" id="banner-file" class="hidden" accept="image/*" onchange="uploadImg(event, 'banner')">

    <div class="profile-sec">
      <img id="avatar" class="avatar" src="https://via.placeholder.com/150" onclick="document.getElementById('avatar-file').click()">
      <input type="file" id="avatar-file" class="hidden" accept="image/*" onchange="uploadImg(event, 'avatar')">

      <h2 id="disp-fullname" style="margin-top:8px;">Загрузка...</h2>
      <div id="disp-username" style="color:var(--text-muted); font-size:14px;">@username</div>
      <p id="disp-bio" style="margin-top:6px; font-size:13px; color:#cbd5e1;">Описание не заполнено</p>

      <div class="stats">
        <div class="stat-card"><b id="cnt-friends">0</b><div style="font-size:11px; color:var(--text-muted);">Друзей</div></div>
        <div class="stat-card"><b id="cnt-subs">0</b><div style="font-size:11px; color:var(--text-muted);">Подписчиков</div></div>
        <div class="stat-card"><b id="cnt-posts">0</b><div style="font-size:11px; color:var(--text-muted);">Постов</div></div>
      </div>
    </div>

    <div class="post-box">
      <textarea id="post-text" placeholder="Написать пост..." rows="2"></textarea>
      <button class="btn-main" onclick="addPost()">Опубликовать</button>
    </div>

    <div id="posts-list"></div>
  </div>

  <!-- ВКЛАДКА ДРУЗЬЯ -->
  <div id="tab-friends" class="hidden" style="padding:20px;">
    <h3>Список друзей</h3>
    <p style="color:var(--text-muted); font-size:13px; margin-top:10px;">Список друзей пуст</p>
  </div>

  <nav class="nav-bar">
    <button class="nav-item active" onclick="switchTab('profile', this)">Профиль</button>
    <button class="nav-item" onclick="switchTab('friends', this)">Друзья</button>
  </nav>
</div>

<!-- МОДАЛКА ВХОДА / РЕГИСТРАЦИИ -->
<div id="modal-auth" class="modal active">
  <div class="modal-content">
    <div class="auth-toggle">
      <button id="btn-mode-login" class="active" onclick="setAuthMode('login')">Вход</button>
      <button id="btn-mode-reg" onclick="setAuthMode('reg')">Регистрация</button>
    </div>

    <div id="reg-name-field" class="hidden">
      <input type="text" id="auth-name" placeholder="Имя и Фамилия">
    </div>
    <input type="text" id="auth-nick" placeholder="Юзернейм (@absolute_godmode)">
    <input type="password" id="auth-pass" placeholder="Пароль">

    <button class="btn-main" id="btn-auth-submit" onclick="handleAuth()">Войти</button>
  </div>
</div>

<!-- МОДАЛКА РЕДАКТИРОВАНИЯ -->
<div id="modal-edit" class="modal">
  <div class="modal-content">
    <h3 style="margin-bottom:12px;">Редактировать профиль</h3>
    <input type="text" id="edit-fullname" placeholder="Имя">
    <textarea id="edit-bio" placeholder="О себе" rows="2"></textarea>
    <button class="btn-main" onclick="saveProfile()">Сохранить</button>
    <button class="btn-sm" style="width:100%; margin-top:8px;" onclick="closeModal('modal-edit')">Отмена</button>
  </div>
</div>

<script>
  let currentAuthMode = 'login';
  let currentUser = null;

  const OWNER_ACCOUNT = {
    username: '@absolute_godmode',
    password: 'Assasin2)',
    fullname: 'ABSOLUTE GODMODE',
    bio: 'Создатель и Владелец платформы',
    avatar: 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=150',
    banner: '',
    posts: []
  };

  // Нормализация юзернейма: убираем пробелы, переводим в нижний регистр, гарантируем '@'
  function normalizeUsername(raw) {
    let clean = raw.trim().toLowerCase();
    if (!clean.startsWith('@')) clean = '@' + clean;
    return clean;
  }

  function getDatabase() {
    let users = {};
    try {
      users = JSON.parse(localStorage.getItem('godmode_users')) || {};
    } catch(e) {
      users = {};
    }
    if (!users['@absolute_godmode']) {
      users['@absolute_godmode'] = OWNER_ACCOUNT;
      localStorage.setItem('godmode_users', JSON.stringify(users));
    }
    return users;
  }

  window.onload = () => {
    checkAuthSession();
  };

  function checkAuthSession() {
    const sessionNick = localStorage.getItem('godmode_session');
    if (sessionNick) {
      const users = getDatabase();
      const normNick = normalizeUsername(sessionNick);
      if (users[normNick]) {
        currentUser = users[normNick];
        closeModal('modal-auth');
        renderProfile();
        return;
      }
    }
    openModal('modal-auth');
  }

  function setAuthMode(mode) {
    currentAuthMode = mode;
    if (mode === 'login') {
      document.getElementById('btn-mode-login').classList.add('active');
      document.getElementById('btn-mode-reg').classList.remove('active');
      document.getElementById('reg-name-field').classList.add('hidden');
      document.getElementById('btn-auth-submit').innerText = 'Войти';
    } else {
      document.getElementById('btn-mode-reg').classList.add('active');
      document.getElementById('btn-mode-login').classList.remove('active');
      document.getElementById('reg-name-field').classList.remove('hidden');
      document.getElementById('btn-auth-submit').innerText = 'Зарегистрироваться';
    }
  }

  function handleAuth() {
    const rawNick = document.getElementById('auth-nick').value;
    const pass = document.getElementById('auth-pass').value.trim();

    if (!rawNick || !pass) return alert('Заполните все поля!');

    const nick = normalizeUsername(rawNick);
    let users = getDatabase();

    // Авто-создание аккаунта владельца, если его стирало из браузера
    if (nick === '@absolute_godmode' && !users['@absolute_godmode']) {
      users['@absolute_godmode'] = OWNER_ACCOUNT;
      localStorage.setItem('godmode_users', JSON.stringify(users));
    }

    if (currentAuthMode === 'login') {
      if (!users[nick]) {
        return alert('Пользователь с таким юзернеймом не найден!');
      }
      if (users[nick].password !== pass) {
        return alert('Неверный пароль!');
      }
      currentUser = users[nick];
    } else {
      const name = document.getElementById('auth-name').value.trim();
      if (!name) return alert('Введите имя и фамилию!');
      if (users[nick]) return alert('Этот юзернейм уже занят!');

      currentUser = {
        username: nick,
        password: pass,
        fullname: name,
        bio: 'Новый пользователь',
        avatar: 'https://via.placeholder.com/150',
        banner: '',
        posts: []
      };
      users[nick] = currentUser;
      localStorage.setItem('godmode_users', JSON.stringify(users));
    }

    localStorage.setItem('godmode_session', nick);
    closeModal('modal-auth');
    renderProfile();
  }

  function logout() {
    localStorage.removeItem('godmode_session');
    currentUser = null;
    document.getElementById('auth-nick').value = '';
    document.getElementById('auth-pass').value = '';
    openModal('modal-auth');
  }

  function saveUserData() {
    let users = getDatabase();
    users[currentUser.username] = currentUser;
    localStorage.setItem('godmode_users', JSON.stringify(users));
  }

  function renderProfile() {
    if (!currentUser) return;
    document.getElementById('disp-fullname').innerText = currentUser.fullname;
    document.getElementById('disp-username').innerText = currentUser.username;
    document.getElementById('disp-bio').innerText = currentUser.bio || 'Нет описания';
    
    document.getElementById('avatar').src = currentUser.avatar || 'https://via.placeholder.com/150';
    if (currentUser.banner) {
      document.getElementById('banner').style.backgroundImage = `url('${currentUser.banner}')`;
    } else {
      document.getElementById('banner').style.backgroundImage = 'none';
    }

    renderPosts();
  }

  function saveProfile() {
    currentUser.fullname = document.getElementById('edit-fullname').value.trim();
    currentUser.bio = document.getElementById('edit-bio').value.trim();

    saveUserData();
    renderProfile();
    closeModal('modal-edit');
  }

  function uploadImg(e, type) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      if (type === 'avatar') currentUser.avatar = evt.target.result;
      if (type === 'banner') currentUser.banner = evt.target.result;
      saveUserData();
      renderProfile();
    };
    reader.readAsDataURL(file);
  }

  function addPost() {
    const txt = document.getElementById('post-text').value.trim();
    if (!txt) return;
    
    if (!currentUser.posts) currentUser.posts = [];
    currentUser.posts.unshift({ text: txt, date: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) });
    
    document.getElementById('post-text').value = '';
    saveUserData();
    renderPosts();
  }

  function renderPosts() {
    const posts = currentUser.posts || [];
    document.getElementById('cnt-posts').innerText = posts.length;
    const container = document.getElementById('posts-list');
    
    if (posts.length === 0) {
      container.innerHTML = '<p style="padding:0 20px; color:var(--text-muted); font-size:13px;">Постов пока нет.</p>';
      return;
    }
    container.innerHTML = posts.map(p => `
      <div class="post-card">
        <div style="display:flex; justify-content:space-between; margin-bottom:6px;">
          <b style="font-size:13px;">${currentUser.fullname}</b>
          <span style="font-size:11px; color:var(--text-muted);">${p.date}</span>
        </div>
        <p style="font-size:14px;">${p.text}</p>
      </div>
    `).join('');
  }

  function switchTab(tab, btn) {
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (tab === 'profile') {
      document.getElementById('tab-profile').classList.remove('hidden');
      document.getElementById('tab-friends').classList.add('hidden');
    } else {
      document.getElementById('tab-profile').classList.add('hidden');
      document.getElementById('tab-friends').classList.remove('hidden');
    }
  }

  function openModal(id) {
    if (id === 'modal-edit') {
      document.getElementById('edit-fullname').value = currentUser.fullname;
      document.getElementById('edit-bio').value = currentUser.bio;
    }
    document.getElementById(id).classList.add('active');
  }
  function closeModal(id) { document.getElementById(id).classList.remove('active'); }
</script>
</body>
</html>
