<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Godmode Network</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #0f1721;
      color: #ffffff;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .app-container {
      width: 100%;
      max-width: 440px;
      background-color: #17212b;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      padding-bottom: 30px;
      overflow-x: hidden;
    }

    /* --- ХЕДЕР --- */
    .tg-header {
      height: 56px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: rgba(23, 33, 43, 0.9);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 20;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .tg-header-title {
      font-size: 17px;
      font-weight: 700;
      background: linear-gradient(90deg, #64b5ef, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 0.5px;
    }

    .edit-profile-btn {
      background: rgba(36, 161, 222, 0.15);
      color: #64b5ef;
      border: none;
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: transform 0.1s ease, background 0.2s ease;
    }

    .edit-profile-btn:active {
      transform: scale(0.95);
      background: rgba(36, 161, 222, 0.3);
    }

    /* --- БАННЕР С ЭФФЕКТАМИ --- */
    .banner-container {
      position: relative;
      width: 100%;
      height: 150px;
      background: linear-gradient(135deg, #1e2c3a, #0f1721);
      background-size: cover;
      background-position: center;
      cursor: pointer;
      overflow: hidden;
    }

    .banner-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.25);
      opacity: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s ease;
    }

    .banner-container:active .banner-overlay {
      opacity: 1;
    }

    .banner-badge {
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      border-radius: 20px;
      padding: 6px 12px;
      font-size: 12px;
      color: #ffffff;
      display: flex;
      align-items: center;
      gap: 6px;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    /* --- АВАТАР И ПРОФИЛЬ --- */
    .profile-section {
      padding: 0 16px;
      position: relative;
    }

    .avatar-wrapper {
      position: relative;
      width: 86px;
      height: 86px;
      margin-top: -43px;
      margin-bottom: 12px;
      cursor: pointer;
      border-radius: 50%;
    }

    .avatar-img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #17212b;
      background-color: #2b5278;
      display: block;
      transition: filter 0.2s ease;
    }

    .avatar-wrapper:active .avatar-img {
      filter: brightness(0.8);
    }

    .avatar-cam-icon {
      position: absolute;
      bottom: 2px;
      right: 2px;
      background: #24a1de;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #17212b;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    .user-fullname {
      font-size: 22px;
      font-weight: 700;
      color: #ffffff;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .verified-icon {
      width: 18px;
      height: 18px;
      fill: #24a1de;
    }

    .user-status {
      font-size: 13px;
      color: #64b5ef;
      margin-top: 2px;
      font-weight: 500;
    }

    /* --- СПИСОК ИНФОРМАЦИИ --- */
    .info-group {
      margin-top: 16px;
      background-color: #17212b;
      border-top: 8px solid #0f1721;
    }

    .info-item {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      transition: background-color 0.15s ease;
    }

    .info-item:active {
      background-color: #202b36;
    }

    .info-icon {
      width: 22px;
      height: 22px;
      stroke: #64b5ef;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      flex-shrink: 0;
    }

    .info-content {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex-grow: 1;
    }

    .info-value {
      font-size: 15px;
      color: #ffffff;
      font-weight: 500;
      word-break: break-word;
    }

    .info-label {
      font-size: 12px;
      color: #7f8c99;
    }

    /* --- МОДАЛЬНОЕ ОКНО РЕДАКТИРОВАНИЯ --- */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(6px);
      z-index: 100;
      display: flex;
      align-items: flex-end;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-card {
      width: 100%;
      background: #1e2c3a;
      border-top-left-radius: 20px;
      border-top-right-radius: 20px;
      padding: 20px 16px 32px 16px;
      transform: translateY(100%);
      transition: transform 0.25s cubic-bezier(0.1, 0.9, 0.2, 1);
      box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
    }

    .modal-overlay.active .modal-card {
      transform: translateY(0);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 700;
    }

    .modal-close {
      background: none;
      border: none;
      color: #7f8c99;
      font-size: 20px;
      cursor: pointer;
    }

    .form-field {
      margin-bottom: 14px;
    }

    .form-field label {
      display: block;
      font-size: 12px;
      color: #64b5ef;
      margin-bottom: 6px;
      font-weight: 600;
    }

    .form-field input, .form-field textarea {
      width: 100%;
      background: #17212b;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: 12px;
      color: #ffffff;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s ease;
    }

    .form-field input:focus, .form-field textarea:focus {
      border-color: #24a1de;
    }

    .save-btn {
      width: 100%;
      background: #24a1de;
      color: #ffffff;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      transition: transform 0.1s ease, background-color 0.2s ease;
    }

    .save-btn:active {
      transform: scale(0.98);
      background: #1d80b2;
    }

    .hidden-input {
      display: none !important;
    }
  </style>
</head>
<body>

  <div class="app-container">
    <!-- Шапка -->
    <header class="tg-header">
      <div class="tg-header-title">GODMODE NETWORK</div>
      <button class="edit-profile-btn" onclick="openModal()">
        <svg class="info-icon" style="width:14px; height:14px; stroke:#64b5ef;" viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        Изменить
      </button>
    </header>

    <!-- Баннер профиля -->
    <div id="profile-banner" class="banner-container" onclick="document.getElementById('banner-input').click()">
      <div class="banner-overlay">
        <div class="banner-badge">📷 Выбрать баннер с телефона</div>
      </div>
    </div>
    <input type="file" id="banner-input" class="hidden-input" accept="image/*" onchange="previewImage(event, 'profile-banner')">

    <!-- Профиль -->
    <div class="profile-section">
      <!-- Аватарка -->
      <div class="avatar-wrapper" onclick="document.getElementById('avatar-input').click()">
        <img id="profile-avatar" class="avatar-img" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%237f8c99'><path d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/></svg>" alt="Аватар">
        <div class="avatar-cam-icon">
          <svg style="width:14px; height:14px; stroke:#fff; fill:none; stroke-width:2;" viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        </div>
      </div>
      <input type="file" id="avatar-input" class="hidden-input" accept="image/*" onchange="previewImage(event, 'profile-avatar')">

      <div class="user-fullname">
        <span id="display-fullname">Алексей Смирнов</span>
        <svg class="verified-icon" viewBox="0 0 24 24"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm-1.9 14.7L6 12.6l1.5-1.4 2.6 2.6 6.8-6.8 1.5 1.4-8.5 8.3z"/></svg>
      </div>
      <div class="user-status">в сети</div>
    </div>

    <!-- Инфо-блоки -->
    <div class="info-group">
      <!-- Username -->
      <div class="info-item" onclick="openModal()">
        <svg class="info-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <div class="info-content">
          <div class="info-value" id="display-username">@absolute_godmode</div>
          <div class="info-label">Имя пользователя</div>
        </div>
      </div>

      <!-- Bio -->
      <div class="info-item" onclick="openModal()">
        <svg class="info-icon" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        <div class="info-content">
          <div class="info-value" id="display-bio">Создатель Godmode Network. Разрабатываю крутые интерфейсы.</div>
          <div class="info-label">О себе</div>
        </div>
      </div>

      <!-- Город -->
      <div class="info-item" onclick="openModal()">
        <svg class="info-icon" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        <div class="info-content">
          <div class="info-value" id="display-city">Москва</div>
          <div class="info-label">Город</div>
        </div>
      </div>

      <!-- Возраст -->
      <div class="info-item" onclick="openModal()">
        <svg class="info-icon" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <div class="info-content">
          <div class="info-value" id="display-age">22 года</div>
          <div class="info-label">Возраст</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Модальное окно редактирования -->
  <div id="modal" class="modal-overlay" onclick="closeModalOnOutside(event)">
    <div class="modal-card">
      <div class="modal-header">
        <div class="modal-title">Редактирование профиля</div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>

      <div class="form-field">
        <label>Имя и Фамилия</label>
        <input type="text" id="input-fullname">
      </div>

      <div class="form-field">
        <label>Username</label>
        <input type="text" id="input-username">
      </div>

      <div class="form-field">
        <label>О себе</label>
        <textarea id="input-bio" rows="2"></textarea>
      </div>

      <div class="form-field">
        <label>Город</label>
        <input type="text" id="input-city">
      </div>

      <div class="form-field">
        <label>Возраст</label>
        <input type="text" id="input-age">
      </div>

      <button class="save-btn" onclick="saveProfile()">Сохранить изменения</button>
    </div>
  </div>

  <script>
    // Предпросмотр баннера/аватарки с телефона
    function previewImage(event, targetId) {
      const file = event.target.files[0];
      if (!file) return;

      const imageURL = URL.createObjectURL(file);
      const targetElement = document.getElementById(targetId);

      if (targetElement.tagName === 'IMG') {
        targetElement.src = imageURL;
      } else {
        targetElement.style.backgroundImage = `url('${imageURL}')`;
      }
    }

    // Открытие модалки и заполнение текущими данными
    function openModal() {
      document.getElementById('input-fullname').value = document.getElementById('display-fullname').innerText;
      document.getElementById('input-username').value = document.getElementById('display-username').innerText;
      document.getElementById('input-bio').value = document.getElementById('display-bio').innerText;
      document.getElementById('input-city').value = document.getElementById('display-city').innerText;
      document.getElementById('input-age').value = document.getElementById('display-age').innerText;

      document.getElementById('modal').classList.add('active');
    }

    // Закрытие модалки
    function closeModal() {
      document.getElementById('modal').classList.remove('active');
    }

    function closeModalOnOutside(e) {
      if (e.target.id === 'modal') closeModal();
    }

    // Сохранение отредактированных данных
    function saveProfile() {
      document.getElementById('display-fullname').innerText = document.getElementById('input-fullname').value || 'Имя Не Указано';
      document.getElementById('display-username').innerText = document.getElementById('input-username').value || '@username';
      document.getElementById('display-bio').innerText = document.getElementById('input-bio').value || '—';
      document.getElementById('display-city').innerText = document.getElementById('input-city').value || '—';
      document.getElementById('display-age').innerText = document.getElementById('input-age').value || '—';

      closeModal();
    }
  </script>
</body>
</html>
