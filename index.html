<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Профиль пользователя</title>
  <!-- Подключение CSS из папки css -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="container">
    <!-- ПРЕВЬЮ ПРОФИЛЯ -->
    <div class="profile-card">
      <!-- Баннер -->
      <div id="profile-banner" class="banner-box"></div>
      
      <div class="profile-info">
        <!-- Аватарка с дефолтной иконкой -->
        <img id="profile-avatar" class="avatar-img" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 24 24' fill='%2371717a'><path d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 4c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm0 14c-2.03 0-3.8-1.04-4.83-2.61.02-1.61 3.22-2.49 4.83-2.49 1.6 0 4.8 0.88 4.83 2.49C15.8 18.96 14.03 20 12 20z'/></svg>" alt="Аватар">
        
        <h2 class="user-name">Пользователь</h2>
        <p class="user-tag">@username</p>
      </div>
    </div>

    <!-- БЛОК ЗАГРУЗКИ ФАЙЛОВ -->
    <div class="upload-section">
      <h3>Загрузка с устройства</h3>

      <!-- Загрузка баннера -->
      <div class="form-group">
        <label>Баннер профиля:</label>
        <label for="banner-input" class="custom-file-btn">📁 Выбрать баннер с телефона</label>
        <input type="file" id="banner-input" class="file-input" accept="image/*" onchange="previewImage(event, 'profile-banner')">
      </div>

      <!-- Загрузка аватарки -->
      <div class="form-group">
        <label>Аватарка:</label>
        <label for="avatar-input" class="custom-file-btn">📷 Выбрать фото профиля</label>
        <input type="file" id="avatar-input" class="file-input" accept="image/*" onchange="previewImage(event, 'profile-avatar')">
      </div>
    </div>
  </div>

  <!-- Подключение JS из папки js -->
  <script src="js/script.js"></script>
</body>
</html>
