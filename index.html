<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Godmode Network</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-main: #0a0d14;
      --bg-card: rgba(18, 24, 38, 0.75);
      --accent-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .app-container {
      width: 100%;
      max-width: 460px;
      background: rgba(13, 17, 26, 0.95);
      min-height: 100vh;
      position: relative;
      padding-bottom: 80px;
      border-left: 1px solid rgba(255, 255, 255, 0.05);
      border-right: 1px solid rgba(255, 255, 255, 0.05);
    }

    .tg-header {
      height: 60px;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      position: sticky;
      top: 0;
      background: #0d111a;
      z-index: 10;
    }

    .tg-header-title {
      font-weight: 800;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .btn-sm {
      background: rgba(255,255,255,0.1);
      border: none;
      color: #fff;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
    }

    .banner {
      width: 100%;
      height: 140px;
      background: linear-gradient(135deg, #3b82f6, #ec4899);
      background-size: cover;
      background-position: center;
      cursor: pointer;
      display: flex;
      align-items: flex-end;
      padding: 10px;
    }

    .profile-sec { padding: 0 20px; position: relative; }
    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 3px solid var(--bg-main);
      margin-top: -40px;
      object-fit: cover;
      background: #1e293b;
      cursor: pointer;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 15px 0;
    }
    .stat-card {
      background: var(--bg-card);
      padding: 10px;
      border-radius: 12px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .post-box, .post-card {
      background: var(--bg-card);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 12px;
      margin: 10px 20px;
    }

    textarea, input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 8px;
      outline: none;
    }

    .btn-main {
      width: 100%;
      background: var(--accent-gradient);
      border: none;
      color: #fff;
      padding: 10px;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
    }

    .nav-bar {
      position: fixed;
      bottom: 0;
      width: 100%;
      max-width: 460px;
      height: 60px;
      background: #0d111a;
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex;
      justify-content: space-around;
      align-items: center;
    }
    .nav-item { color: var(--text-muted); background: none; border: none; cursor: pointer; font-size: 13px; }
    .nav-item.active { color: #fff; font-weight: 700; }

    .modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.8);
      display: none; align-items: center; justify-content: center; z-index: 100;
    }
    .modal.active { display: flex; }
    .modal-content { background: #121826; padding: 20px; border-radius: 16px; width: 90%; max-width: 400px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="app-container">
  <header class="tg-header">
    <div class="tg-header-title">GODMODE NETWORK</div>
    <div>
      <button class="btn-sm" onclick="openModal('modal-edit')">Редактировать</button>
      <button class="btn-sm" onclick="logout()">Выход</button>
    </div>
  </header>

  <!-- ВКЛАДКА ПРОФИЛЬ -->
  <div id="tab-profile">
    <div id="banner" class="banner" onclick="document.getElementById('banner-file').click()">
      <span style="background:rgba(0,0,0,0.6); font-size:11px; padding:4px 8px; border-radius:6px;">📷 Нажмите для смены баннера</span>
    </div>
    <input type="file" id="banner-file" class="hidden" accept="image/*" onchange="uploadImg(event, 'banner')">

    <div class="profile-sec">
      <img id="avatar" class="avatar" src="https://via.placeholder.com/150" onclick="document.getElementById('avatar-file').click()">
      <input type="file" id="avatar-file" class="hidden" accept="image/*" onchange="uploadImg(event, 'avatar')">

      <h2 id="disp-fullname" style="margin-top:8px;">Гость</h2>
      <div id="disp-username" style="color:var(--text-muted); font-size:14px;">@guest</div>
      <p id="disp-bio" style="margin-top:6px; font-size:13px; color:#cbd5e1;">Описание не заполнено</p>

      <div class="stats">
        <div class="stat-card"><b id="cnt-friends">0</b><div style="font-size:11px; color:var(--text-muted);">Друзей</div></div>
        <div class="stat-card"><b id="cnt-subs">0</b><div style="font-size:11px; color:var(--text-muted);">Подписчиков</div></div>
        <div class="stat-card"><b id="cnt-posts">0</b><div style="font-size:11px; color:var(--text-muted);">Постов</div></div>
      </div>
    </div>

    <div class="post-box">
      <textarea id="post-text" placeholder="Написать пост..." rows="2"></textarea>
      <button class="btn-main" onclick="addPost()">Опубликовать</button>
    </div>

    <div id="posts-list"></div>
  </div>

  <!-- ВКЛАДКА ДРУЗЬЯ -->
  <div id="tab-friends" class="hidden" style="padding:20px;">
    <h3>Список друзей</h3>
    <p style="color:var(--text-muted); font-size:13px; margin-top:10px;">Список друзей пуст</p>
  </div>

  <nav class="nav-bar">
    <button class="nav-item active" onclick="switchTab('profile', this)">Профиль</button>
    <button class="nav-item" onclick="switchTab('friends', this)">Друзья</button>
  </nav>
</div>

<!-- МОДАЛКА ВХОДА -->
<div id="modal-auth" class="modal active">
  <div class="modal-content">
    <h3 style="margin-bottom:12px;">Вход / Регистрация</h3>
    <input type="text" id="auth-name" placeholder="Имя и Фамилия">
    <input type="text" id="auth-nick" placeholder="Юзернейм (например @godmode)">
    <button class="btn-main" onclick="login()">Войти</button>
  </div>
</div>

<!-- МОДАЛКА РЕДАКТИРОВАНИЯ -->
<div id="modal-edit" class="modal">
  <div class="modal-content">
    <h3 style="margin-bottom:12px;">Редактировать профиль</h3>
    <input type="text" id="edit-fullname" placeholder="Имя">
    <input type="text" id="edit-username" placeholder="Юзернейм">
    <textarea id="edit-bio" placeholder="О себе" rows="2"></textarea>
    <button class="btn-main" onclick="saveProfile()">Сохранить</button>
    <button class="btn-sm" style="width:100%; margin-top:8px;" onclick="closeModal('modal-edit')">Отмена</button>
  </div>
</div>

<script>
  let state = {
    user: null,
    posts: []
  };

  window.onload = () => {
    const savedData = localStorage.getItem('godmode_app');
    if (savedData) {
      state = JSON.parse(savedData);
      if (state.user) {
        closeModal('modal-auth');
        renderProfile();
      }
    }
  };

  function saveData() {
    localStorage.setItem('godmode_app', JSON.stringify(state));
  }

  function login() {
    const name = document.getElementById('auth-name').value.trim();
    let nick = document.getElementById('auth-nick').value.trim();
    if (!name || !nick) return alert('Заполните поля!');

    if (!nick.startsWith('@')) nick = '@' + nick;

    state.user = {
      fullname: name,
      username: nick,
      bio: 'Разработчик / Создатель',
      avatar: 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=150',
      banner: ''
    };
    saveData();
    closeModal('modal-auth');
    renderProfile();
  }

  function logout() {
    state.user = null;
    saveData();
    openModal('modal-auth');
  }

  function renderProfile() {
    if (!state.user) return;
    document.getElementById('disp-fullname').innerText = state.user.fullname;
    document.getElementById('disp-username').innerText = state.user.username;
    document.getElementById('disp-bio').innerText = state.user.bio || 'Нет описания';
    
    if (state.user.avatar) document.getElementById('avatar').src = state.user.avatar;
    if (state.user.banner) document.getElementById('banner').style.backgroundImage = `url('${state.user.banner}')`;

    renderPosts();
  }

  function saveProfile() {
    let newNick = document.getElementById('edit-username').value.trim();
    if (!newNick.startsWith('@')) newNick = '@' + newNick;

    state.user.fullname = document.getElementById('edit-fullname').value.trim();
    state.user.username = newNick;
    state.user.bio = document.getElementById('edit-bio').value.trim();

    saveData();
    renderProfile();
    closeModal('modal-edit');
  }

  function uploadImg(e, type) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      if (type === 'avatar') state.user.avatar = evt.target.result;
      if (type === 'banner') state.user.banner = evt.target.result;
      saveData();
      renderProfile();
    };
    reader.readAsDataURL(file);
  }

  function addPost() {
    const txt = document.getElementById('post-text').value.trim();
    if (!txt) return;
    state.posts.unshift({ text: txt, date: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) });
    document.getElementById('post-text').value = '';
    saveData();
    renderPosts();
  }

  function renderPosts() {
    document.getElementById('cnt-posts').innerText = state.posts.length;
    const container = document.getElementById('posts-list');
    if (state.posts.length === 0) {
      container.innerHTML = '<p style="padding:0 20px; color:var(--text-muted); font-size:13px;">Постов пока нет.</p>';
      return;
    }
    container.innerHTML = state.posts.map(p => `
      <div class="post-card">
        <div style="display:flex; justify-space-between; margin-bottom:6px;">
          <b style="font-size:13px;">${state.user.fullname}</b>
          <span style="font-size:11px; color:var(--text-muted);">${p.date}</span>
        </div>
        <p style="font-size:14px;">${p.text}</p>
      </div>
    `).join('');
  }

  function switchTab(tab, btn) {
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (tab === 'profile') {
      document.getElementById('tab-profile').classList.remove('hidden');
      document.getElementById('tab-friends').classList.add('hidden');
    } else {
      document.getElementById('tab-profile').classList.add('hidden');
      document.getElementById('tab-friends').classList.remove('hidden');
    }
  }

  function openModal(id) {
    if (id === 'modal-edit') {
      document.getElementById('edit-fullname').value = state.user.fullname;
      document.getElementById('edit-username').value = state.user.username;
      document.getElementById('edit-bio').value = state.user.bio;
    }
    document.getElementById(id).classList.add('active');
  }
  function closeModal(id) { document.getElementById(id).classList.remove('active'); }
</script>
</body>
</html>
