<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Supabase</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="font-family:sans-serif; padding:20px;">
    <h2>Тест Supabase</h2>
    <div id="result"></div>

    <script>
        const SUPABASE_URL = 'https://byniblcezicrvyyqbafc.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_exBhK1ZwxY3uSoErm0jVFA_gR97KaAy';

        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const result = document.getElementById('result');

        async function test() {
            result.innerHTML = 'Тестируем...';

            // Тест 1: таблица users
            const { data: users, error: err1 } = await sb.from('users').select('*').limit(1);
            result.innerHTML += err1
                ? `<p style="color:red;">❌ Users: ${err1.message}</p>`
                : `<p style="color:green;">✅ Users: OK (${users.length} записей)</p>`;

            // Тест 2: авторизация
            const { data: auth, error: err2 } = await sb.auth.getSession();
            result.innerHTML += err2
                ? `<p style="color:red;">❌ Auth: ${err2.message}</p>`
                : `<p style="color:green;">✅ Auth: OK (сессия: ${auth.session ? 'есть' : 'нет'})</p>`;

            // Тест 3: регистрация
            const testEmail = 'test' + Date.now() + '@test.com';
            const { data: signup, error: err3 } = await sb.auth.signUp({
                email: testEmail,
                password: 'test123456'
            });
            result.innerHTML += err3
                ? `<p style="color:red;">❌ SignUp: ${err3.message}</p>`
                : `<p style="color:green;">✅ SignUp: OK (${signup.user?.id || 'no user'})</p>`;

            result.innerHTML += '<hr><p><b>Если всё зелёное — Supabase работает. Проблема в коде приложения.</b></p>';
            result.innerHTML += '<p><b>Если есть красное — проблема в настройках Supabase.</b></p>';
        }

        test();
    </script>
</body>
</html>
