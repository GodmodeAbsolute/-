<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InnoSphere</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #f0f2f5; --surface: #ffffff; --primary: #4f46e5;
            --text: #1e293b; --text-soft: #64748b; --border: #e2e8f0;
            --danger: #ef4444; --success: #10b981; --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg); color: var(--text);
            display: flex; justify-content: center; min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }
        .app { width: 100%; max-width: 480px; min-height: 100vh; background: var(--bg); display: flex; flex-direction: column; }
        .screen-center {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 100vh; padding: 20px; gap: 14px;
        }
        .logo { font-size: 2.5rem; font-weight: 800; color: var(--primary); }
        input, textarea {
            width: 100%; padding: 14px; border-radius: 12px;
            border: 2px solid var(--border); font-size: 1rem;
            background: var(--surface); color: var(--text); font-family: inherit;
        }
        button {
            padding: 12px 16px; border-radius: 12px;
            background: var(--primary); color: white; font-weight: 600;
            font-size: 0.95rem; border: none; cursor: pointer;
            display: inline-flex; align-items: center; gap: 6px;
            justify-content: center;
        }
        button:active { opacity: 0.7; }
        button.secondary { background: #f1f5f9; color: var(--text); border: 1px solid var(--border); }
        button.danger { background: var(--danger); }
        button.success { background: var(--success); }
        button.small { padding: 8px 12px; font-size: 0.8rem; }
        button.full { width: 100%; }
        .error-box { background: #fef2f2; border: 2px solid #ef4444; border-radius: 12px; padding: 14px; color: #dc2626; font-size: 0.9rem; width: 100%; }
        .info-box { background: #eff6ff; border: 2px solid #3b82f6; border-radius: 12px; padding: 14px; color: #1d4ed8; font-size: 0.9rem; width: 100%; }
        .header {
            background: var(--surface); padding: 14px 16px; display: flex;
            align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border);
            font-weight: 800; font-size: 1.2rem; color: var(--primary);
            position: sticky; top: 0; z-index: 10;
        }
        .content { flex: 1; overflow-y: auto; padding: 12px; padding-bottom: 90px; }
        .card { background: var(--surface); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; border: 1px solid var(--border); }
        .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .post-avatar {
            width: 40px; height: 40px; border-radius: 50%; background: #e2e8f0;
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem; color: #999; flex-shrink: 0;
        }
        .post-actions { display: flex; gap: 24px; margin-top: 10px; color: var(--text-soft); font-size: 0.9rem; }
        .post-actions span { cursor: pointer; display: flex; align-items: center; gap: 4px; }
        .comment-box { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
        .comment { display: flex; gap: 8px; margin-bottom: 8px; font-size: 0.85rem; align-items: flex-start; }
        .comment-avatar {
            width: 28px; height: 28px; border-radius: 50%; background: #e2e8f0;
            display: flex; align-items: center; justify-content: center; font-size: 0.7rem; flex-shrink: 0;
        }
        .comment-input-row { display: flex; gap: 6px; margin-top: 8px; }
        .comment-input-row input { flex: 1; padding: 8px 12px; font-size: 0.85rem; }
        .chat-container { display: flex; flex-direction: column; height: 65vh; background: var(--surface); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
        .chat-list { max-height: 35%; overflow-y: auto; border-bottom: 1px solid var(--border); }
        .chat-list-item {
            padding: 12px 14px; cursor: pointer; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 10px; font-weight: 500;
        }
        .chat-list-item.active { background: #eef2ff; color: var(--primary); }
        .chat-messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 6px; }
        .msg { padding: 8px 14px; border-radius: 16px; max-width: 80%; word-break: break-word; font-size: 0.9rem; }
        .msg.sent { background: var(--primary); color: white; align-self: flex-end; }
        .msg.received { background: #f1f5f9; align-self: flex-start; }
        .chat-input-row { display: flex; gap: 6px; padding: 8px 10px; border-top: 1px solid var(--border); background: var(--surface); }
        .chat-input-row input { flex: 1; padding: 10px 12px; font-size: 0.9rem; border-radius: 20px; }
        .bottom-nav {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 480px; background: var(--surface);
            border-top: 1px solid var(--border); display: flex;
            justify-content: space-around; padding: 6px 4px 10px; z-index: 100;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            gap: 2px; cursor: pointer; color: var(--text-soft); font-size: 0.68rem; font-weight: 500;
            padding: 6px 10px; border-radius: 8px; transition: 0.15s;
        }
        .nav-item i { font-size: 1.3rem; }
        .nav-item.active { color: var(--primary); background: #eef2ff; }
        .badge-crown { color: #f59e0b; }
        .badge-verify { color: #3b82f6; }
        .toast {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            background: #1e293b; color: white; padding: 10px 20px;
            border-radius: 20px; font-size: 0.85rem; z-index: 200; display: none;
        }
        .link-text { color: var(--primary); cursor: pointer; font-weight: 600; text-decoration: underline; }
        .user-row { display: flex; align-items: center; gap: 10px; cursor: pointer; border-radius: 10px; justify-content: space-between; }
    </style>
</head>
<body>
    <div class="app" id="app"></div>
    <div class="toast" id="toast"></div>

    <script>
        const SUPABASE_URL = 'https://byniblcezicrvyyqbafc.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_exBhK1ZwxY3uSoErm0jVFA_gR97KaAy';
        const OWNER_EMAIL = 'ilyabelyev344@gmail.com';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;
        let currentPage = 'feed';
        let currentChatId = null;
        let chatTimer = null;

        function toast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.style.display = 'block';
            clearTimeout(t._t); t._t = setTimeout(() => t.style.display = 'none', 2000);
        }

        function timeAgo(d) {
            const s = Math.floor((Date.now() - new Date(d)) / 1000);
            if (s < 60) return 'сейчас';
            if (s < 3600) return Math.floor(s/60) + ' мин';
            if (s < 86400) return Math.floor(s/3600) + ' ч';
            return new Date(d).toLocaleDateString('ru-RU');
        }

        function stopChatTimer() { if (chatTimer) { clearInterval(chatTimer); chatTimer = null; } }

        // ==================== АВТОРИЗАЦИЯ ====================
        function renderLogin(err) {
            let h = '<div class="screen-center">';
            h += '<div class="logo"><i class="fas fa-cube"></i> InnoSphere</div>';
            if (err) h += `<div class="error-box">${err}</div>`;
            h += `<input id="loginEmail" type="email" placeholder="Email" value="${OWNER_EMAIL}">`;
            h += '<input id="loginPass" type="password" placeholder="Пароль" value="Assasin2)">';
            h += '<button class="full" id="btnLogin">Войти</button>';
            h += '<p>Нет аккаунта? <span class="link-text" id="linkRegister">Регистрация</span></p>';
            h += '</div>';
            document.getElementById('app').innerHTML = h;
            document.getElementById('btnLogin').addEventListener('click', doLogin);
            document.getElementById('linkRegister').addEventListener('click', () => renderRegister());
        }

        function renderRegister(err) {
            let h = '<div class="screen-center">';
            h += '<div class="logo"><i class="fas fa-cube"></i> InnoSphere</div>';
            if (err) h += `<div class="error-box">${err}</div>`;
            h += '<input id="regName" placeholder="Полное имя">';
            h += '<input id="regUser" placeholder="Юзернейм">';
            h += '<input id="regEmail" type="email" placeholder="Email">';
            h += '<input id="regPass" type="password" placeholder="Пароль (мин 6 символов)">';
            h += '<button class="full" id="btnRegister">Зарегистрироваться</button>';
            h += '<p>Уже есть аккаунт? <span class="link-text" id="linkLogin">Войти</span></p>';
            h += '</div>';
            document.getElementById('app').innerHTML = h;
            document.getElementById('btnRegister').addEventListener('click', doRegister);
            document.getElementById('linkLogin').addEventListener('click', () => renderLogin());
        }

        async function doLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPass').value;
            if (!email || !pass) return renderLogin('Заполните все поля');
            const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
            if (error) return renderLogin(error.message);
            currentUser = data.user;
            await loadProfile();
            showMainApp();
        }

        async function doRegister() {
            const name = document.getElementById('regName').value.trim();
            const username = document.getElementById('regUser').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const pass = document.getElementById('regPass').value;
            if (!name || !username || !email || !pass) return renderRegister('Заполните все поля');
            if (pass.length < 6) return renderRegister('Пароль минимум 6 символов');
            const { data, error } = await sb.auth.signUp({ email, password: pass });
            if (error) {
                if (error.message.includes('already')) return renderLogin('Уже зарегистрирован. Войдите.');
                return renderRegister(error.message);
            }
            const isOwner = (email === OWNER_EMAIL);
            await sb.from('users').insert({ id: data.user.id, email, username, full_name: name, is_owner: isOwner, verified: isOwner });
            await sb.from('user_settings').insert({ user_id: data.user.id });
            currentUser = data.user;
            currentUser.profile = { id: data.user.id, email, username, full_name: name, is_owner: isOwner, verified: isOwner, avatar_url: 'https://i.pravatar.cc/150?img=' + Math.floor(Math.random()*70), banner_url: 'https://picsum.photos/480/140', bio: '' };
            showMainApp();
        }

        async function loadProfile() {
            const { data } = await sb.from('users').select('*').eq('id', currentUser.id).single();
            if (data) currentUser.profile = data;
        }

        // ==================== ГЛАВНЫЙ ЭКРАН ====================
        function showMainApp() {
            stopChatTimer();
            let h = '<div class="header"><span><i class="fas fa-cube"></i> InnoSphere</span>';
            if (currentUser.profile?.is_owner) h += '<i class="fas fa-crown badge-crown"></i>';
            h += '</div>';
            h += '<div class="content" id="mainContent"></div>';
            h += '<div class="bottom-nav" id="bottomNav">';
            h += '<div class="nav-item active" data-page="feed"><i class="fas fa-newspaper"></i>Лента</div>';
            h += '<div class="nav-item" data-page="friends"><i class="fas fa-user-friends"></i>Друзья</div>';
            h += '<div class="nav-item" data-page="chats"><i class="fas fa-comment-dots"></i>Чаты</div>';
            h += '<div class="nav-item" data-page="profile"><i class="fas fa-user"></i>Профиль</div>';
            h += '<div class="nav-item" data-page="more"><i class="fas fa-ellipsis-h"></i>Ещё</div>';
            h += '</div>';
            document.getElementById('app').innerHTML = h;

            document.querySelectorAll('#bottomNav .nav-item').forEach(item => {
                item.addEventListener('click', function() {
                    nav(this.dataset.page);
                });
            });

            nav('feed');
        }

        function nav(page) {
            stopChatTimer();
            currentPage = page;
            currentChatId = null;
            document.querySelectorAll('#bottomNav .nav-item').forEach(n => n.classList.remove('active'));
            const target = document.querySelector(`#bottomNav .nav-item[data-page="${page}"]`);
            if (target) target.classList.add('active');

            switch (page) {
                case 'feed': loadFeed(); break;
                case 'profile': loadProfilePage(); break;
                case 'friends': loadFriends(); break;
                case 'chats': loadChats(); break;
                case 'more': loadMore(); break;
                case 'channels': loadChannels(); break;
                case 'music': loadMusic(); break;
                case 'verify': loadVerify(); break;
            }
        }

        // ==================== ЛЕНТА ====================
        async function loadFeed() {
            const { data: posts } = await sb.from('posts').select('*, users!posts_user_id_fkey(*)').order('created_at', { ascending: false }).limit(30);
            let h = `<div class="card"><textarea id="postText" placeholder="Что у вас нового?" rows="2" style="border:none; padding:8px;"></textarea><button class="full" id="btnCreatePost" style="margin-top:8px;"><i class="fas fa-paper-plane"></i> Опубликовать</button></div>`;
            if (posts && posts.length > 0) {
                posts.forEach(p => {
                    const u = p.users || {};
                    h += `
                    <div class="card" id="post-${p.id}">
                        <div class="post-header" id="postHeader-${p.user_id}">
                            <div class="post-avatar"><i class="fas fa-user"></i></div>
                            <div style="flex:1;">
                                <strong>${u.full_name || 'Пользователь'}</strong>
                                ${u.is_owner ? '<i class="fas fa-crown badge-crown"></i>' : ''}
                                ${u.verified ? '<i class="fas fa-check-circle badge-verify"></i>' : ''}
                                <div style="font-size:0.7rem; color:var(--text-soft);">${timeAgo(p.created_at)}</div>
                            </div>
                            ${p.user_id === currentUser.id ? `<button class="danger small" id="btnDelete-${p.id}"><i class="fas fa-trash"></i></button>` : ''}
                        </div>
                        <p style="white-space:pre-wrap; font-size:0.95rem;">${p.text || ''}</p>
                        <div class="post-actions">
                            <span id="btnLike-${p.id}"><i class="far fa-heart"></i> ${p.likes_count||0}</span>
                            <span id="btnComment-${p.id}"><i class="far fa-comment"></i> ${p.comments_count||0}</span>
                            <span id="btnRepost-${p.id}"><i class="fas fa-retweet"></i> ${p.reposts_count||0}</span>
                        </div>
                        <div class="comment-box" id="comments-${p.id}" style="display:none;">
                            <div id="commentsList-${p.id}"></div>
                            <div class="comment-input-row">
                                <input id="commentInput-${p.id}" placeholder="Комментарий...">
                                <button class="small" id="btnAddComment-${p.id}"><i class="fas fa-paper-plane"></i></button>
                            </div>
                        </div>
                    </div>`;
                });
            } else {
                h += '<div class="card"><p style="text-align:center; color:var(--text-soft);">Нет постов</p></div>';
            }
            document.getElementById('mainContent').innerHTML = h;

            // Вешаем обработчики
            const btnCreate = document.getElementById('btnCreatePost');
            if (btnCreate) btnCreate.addEventListener('click', createPost);

            posts?.forEach(p => {
                const btnDel = document.getElementById('btnDelete-' + p.id);
                if (btnDel) btnDel.addEventListener('click', () => deletePost(p.id));

                const btnLike = document.getElementById('btnLike-' + p.id);
                if (btnLike) btnLike.addEventListener('click', () => likePost(p.id));

                const btnComment = document.getElementById('btnComment-' + p.id);
                if (btnComment) btnComment.addEventListener('click', () => toggleComments(p.id));

                const btnRepost = document.getElementById('btnRepost-' + p.id);
                if (btnRepost) btnRepost.addEventListener('click', () => repostPost(p.id));

                const btnAddComment = document.getElementById('btnAddComment-' + p.id);
                if (btnAddComment) btnAddComment.addEventListener('click', () => addComment(p.id));

                const postHeader = document.getElementById('postHeader-' + p.user_id);
                if (postHeader) postHeader.addEventListener('click', () => viewUserProfile(p.user_id));
            });
        }

        async function createPost() {
            const text = document.getElementById('postText')?.value.trim();
            if (!text) return toast('Напишите текст');
            await sb.from('posts').insert({ user_id: currentUser.id, text });
            toast('Опубликовано!');
            loadFeed();
        }

        async function deletePost(id) {
            if (!confirm('Удалить пост?')) return;
            await sb.from('posts').delete().eq('id', id);
            toast('Пост удалён');
            loadFeed();
        }

        async function likePost(id) {
            const { data: ex } = await sb.from('likes').select('*').eq('user_id', currentUser.id).eq('post_id', id).single();
            if (ex) {
                await sb.from('likes').delete().eq('user_id', currentUser.id).eq('post_id', id);
                await sb.rpc('decrement_likes', { post_id: id });
            } else {
                await sb.from('likes').insert({ user_id: currentUser.id, post_id: id });
                await sb.rpc('increment_likes', { post_id: id });
            }
            loadFeed();
        }

        async function repostPost(id) {
            const { data: orig } = await sb.from('posts').select('*').eq('id', id).single();
            if (!orig) return;
            await sb.from('posts').insert({ user_id: currentUser.id, text: orig.text, reposted_from: id });
            await sb.rpc('increment_reposts', { post_id: id });
            toast('Репост!');
            loadFeed();
        }

        async function toggleComments(postId) {
            const el = document.getElementById('comments-' + postId);
            if (!el) return;
            if (el.style.display === 'block') { el.style.display = 'none'; return; }
            el.style.display = 'block';
            const { data: comments } = await sb.from('comments').select('*, users!comments_user_id_fkey(*)').eq('post_id', postId).order('created_at', { ascending: true });
            document.getElementById('commentsList-' + postId).innerHTML = (comments || []).map(c => `
                <div class="comment"><div class="comment-avatar"><i class="fas fa-user"></i></div><div><strong>${c.users?.full_name || '?'}</strong>: ${c.text}</div></div>
            `).join('') || '<p style="font-size:0.8rem; color:var(--text-soft);">Нет комментариев</p>';
        }

        async function addComment(postId) {
            const input = document.getElementById('commentInput-' + postId);
            if (!input || !input.value.trim()) return;
            await sb.from('comments').insert({ user_id: currentUser.id, post_id: postId, text: input.value.trim() });
            await sb.rpc('increment_comments', { post_id: postId });
            input.value = '';
            toggleComments(postId);
            setTimeout(() => toggleComments(postId), 50);
        }

        // ==================== ПРОФИЛЬ ====================
        function loadProfilePage() {
            const p = currentUser.profile || {};
            document.getElementById('mainContent').innerHTML = `
            <div class="card" style="text-align:center;">
                <div style="font-size:4rem; margin-bottom:8px;"><i class="fas fa-user-circle"></i></div>
                <h2>${p.full_name || 'Пользователь'}</h2>
                <p style="color:var(--text-soft);">@${p.username || ''}</p>
                <p>${p.bio || ''}</p>
                ${p.is_owner ? '<p class="badge-crown"><i class="fas fa-crown"></i> Владелец</p>' : ''}
                ${p.verified ? '<p class="badge-verify"><i class="fas fa-check-circle"></i> Верифицирован</p>' : ''}
                <button class="secondary full" id="btnEditProfile" style="margin-top:8px;"><i class="fas fa-pen"></i> Редактировать</button>
                <button class="danger full" id="btnLogout" style="margin-top:8px;"><i class="fas fa-sign-out-alt"></i> Выйти</button>
            </div>`;
            document.getElementById('btnEditProfile').addEventListener('click', editProfile);
            document.getElementById('btnLogout').addEventListener('click', doLogout);
        }

        function editProfile() {
            const p = currentUser.profile || {};
            const name = prompt('Имя:', p.full_name);
            if (!name) return;
            const bio = prompt('О себе:', p.bio || '');
            sb.from('users').update({ full_name: name, bio }).eq('id', currentUser.id).then(() => {
                currentUser.profile.full_name = name;
                currentUser.profile.bio = bio;
                toast('Профиль обновлён!');
                loadProfilePage();
            });
        }

        // ==================== ДРУЗЬЯ ====================
        async function loadFriends() {
            const { data: allUsers } = await sb.from('users').select('*').neq('id', currentUser.id).order('full_name');
            const { data: myFriends } = await sb.from('friends').select('friend_id').eq('user_id', currentUser.id);
            const friendIds = new Set((myFriends || []).map(f => f.friend_id));

            let h = '<h2 style="margin-bottom:10px;">👥 Пользователи</h2>';
            h += '<input id="searchUser" placeholder="🔍 Поиск..." style="margin-bottom:10px;">';
            h += '<div id="usersList"></div>';

            document.getElementById('mainContent').innerHTML = h;

            window._allUsers = allUsers || [];
            window._friendIds = friendIds;

            document.getElementById('searchUser').addEventListener('input', () => {
                const q = document.getElementById('searchUser').value.toLowerCase();
                const filtered = window._allUsers.filter(u =>
                    u.full_name.toLowerCase().includes(q) || u.username.toLowerCase().includes(q)
                );
                renderUsersList(filtered);
            });

            renderUsersList(allUsers || []);
        }

        function renderUsersList(users) {
            const list = document.getElementById('usersList');
            if (!list) return;
            list.innerHTML = users.map(u => `
                <div class="card user-row">
                    <div id="userInfo-${u.id}" style="display:flex; align-items:center; gap:10px; flex:1;">
                        <div class="post-avatar"><i class="fas fa-user"></i></div>
                        <div>
                            <strong>${u.full_name}</strong>
                            <div style="font-size:0.75rem; color:var(--text-soft);">@${u.username}</div>
                        </div>
                    </div>
                    <button class="small ${window._friendIds.has(u.id) ? 'secondary' : 'success'}" id="btnFriend-${u.id}">
                        ${window._friendIds.has(u.id) ? 'Удалить' : 'Добавить'}
                    </button>
                </div>
            `).join('');

            users.forEach(u => {
                document.getElementById('userInfo-' + u.id)?.addEventListener('click', () => viewUserProfile(u.id));
                document.getElementById('btnFriend-' + u.id)?.addEventListener('click', () => toggleFriend(u.id));
            });
        }

        async function toggleFriend(friendId) {
            if (window._friendIds.has(friendId)) {
                await sb.from('friends').delete().eq('user_id', currentUser.id).eq('friend_id', friendId);
                window._friendIds.delete(friendId);
                toast('Удалён из друзей');
            } else {
                await sb.from('friends').insert({ user_id: currentUser.id, friend_id: friendId });
                window._friendIds.add(friendId);
                toast('Добавлен в друзья!');
            }
            renderUsersList(window._allUsers || []);
        }

        async function viewUserProfile(userId) {
            if (userId === currentUser.id) { nav('profile'); return; }
            const { data: u } = await sb.from('users').select('*').eq('id', userId).single();
            if (!u) return toast('Пользователь не найден');
            const { data: posts } = await sb.from('posts').select('*').eq('user_id', userId).order('created_at', { ascending: false });
            const isFriend = window._friendIds?.has(userId);

            let h = `
            <div class="card" style="text-align:center;">
                <div style="font-size:4rem;"><i class="fas fa-user-circle"></i></div>
                <h2>${u.full_name} ${u.is_owner ? '<i class="fas fa-crown badge-crown"></i>' : ''} ${u.verified ? '<i class="fas fa-check-circle badge-verify"></i>' : ''}</h2>
                <p style="color:var(--text-soft);">@${u.username}</p>
                <p>${u.bio || ''}</p>
                <p>Постов: ${posts?.length || 0}</p>
                <button class="small ${isFriend ? 'secondary' : 'success'}" id="btnToggleFriend">${isFriend ? 'Удалить из друзей' : 'Добавить в друзья'}</button>
                <button class="small" id="btnStartChat" style="margin-left:6px;"><i class="fas fa-comment"></i> Написать</button>
                <button class="secondary full" id="btnBack" style="margin-top:10px;">← Назад</button>
            </div>
            <h3 style="margin-top:12px;">Посты</h3>
            ${(posts || []).map(p => `<div class="card"><p>${p.text || ''}</p><div style="font-size:0.75rem; color:var(--text-soft);">${timeAgo(p.created_at)}</div></div>`).join('') || '<p style="text-align:center; color:var(--text-soft);">Нет постов</p>'}
            `;
            document.getElementById('mainContent').innerHTML = h;

            document.getElementById('btnToggleFriend').addEventListener('click', async () => {
                await toggleFriend(userId);
                viewUserProfile(userId);
            });
            document.getElementById('btnStartChat').addEventListener('click', () => startChat(userId, u.full_name));
            document.getElementById('btnBack').addEventListener('click', () => nav('friends'));
        }

        // ==================== ЧАТЫ ====================
        async function loadChats() {
            stopChatTimer();
            const { data: chats } = await sb.from('chats').select('*').or(`owner_id.eq.${currentUser.id}`).order('created_at', { ascending: false });

            let h = '<h2 style="margin-bottom:8px;">💬 Чаты</h2>';
            if (!chats || chats.length === 0) {
                h += '<div class="info-box">У вас пока нет чатов.<br><br>📌 <b>Как начать общение:</b><br>1. Зайди во вкладку <b>Друзья</b><br>2. Найди человека<br>3. Нажми на его имя<br>4. Нажми кнопку <b>"Написать"</b></div>';
                h += '<button class="secondary full" onclick="nav(\'friends\')" style="margin-top:8px;">👥 Перейти к друзьям</button>';
                document.getElementById('mainContent').innerHTML = h;
                return;
            }

            h += '<div class="chat-container"><div class="chat-list" id="chatList"></div>';
            h += '<div class="chat-messages" id="chatMessages"><p style="text-align:center; color:var(--text-soft); padding:20px;">Выберите чат</p></div>';
            h += '<div class="chat-input-row" id="chatInput" style="display:none;"></div></div>';
            document.getElementById('mainContent').innerHTML = h;

            const chatList = document.getElementById('chatList');
            chatList.innerHTML = chats.map(c => `
                <div class="chat-list-item" data-chatid="${c.id}" id="chatItem-${c.id}">
                    <i class="fas fa-comments"></i> <span>${c.name || 'Чат'}</span>
                </div>
            `).join('');

            chats.forEach(c => {
                document.getElementById('chatItem-' + c.id)?.addEventListener('click', () => openChat(c.id));
            });
        }

        async function startChat(userId, userName) {
            stopChatTimer();
            const { data: chat, error } = await sb.from('chats').insert({
                type: 'dm', name: userName || 'Чат', owner_id: currentUser.id
            }).select().single();

            if (error) return toast('Ошибка: ' + error.message);
            if (chat) {
                toast('Чат с ' + userName + ' создан!');
                nav('chats');
                setTimeout(() => openChat(chat.id), 400);
            }
        }

        function openChat(chatId) {
            stopChatTimer();
            currentChatId = chatId;

            document.querySelectorAll('.chat-list-item').forEach(el => el.classList.remove('active'));
            document.getElementById('chatItem-' + chatId)?.classList.add('active');

            document.getElementById('chatInput').style.display = 'flex';
            document.getElementById('chatInput').innerHTML = `
                <input id="msgInput" placeholder="Сообщение...">
                <button class="small" id="btnSendMsg"><i class="fas fa-paper-plane"></i></button>
            `;

            document.getElementById('btnSendMsg').addEventListener('click', sendMessage);
            document.getElementById('msgInput').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') sendMessage();
            });

            refreshMessages(chatId);
            chatTimer = setInterval(() => refreshMessages(chatId), 2000);
        }

        async function refreshMessages(chatId) {
            if (!chatId) return;
            const { data: messages } = await sb.from('messages').select('*, users!messages_from_user_id_fkey(*)').eq('chat_id', chatId).order('created_at', { ascending: true });
            const container = document.getElementById('chatMessages');
            if (!container) return;
            container.innerHTML = (messages || []).map(m => `
                <div class="msg ${m.from_user_id === currentUser.id ? 'sent' : 'received'}">
                    ${m.from_user_id !== currentUser.id ? `<strong style="font-size:0.7rem;">${m.users?.full_name || '?'}</strong><br>` : ''}
                    ${m.text}
                </div>
            `).join('') || '<p style="text-align:center; color:var(--text-soft);">Нет сообщений</p>';
            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('msgInput');
            if (!input || !input.value.trim() || !currentChatId) return;
            const text = input.value.trim();
            input.value = '';
            await sb.from('messages').insert({ chat_id: currentChatId, from_user_id: currentUser.id, text });
            refreshMessages(currentChatId);
        }

        // ==================== ОСТАЛЬНОЕ ====================
        function loadMore() {
            document.getElementById('mainContent').innerHTML = `
            <div class="card" id="btnChannels"><h3><i class="fas fa-bullhorn"></i> Каналы</h3><p style="color:var(--text-soft);">Создавайте тематические каналы</p></div>
            <div class="card" id="btnMusic"><h3><i class="fas fa-music"></i> Музыка</h3><p style="color:var(--text-soft);">Загружайте любимые треки</p></div>
            <div class="card" id="btnVerify"><h3><i class="fas fa-check-circle"></i> Верификация</h3><p style="color:var(--text-soft);">Получите галочку</p></div>`;
            document.getElementById('btnChannels').addEventListener('click', () => nav('channels'));
            document.getElementById('btnMusic').addEventListener('click', () => nav('music'));
            document.getElementById('btnVerify').addEventListener('click', () => nav('verify'));
        }

        function loadChannels() {
            document.getElementById('mainContent').innerHTML = `
            <div class="card"><h2>📢 Каналы</h2><button class="full" id="btnCreateChannel"><i class="fas fa-plus"></i> Создать</button>
            <button class="secondary full" id="btnBackChannels" style="margin-top:8px;">← Назад</button></div>`;
            document.getElementById('btnCreateChannel').addEventListener('click', createChannel);
            document.getElementById('btnBackChannels').addEventListener('click', () => nav('more'));
        }

        async function createChannel() {
            const name = prompt('Название:');
            if (!name) return;
            const theme = prompt('Тематика:');
            if (!theme) return;
            await sb.from('channels').insert({ owner_id: currentUser.id, name, theme });
            toast('Канал создан!');
        }

        function loadMusic() {
            document.getElementById('mainContent').innerHTML = `
            <div class="card"><h2>🎵 Музыка</h2><button class="full" id="btnUploadMusic"><i class="fas fa-upload"></i> Загрузить</button>
            <button class="secondary full" id="btnBackMusic" style="margin-top:8px;">← Назад</button></div>`;
            document.getElementById('btnUploadMusic').addEventListener('click', uploadMusic);
            document.getElementById('btnBackMusic').addEventListener('click', () => nav('more'));
        }

        async function uploadMusic() {
            const artist = prompt('Исполнитель:');
            const title = prompt('Название:');
            if (!artist || !title) return;
            await sb.from('music').insert({ owner_id: currentUser.id, artist, title, status: 'pending' });
            toast('Трек на проверке!');
        }

        function loadVerify() {
            const p = currentUser.profile || {};
            document.getElementById('mainContent').innerHTML = `
            <div class="card"><h2>✅ Верификация</h2>
            ${p.is_owner ? '<p class="badge-crown"><i class="fas fa-crown"></i> Вы владелец</p>' : 
              p.verified ? '<p class="badge-verify"><i class="fas fa-check-circle"></i> Верифицирован</p>' :
              '<textarea id="verReason" placeholder="Почему вы?" rows="3"></textarea><button class="full" id="btnReqVerify" style="margin-top:8px;">Отправить</button>'}
            <button class="secondary full" id="btnBackVerify" style="margin-top:8px;">← Назад</button></div>`;
            const btnReq = document.getElementById('btnReqVerify');
            if (btnReq) btnReq.addEventListener('click', reqVerify);
            document.getElementById('btnBackVerify').addEventListener('click', () => nav('more'));
        }

        async function reqVerify() {
            const reason = document.getElementById('verReason')?.value.trim();
            if (!reason) return toast('Укажите причину');
            await sb.from('verification_requests').insert({ user_id: currentUser.id, reason, status: 'pending' });
            toast('Заявка отправлена!');
        }

        async function doLogout() {
            stopChatTimer();
            await sb.auth.signOut();
            currentUser = null;
            renderLogin();
        }

        // ЗАПУСК
        (async () => {
            const { data } = await sb.auth.getSession();
            if (data.session) {
                currentUser = data.session.user;
                await loadProfile();
                showMainApp();
            } else {
                renderLogin();
            }
        })();
    </script>
</body>
</html>
