<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Godmode</title>
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/48/000000/cube.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #f5f5f5; --surface: #ffffff; --surface2: #f8f9fa;
            --primary: #6366f1; --primary-light: #818cf8; --primary-soft: #eef2ff;
            --text: #1a1a1a; --text-secondary: #6b7280; --text-tertiary: #9ca3af;
            --border: #e5e7eb; --danger: #ef4444; --danger-soft: #fef2f2;
            --success: #10b981; --success-soft: #ecfdf5; --warning: #f59e0b; --warning-soft: #fffbeb;
            --radius-sm: 8px; --radius: 14px; --radius-lg: 18px; --radius-xl: 22px;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-lg: 0 4px 16px rgba(0,0,0,0.08);
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .dark {
            --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #222222;
            --primary: #818cf8; --primary-light: #a5b4fc; --primary-soft: #1e1b4b;
            --text: #f1f1f1; --text-secondary: #a1a1aa; --text-tertiary: #71717a;
            --border: #27272a; --danger-soft: #2d1b1b; --success-soft: #1b2d1b; --warning-soft: #2d2a1b;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.2); --shadow: 0 1px 3px rgba(0,0,0,0.3); --shadow-lg: 0 4px 16px rgba(0,0,0,0.4);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: var(--bg); color: var(--text);
            display: flex; justify-content: center; min-height: 100vh; min-height: 100dvh;
            -webkit-tap-highlight-color: transparent; -webkit-font-smoothing: antialiased;
            transition: background 0.3s, color 0.3s; user-select: none; -webkit-user-select: none;
        }
        .app { width: 100%; max-width: 480px; min-height: 100vh; min-height: 100dvh; background: var(--bg); display: flex; flex-direction: column; position: relative; }
        .screen-center { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; min-height: 100dvh; padding: 24px; gap: 16px; }
        .logo-container { display: flex; flex-direction: column; align-items: center; gap: 8px; margin-bottom: 16px; }
        .logo-icon { width: 72px; height: 72px; border-radius: 20px; background: linear-gradient(135deg, #6366f1, #8b5cf6); display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 24px rgba(99,102,241,0.3); }
        .logo-icon img { width: 40px; height: 40px; filter: brightness(0) invert(1); }
        .logo-text { font-size: 2rem; font-weight: 800; letter-spacing: -0.5px; background: linear-gradient(135deg, #6366f1, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        input, textarea { width: 100%; padding: 14px 16px; border-radius: var(--radius); border: 1.5px solid var(--border); font-size: 1rem; background: var(--surface); color: var(--text); font-family: inherit; transition: var(--transition); outline: none; }
        input:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
        input::placeholder, textarea::placeholder { color: var(--text-tertiary); }
        button { padding: 12px 20px; border-radius: var(--radius); background: var(--primary); color: white; font-weight: 600; font-size: 0.95rem; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; justify-content: center; transition: var(--transition); font-family: inherit; position: relative; overflow: hidden; -webkit-tap-highlight-color: transparent; touch-action: manipulation; min-height: 48px; }
        button::after { content: ''; position: absolute; inset: 0; background: rgba(255,255,255,0.1); opacity: 0; transition: opacity 0.15s; }
        button:active::after { opacity: 1; } button:active { transform: scale(0.97); }
        button.secondary { background: var(--surface2); color: var(--text); border: 1.5px solid var(--border); }
        button.ghost { background: transparent; color: var(--primary); border: none; padding: 8px 12px; min-height: auto; }
        button.danger { background: var(--danger); } button.success { background: var(--success); }
        button.small { padding: 8px 14px; font-size: 0.85rem; min-height: 38px; border-radius: var(--radius-sm); }
        button.full { width: 100%; } button.icon-only { width: 40px; height: 40px; min-height: 40px; padding: 0; border-radius: 50%; }
        .error-box { background: var(--danger-soft); border: 1.5px solid var(--danger); border-radius: var(--radius); padding: 14px; color: var(--danger); font-size: 0.9rem; width: 100%; }
        .info-box { background: var(--primary-soft); border: 1.5px solid var(--primary); border-radius: var(--radius); padding: 14px; color: var(--primary); font-size: 0.9rem; width: 100%; }
        .header { background: var(--surface); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); background: rgba(255,255,255,0.85); }
        .dark .header { background: rgba(26,26,26,0.85); }
        .header-logo { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 1.2rem; color: var(--primary); }
        .header-logo img { width: 28px; height: 28px; border-radius: 8px; }
        .content { flex: 1; overflow-y: auto; padding: 12px; padding-bottom: 100px; -webkit-overflow-scrolling: touch; }
        .card { background: var(--surface); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 10px; border: 1px solid var(--border); box-shadow: var(--shadow-sm); transition: var(--transition); }
        .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .post-avatar { width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(135deg, #6366f1, #8b5cf6); display: flex; align-items: center; justify-content: center; font-size: 1.1rem; color: white; flex-shrink: 0; font-weight: 600; overflow: hidden; }
        .post-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .post-actions { display: flex; gap: 28px; margin-top: 12px; color: var(--text-secondary); font-size: 0.9rem; }
        .post-actions span { cursor: pointer; display: flex; align-items: center; gap: 5px; transition: var(--transition); padding: 4px 8px; border-radius: 20px; }
        .post-actions span:active { background: var(--primary-soft); color: var(--primary); }
        .comment-box { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
        .comment { display: flex; gap: 8px; margin-bottom: 10px; font-size: 0.9rem; align-items: flex-start; }
        .comment-avatar { width: 30px; height: 30px; border-radius: 50%; background: linear-gradient(135deg, #a5b4fc, #c4b5fd); display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: white; flex-shrink: 0; font-weight: 600; overflow: hidden; }
        .comment-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .comment-input-row { display: flex; gap: 8px; margin-top: 10px; align-items: center; }
        .comment-input-row input { flex: 1; padding: 10px 14px; font-size: 0.9rem; border-radius: 24px; }
        .chat-container { display: flex; flex-direction: column; height: 70vh; background: var(--surface); border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--border); box-shadow: var(--shadow); }
        .chat-list { max-height: 35%; overflow-y: auto; border-bottom: 1px solid var(--border); }
        .chat-list-item { padding: 14px 16px; cursor: pointer; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; font-weight: 500; transition: var(--transition); }
        .chat-list-item:active { background: var(--primary-soft); }
        .chat-list-item.active { background: var(--primary-soft); border-left: 3px solid var(--primary); }
        .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; background: var(--surface2); }
        .msg { padding: 10px 16px; border-radius: 20px; max-width: 78%; word-break: break-word; font-size: 0.9rem; line-height: 1.4; position: relative; animation: msgIn 0.2s ease; }
        @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .msg.sent { background: var(--primary); color: white; align-self: flex-end; border-bottom-right-radius: 6px; }
        .msg.received { background: var(--surface); align-self: flex-start; border-bottom-left-radius: 6px; box-shadow: var(--shadow-sm); }
        .chat-input-row { display: flex; gap: 8px; padding: 10px 12px; border-top: 1px solid var(--border); background: var(--surface); align-items: center; }
        .chat-input-row input { flex: 1; padding: 10px 16px; font-size: 0.9rem; border-radius: 24px; border: 1.5px solid var(--border); background: var(--surface2); }
        .chat-input-row button { min-height: 42px; width: 42px; padding: 0; border-radius: 50%; }
        .emoji-picker { position: absolute; bottom: 70px; right: 12px; background: var(--surface); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); padding: 12px; display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; z-index: 100; max-width: 300px; border: 1px solid var(--border); }
        .emoji-picker span { font-size: 1.5rem; cursor: pointer; padding: 6px; text-align: center; border-radius: 8px; transition: var(--transition); }
        .emoji-picker span:active { background: var(--primary-soft); transform: scale(1.2); }
        .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: var(--surface); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 6px 4px max(10px, env(safe-area-inset-bottom)); z-index: 100; backdrop-filter: blur(20px); background: rgba(255,255,255,0.9); }
        .dark .bottom-nav { background: rgba(26,26,26,0.9); }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; color: var(--text-tertiary); font-size: 0.65rem; font-weight: 500; padding: 8px 12px; border-radius: 12px; transition: var(--transition); position: relative; touch-action: manipulation; }
        .nav-item i { font-size: 1.4rem; transition: var(--transition); }
        .nav-item.active { color: var(--primary); } .nav-item.active i { transform: scale(1.1); } .nav-item:active { background: var(--primary-soft); }
        .badge-crown { color: #f59e0b; } .badge-verify { color: #6366f1; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 0.7rem; font-weight: 600; }
        .badge-pending { background: var(--warning-soft); color: #92400e; }
        .badge-approved { background: var(--success-soft); color: #065f46; }
        .badge-rejected { background: var(--danger-soft); color: #991b1b; }
        .toast { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: white; padding: 12px 24px; border-radius: 24px; font-size: 0.85rem; font-weight: 500; z-index: 300; display: none; box-shadow: var(--shadow-lg); animation: toastIn 0.3s ease; }
        @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        .dark .toast { background: #f1f1f1; color: #1a1a1a; }
        .link-text { color: var(--primary); cursor: pointer; font-weight: 600; transition: var(--transition); } .link-text:active { opacity: 0.7; }
        .user-row { display: flex; align-items: center; gap: 12px; border-radius: var(--radius); justify-content: space-between; }
        .settings-item { display: flex; align-items: center; justify-content: space-between; padding: 16px; cursor: pointer; transition: var(--transition); } .settings-item:active { background: var(--primary-soft); }
        .toggle-switch { width: 48px; height: 28px; background: var(--border); border-radius: 14px; position: relative; cursor: pointer; transition: var(--transition); }
        .toggle-switch.active { background: var(--primary); }
        .toggle-switch::after { content: ''; position: absolute; top: 3px; left: 3px; width: 22px; height: 22px; background: white; border-radius: 50%; transition: var(--transition); box-shadow: var(--shadow-sm); }
        .toggle-switch.active::after { left: 23px; }
        .profile-banner { width: 100%; height: 160px; object-fit: cover; border-radius: var(--radius-lg) var(--radius-lg) 0 0; background: linear-gradient(135deg, #6366f1, #8b5cf6, #a5b4fc); cursor: pointer; position: relative; }
        .profile-banner-edit { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.5); color: white; padding: 4px 10px; border-radius: 12px; font-size: 0.7rem; cursor: pointer; backdrop-filter: blur(10px); }
        .profile-avatar-lg { width: 90px; height: 90px; border-radius: 50%; border: 4px solid var(--surface); object-fit: cover; margin-top: -45px; position: relative; z-index: 2; background: linear-gradient(135deg, #6366f1, #8b5cf6); display: flex; align-items: center; justify-content: center; font-size: 2rem; color: white; font-weight: 700; overflow: hidden; cursor: pointer; }
        .profile-avatar-lg img { width: 100%; height: 100%; object-fit: cover; }
        .profile-avatar-edit { position: absolute; bottom: 0; right: -5px; background: var(--primary); color: white; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; cursor: pointer; border: 3px solid var(--surface); z-index: 3; }
        @media (max-width: 380px) { .post-actions { gap: 16px; font-size: 0.8rem; } .chat-input-row { gap: 4px; padding: 8px; } }
    </style>
</head>
<body>
    <div class="app" id="app"></div>
    <div class="toast" id="toast"></div>

    <script>
        const SUPABASE_URL = 'https://byniblcezicrvyyqbafc.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_exBhK1ZwxY3uSoErm0jVFA_gR97KaAy';
        const OWNER_EMAIL = 'ilyabelyev344@gmail.com';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;
        let currentPage = 'feed';
        let currentChatId = null;
        let chatTimer = null;
        let theme = localStorage.getItem('godmode_theme') || 'light';
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;

        if (theme === 'dark') document.body.classList.add('dark');

        function toast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.style.display = 'block'; clearTimeout(t._t); t._t = setTimeout(() => t.style.display = 'none', 2000); }
        function timeAgo(d) { const s = Math.floor((Date.now() - new Date(d)) / 1000); if (s < 60) return 'сейчас'; if (s < 3600) return Math.floor(s/60) + ' мин'; if (s < 86400) return Math.floor(s/3600) + ' ч'; return new Date(d).toLocaleDateString('ru-RU'); }
        function stopChatTimer() { if (chatTimer) { clearInterval(chatTimer); chatTimer = null; } }
        function getInitials(name) { return (name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }
        function getAvatarHTML(user) {
            if (user?.avatar_url) return `<img src="${user.avatar_url}" alt="avatar">`;
            return getInitials(user?.full_name || '?');
        }

        // ==================== АВТОРИЗАЦИЯ ====================
        function renderLogin(err) {
            let h = '<div class="screen-center"><div class="logo-container"><div class="logo-icon"><img src="https://img.icons8.com/fluency/96/000000/cube.png" alt="logo" onerror="this.style.display=\'none\'"></div><div class="logo-text">Godmode</div></div>';
            if (err) h += `<div class="error-box">${err}</div>`;
            h += `<input id="loginEmail" type="email" placeholder="Email" value="${OWNER_EMAIL}"><input id="loginPass" type="password" placeholder="Пароль" value="Assasin2)"><button class="full" id="btnLogin">Войти</button><p style="color:var(--text-secondary);">Нет аккаунта? <span class="link-text" id="linkRegister">Регистрация</span></p></div>`;
            document.getElementById('app').innerHTML = h;
            document.getElementById('btnLogin').addEventListener('click', doLogin);
            document.getElementById('linkRegister').addEventListener('click', () => renderRegister());
        }

        function renderRegister(err) {
            let h = '<div class="screen-center"><div class="logo-container"><div class="logo-icon"><img src="https://img.icons8.com/fluency/96/000000/cube.png" alt="logo" onerror="this.style.display=\'none\'"></div><div class="logo-text">Godmode</div></div>';
            if (err) h += `<div class="error-box">${err}</div>`;
            h += '<input id="regName" placeholder="Полное имя"><input id="regUser" placeholder="Юзернейм"><input id="regEmail" type="email" placeholder="Email"><input id="regPass" type="password" placeholder="Пароль (мин 6)"><button class="full" id="btnRegister">Зарегистрироваться</button><p style="color:var(--text-secondary);">Уже есть аккаунт? <span class="link-text" id="linkLogin">Войти</span></p></div>';
            document.getElementById('app').innerHTML = h;
            document.getElementById('btnRegister').addEventListener('click', doRegister);
            document.getElementById('linkLogin').addEventListener('click', () => renderLogin());
        }

        async function doLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPass').value;
            if (!email || !pass) return renderLogin('Заполните все поля');
            const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
            if (error) return renderLogin(error.message);
            currentUser = data.user;
            await loadProfile();
            showMainApp();
        }

        async function doRegister() {
            const name = document.getElementById('regName').value.trim();
            const username = document.getElementById('regUser').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const pass = document.getElementById('regPass').value;
            if (!name || !username || !email || !pass) return renderRegister('Заполните все поля');
            if (pass.length < 6) return renderRegister('Пароль минимум 6 символов');
            const { data, error } = await sb.auth.signUp({ email, password: pass });
            if (error) { if (error.message.includes('already')) return renderLogin('Уже зарегистрирован. Войдите.'); return renderRegister(error.message); }
            const isOwner = (email === OWNER_EMAIL);
            await sb.from('users').insert({ id: data.user.id, email, username, full_name: name, is_owner: isOwner, verified: isOwner });
            await sb.from('user_settings').insert({ user_id: data.user.id });
            currentUser = data.user;
            currentUser.profile = { id: data.user.id, email, username, full_name: name, is_owner: isOwner, verified: isOwner, avatar_url: '', banner_url: '', bio: '' };
            showMainApp();
        }

        async function loadProfile() { const { data } = await sb.from('users').select('*').eq('id', currentUser.id).single(); if (data) currentUser.profile = data; }

        // ==================== ГЛАВНЫЙ ЭКРАН ====================
        function showMainApp() {
            stopChatTimer();
            let h = '<div class="header"><div class="header-logo"><img src="https://img.icons8.com/fluency/48/000000/cube.png" alt="logo" onerror="this.style.display=\'none\'" style="width:28px;height:28px;border-radius:8px;"><span>Godmode</span></div>';
            if (currentUser.profile?.is_owner) h += '<i class="fas fa-crown badge-crown" style="font-size:1.1rem;"></i>';
            h += '</div><div class="content" id="mainContent"></div><div class="bottom-nav" id="bottomNav">';
            h += '<div class="nav-item active" data-page="feed"><i class="fas fa-house"></i>Лента</div>';
            h += '<div class="nav-item" data-page="friends"><i class="fas fa-users"></i>Друзья</div>';
            h += '<div class="nav-item" data-page="chats"><i class="fas fa-message"></i>Чаты</div>';
            h += '<div class="nav-item" data-page="profile"><i class="fas fa-circle-user"></i>Профиль</div>';
            h += '<div class="nav-item" data-page="settings"><i class="fas fa-sliders"></i>Ещё</div>';
            h += '</div>';
            document.getElementById('app').innerHTML = h;
            document.querySelectorAll('#bottomNav .nav-item').forEach(item => item.addEventListener('click', function(e) { e.preventDefault(); nav(this.dataset.page); }));
            nav('feed');
        }

        function nav(page) {
            stopChatTimer(); currentPage = page; currentChatId = null;
            document.querySelectorAll('#bottomNav .nav-item').forEach(n => n.classList.remove('active'));
            const target = document.querySelector(`#bottomNav .nav-item[data-page="${page}"]`);
            if (target) target.classList.add('active');
            switch (page) {
                case 'feed': loadFeed(); break;
                case 'profile': loadProfilePage(); break;
                case 'friends': loadFriends(); break;
                case 'chats': loadChats(); break;
                case 'settings': loadSettings(); break;
                case 'editProfile': loadEditProfile(); break;
                case 'moderation': loadModeration(); break;
                case 'channels': loadChannels(); break;
                case 'music': loadMusic(); break;
                case 'verify': loadVerify(); break;
            }
        }

        // ==================== ЛЕНТА ====================
        async function loadFeed() {
            const { data: posts } = await sb.from('posts').select('*, users!posts_user_id_fkey(*)').order('created_at', { ascending: false }).limit(30);
            let h = `<div class="card"><textarea id="postText" placeholder="Что у вас нового?" rows="2" style="border:none; padding:4px 0; background:transparent; resize:none;"></textarea><button class="full" id="btnCreatePost" style="margin-top:8px;"><i class="fas fa-paper-plane"></i> Опубликовать</button></div>`;
            if (posts && posts.length > 0) {
                posts.forEach(p => {
                    const u = p.users || {};
                    h += `<div class="card"><div class="post-header" id="ph-${p.user_id}"><div class="post-avatar">${getAvatarHTML(u)}</div><div style="flex:1;"><strong>${u.full_name||'?'}</strong>${u.is_owner?' <i class="fas fa-crown badge-crown"></i>':''}${u.verified?' <i class="fas fa-circle-check badge-verify"></i>':''}<div style="font-size:0.75rem; color:var(--text-tertiary);">${timeAgo(p.created_at)}</div></div>${p.user_id===currentUser.id?`<button class="ghost icon-only" id="bd-${p.id}"><i class="fas fa-trash" style="color:var(--danger);"></i></button>`:''}</div><p style="white-space:pre-wrap; font-size:0.95rem; line-height:1.5;">${p.text||''}</p><div class="post-actions"><span id="bl-${p.id}"><i class="far fa-heart"></i> ${p.likes_count||0}</span><span id="bc-${p.id}"><i class="far fa-message"></i> ${p.comments_count||0}</span><span id="br-${p.id}"><i class="fas fa-arrow-right-arrow-left"></i> ${p.reposts_count||0}</span></div><div class="comment-box" id="comments-${p.id}" style="display:none;"><div id="cl-${p.id}"></div><div class="comment-input-row"><input id="ci-${p.id}" placeholder="Комментарий..."><button class="ghost icon-only" id="ba-${p.id}"><i class="fas fa-paper-plane" style="color:var(--primary);"></i></button></div></div></div>`;
                });

        function changeAvatar() {

            input.onchange = function() {
                const file = input.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async function(e) {
                    const base64 = e.target.result;
                    // Сохраняем как base64 в базу (до 1MB)
                    if (base64.length > 1000000) return toast('Файл слишком большой (макс 1MB)');
                    await sb.from('users').update({ avatar_url: base64 }).eq('id', currentUser.id);
                    currentUser.profile.avatar_url = base64;
                    toast('✅ Аватар обновлён!');
                    nav('editProfile');
                };
                reader.readAsDataURL(file);
            };
            input.click();
        }

                verifications.forEach(v => {
                    const u = v.users || {};
                    h += `<div class="card"><strong>${u.full_name||'?'}</strong> (@${u.username||''})<p style="margin:4px 0;">${v.reason||''}</p><span class="badge badge-${v.status==='approved'?'approved':v.status==='rejected'?'rejected':'pending'}">${v.status==='approved'?'Одобрено':v.status==='rejected'?'Отклонено':'На проверке'}</span>${v.status==='pending'?`<div style="margin-top:8px;display:flex;gap:6px;"><button class="success small" id="app-${v.id}">✓ Одобрить</button><button class="danger small" id="rej-${v.id}">✗ Отклонить</button></div>`:''}</div>`;
                });
            } else h += '<p style="color:var(--text-tertiary);">Нет заявок</p>';
            h += '<button class="secondary full" onclick="nav(\'settings\')" style="margin-top:12px;">← Назад</button>';
            document.getElementById('mainContent').innerHTML = h;
            verifications?.forEach(v => {
                document.getElementById('app-'+v.id)?.addEventListener('click', () => approveVerification(v.id, v.user_id));
                document.getElementById('rej-'+v.id)?.addEventListener('click', () => rejectVerification(v.id));
            });
        }

        async function approveVerification(verId, userId) { await sb.from('verification_requests').update({ status: 'approved' }).eq('id', verId); await sb.from('users').update({ verified: true }).eq('id', userId); toast('✅ Одобрено!'); loadModeration(); }
        async function rejectVerification(verId) { await sb.from('verification_requests').update({ status: 'rejected' }).eq('id', verId); toast('❌ Отклонено'); loadModeration(); }

        function loadChannels() { document.getElementById('mainContent').innerHTML='<div class="card"><h2>📢 Каналы</h2><button class="full" id="bcr"><i class="fas fa-plus"></i> Создать</button><button class="secondary full" id="bbk" style="margin-top:8px;">← Назад</button></div>'; document.getElementById('bcr').addEventListener('click',async()=>{const n=prompt('Название:'),t=prompt('Тематика:'); if(n&&t){await sb.from('channels').insert({owner_id:currentUser.id,name:n,theme:t}); toast('Создан!');}}); document.getElementById('bbk').addEventListener('click',()=>nav('settings')); }
        function loadMusic() { document.getElementById('mainContent').innerHTML='<div class="card"><h2>🎵 Музыка</h2><button class="full" id="bup"><i class="fas fa-upload"></i> Загрузить</button><button class="secondary full" id="bbm" style="margin-top:8px;">← Назад</button></div>'; document.getElementById('bup').addEventListener('click',async()=>{const a=prompt('Исполнитель:'),t=prompt('Название:'); if(a&&t){await sb.from('music').insert({owner_id:currentUser.id,artist:a,title:t,status:'pending'}); toast('На проверке!');}}); document.getElementById('bbm').addEventListener('click',()=>nav('settings')); }
        function loadVerify() { const p=currentUser.profile||{}; document.getElementById('mainContent').innerHTML=`<div class="card"><h2>✅ Верификация</h2>${p.is_owner?'<p class="badge-crown"><i class="fas fa-crown"></i> Владелец</p>':p.verified?'<p class="badge-verify"><i class="fas fa-circle-check"></i> Верифицирован</p>':'<textarea id="vr" rows="3" placeholder="Почему вы?"></textarea><button class="full" id="brq" style="margin-top:8px;"><i class="fas fa-paper-plane"></i> Отправить</button>'}<button class="secondary full" id="bbv" style="margin-top:8px;">← Назад</button></div>`; document.getElementById('brq')?.addEventListener('click',async()=>{const r=document.getElementById('vr')?.value.trim(); if(r){await sb.from('verification_requests').insert({user_id:currentUser.id,reason:r,status:'pending'}); toast('Заявка отправлена!'); nav('settings');}}); document.getElementById('bbv').addEventListener('click',()=>nav('settings')); }

        async function doLogout() { stopChatTimer(); await sb.auth.signOut(); currentUser=null; renderLogin(); }

        (async () => {
            const { data } = await sb.auth.getSession();
            if (data.session) { currentUser=data.session.user; await loadProfile(); showMainApp(); }
            else renderLogin();
        })();
    </script>
</body>
</html>
