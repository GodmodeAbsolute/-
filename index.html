    <style>
        :root {
            --bg: #f5f5f5; --surface: #fff; --surface2: #f8f9fa;
            --primary: #6366f1; --primary-soft: #eef2ff;
            --text: #1a1a1a; --text-secondary: #6b7280; --text-tertiary: #9ca3af;
            --border: #e5e7eb; --danger: #ef4444; --success: #10b981;
            --radius: 16px; --radius-sm: 10px; --radius-lg: 20px;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.08);
            --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
            --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
        }
        /* 12 тем */
        .theme-ocean { --primary: #0ea5e9; --primary-soft: #e0f2fe; }
        .theme-sunset { --primary: #f97316; --primary-soft: #fff7ed; }
        .theme-forest { --primary: #22c55e; --primary-soft: #f0fdf4; }
        .theme-neon { --primary: #d946ef; --primary-soft: #fdf4ff; }
        .theme-midnight { --primary: #1e293b; --primary-soft: #f1f5f9; }
        .theme-gold { --primary: #eab308; --primary-soft: #fefce8; }
        .theme-rose { --primary: #f43f5e; --primary-soft: #fff1f2; }
        .theme-cyan { --primary: #06b6d4; --primary-soft: #ecfeff; }
        .theme-violet { --primary: #8b5cf6; --primary-soft: #f5f3ff; }
        .theme-amber { --primary: #f59e0b; --primary-soft: #fffbeb; }
        .theme-teal { --primary: #14b8a6; --primary-soft: #f0fdfa; }
        .theme-indigo { --primary: #6366f1; --primary-soft: #eef2ff; }
        
        .dark { --bg:#0f0f0f; --surface:#1a1a1a; --surface2:#222; --text:#f1f1f1; --text-secondary:#a1a1aa; --text-tertiary:#71717a; --border:#27272a; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:var(--font); background:var(--bg); color:var(--text); display:flex; justify-content:center; min-height:100dvh; -webkit-tap-highlight-color:transparent; -webkit-font-smoothing:antialiased; transition:background 0.3s,color 0.3s; }
        .app { width:100%; max-width:480px; min-height:100dvh; background:var(--bg); display:flex; flex-direction:column; }
