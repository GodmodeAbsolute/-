<nav class="nav-card">
  <button class="nav-item active" onclick="switchTab(event, 'tab-profile')">👤 Моя страница</button>
  <button class="nav-item" onclick="switchTab(event, 'tab-feed')">📰 Лента новостей</button>
  <button class="nav-item" onclick="switchTab(event, 'tab-chats')">💬 Чаты</button>
  <button class="nav-item" onclick="switchTab(event, 'tab-groups')">👥 Группы</button>

</nav>

<!-- ВКЛАДКА 1: Профиль (Моя страница) -->
<main id="tab-profile" class="tab-content active">
  <div class="profile-card">
    <div id="profile-banner" class="profile-banner"></div>
    <div class="profile-content">
      <button class="edit-btn" onclick="toggleUploadPanel()">✏️ Редактировать</button>
      <div class="avatar-wrapper">
        <img id="profile-avatar" class="profile-avatar" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 24 24' fill='%231a2035'></svg>" alt="Avatar">
      </div>
      <h1 class="user-fullname">Алексей Смирнов</h1>
      <div class="user-handle">@absolute_godmode</div>
      <p class="user-bio">Создатель Godmode Network.<br>Разрабатываю крутые интерфейсы и сервисы.</p>
    </div>

    <!-- Загрузка фото -->
    <div id="upload-panel" class="upload-panel">
      <label class="upload-btn-label" for="banner-input">🖼 Загрузить баннер с телефона</label>
      <input type="file" id="banner-input" class="hidden-input" accept="image/*" onchange="previewImage(event, 'profile-banner')">

      <label class="upload-btn-label" for="avatar-input">📷 Загрузить аватарку с телефона</label>
      <input type="file" id="avatar-input" class="hidden-input" accept="image/*" onchange="previewImage(event, 'profile-avatar')">
    </div>
  </div>
</main>

<!-- ВКЛАДКА 2: Лента новостей -->
<section id="tab-feed" class="tab-content">
  <div class="content-card">
    <h2>Лента новостей</h2>
    <p>Здесь будут отображаться посты и обновления.</p>
  </div>
</section>

<!-- ВКЛАДКА 3: Чаты -->
<section id="tab-chats" class="tab-content">
  <div class="content-card">
    <h2>Чаты</h2>
    <p>Список ваших диалогов и сообщений.</p>
  </div>
</section>

<!-- ВКЛАДКА 4: Группы -->
<section id="tab-groups" class="tab-content">
  <div class="content-card">
    <h2>Группы</h2>
    <p>Ваши сообщества и каналы.</p>
  </div>
</section>

<!-- ВКЛАДКА 5: Настройки -->
<section id="tab-settings" class="tab-content">
  <div class="content-card">
    <h2>Настройки</h2>

  </div>
</section>
