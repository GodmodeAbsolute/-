<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Godmode</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💠</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg:#f5f5f5; --surface:#fff; --surface2:#f8f9fa; --primary:#6366f1; --primary-soft:#eef2ff; --text:#1a1a1a; --text-secondary:#6b7280; --text-tertiary:#9ca3af; --border:#e5e7eb; --danger:#ef4444; --success:#10b981; --warning:#f59e0b; --radius-sm:10px; --radius:16px; --radius-lg:20px; --shadow-sm:0 1px 2px rgba(0,0,0,0.04); --shadow:0 1px 3px rgba(0,0,0,0.06); --shadow-lg:0 8px 24px rgba(0,0,0,0.08); }
        .dark { --bg:#0f0f0f; --surface:#1a1a1a; --surface2:#222; --primary:#818cf8; --primary-soft:#1e1b4b; --text:#f1f1f1; --text-secondary:#a1a1aa; --text-tertiary:#71717a; --border:#27272a; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,sans-serif; background:var(--bg); color:var(--text); display:flex; justify-content:center; min-height:100vh; min-height:100dvh; -webkit-tap-highlight-color:transparent; -webkit-font-smoothing:antialiased; transition:background 0.3s,color 0.3s; }
        .app { width:100%; max-width:480px; min-height:100vh; background:var(--bg); display:flex; flex-direction:column; position:relative; }
        .screen-center { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:24px; gap:14px; }
        .logo-icon { width:80px; height:80px; border-radius:22px; background:linear-gradient(135deg,#6366f1,#8b5cf6); display:flex; align-items:center; justify-content:center; box-shadow:0 8px 32px rgba(99,102,241,0.35); font-size:2.5rem; }
        .logo-text { font-size:2rem; font-weight:800; background:linear-gradient(135deg,#6366f1,#8b5cf6); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        input,textarea { width:100%; padding:14px 16px; border-radius:var(--radius); border:1.5px solid var(--border); font-size:1rem; background:var(--surface); color:var(--text); font-family:inherit; transition:0.2s; outline:none; }
        input:focus,textarea:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(99,102,241,0.15); }
        button { padding:14px 20px; border-radius:var(--radius); background:var(--primary); color:#fff; font-weight:600; font-size:1rem; border:none; cursor:pointer; display:inline-flex; align-items:center; gap:8px; justify-content:center; font-family:inherit; -webkit-tap-highlight-color:transparent; touch-action:manipulation; min-height:50px; }
        button:active { transform:scale(0.96); opacity:0.9; }
        button.secondary { background:var(--surface2); color:var(--text); border:1.5px solid var(--border); }
        button.ghost { background:transparent; color:var(--primary); padding:8px; min-height:auto; }
        button.danger { background:var(--danger); } button.success { background:var(--success); }
        button.small { padding:10px 16px; font-size:0.85rem; min-height:40px; border-radius:var(--radius-sm); }
        button.full { width:100%; } button.icon-only { width:42px; height:42px; min-height:42px; padding:0; border-radius:50%; }
        .error-box { background:#fef2f2; border:1.5px solid var(--danger); border-radius:var(--radius); padding:14px; color:var(--danger); font-size:0.9rem; width:100%; }
        .info-box { background:var(--primary-soft); border:1.5px solid var(--primary); border-radius:var(--radius); padding:16px; color:var(--primary); font-size:0.9rem; width:100%; text-align:center; }
        .header { background:var(--surface); padding:12px 16px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:50; }
        .header-logo { display:flex; align-items:center; gap:8px; font-weight:700; font-size:1.2rem; color:var(--primary); }
        .content { flex:1; overflow-y:auto; padding:12px 12px 100px; -webkit-overflow-scrolling:touch; }
        .card { background:var(--surface); border-radius:var(--radius-lg); padding:16px; margin-bottom:10px; border:1px solid var(--border); box-shadow:var(--shadow-sm); }
        .post-header { display:flex; align-items:center; gap:10px; margin-bottom:10px; cursor:pointer; }
        .post-avatar { width:42px; height:42px; border-radius:50%; background:linear-gradient(135deg,#6366f1,#8b5cf6); display:flex; align-items:center; justify-content:center; font-size:1rem; color:#fff; flex-shrink:0; font-weight:600; overflow:hidden; }
        .post-avatar img { width:100%; height:100%; object-fit:cover; }
        .post-actions { display:flex; gap:24px; margin-top:12px; color:var(--text-secondary); font-size:0.9rem; }
        .post-actions span { cursor:pointer; display:flex; align-items:center; gap:5px; padding:4px 8px; border-radius:20px; }
        .post-actions span:active { background:var(--primary-soft); color:var(--primary); }
        .comment-box { margin-top:12px; padding-top:12px; border-top:1px solid var(--border); }
        .comment { display:flex; gap:8px; margin-bottom:8px; font-size:0.9rem; align-items:flex-start; }
        .comment-avatar { width:28px; height:28px; border-radius:50%; background:linear-gradient(135deg,#a5b4fc,#c4b5fd); display:flex; align-items:center; justify-content:center; font-size:0.65rem; color:#fff; flex-shrink:0; font-weight:600; overflow:hidden; }
        .comment-avatar img { width:100%; height:100%; object-fit:cover; }
        .comment-input-row { display:flex; gap:8px; margin-top:8px; }
        .comment-input-row input { flex:1; padding:10px 14px; border-radius:24px; }
        .chat-container { display:flex; flex-direction:column; height:70vh; background:var(--surface); border-radius:var(--radius-lg); overflow:hidden; border:1px solid var(--border); }
        .chat-list { max-height:35%; overflow-y:auto; border-bottom:1px solid var(--border); }
        .chat-list-item { padding:14px 16px; cursor:pointer; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; font-weight:500; }
        .chat-list-item:active { background:var(--primary-soft); }
        .chat-list-item.active { background:var(--primary-soft); border-left:3px solid var(--primary); }
        .chat-messages { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:8px; background:var(--surface2); }
        .msg { padding:10px 16px; border-radius:20px; max-width:78%; word-break:break-word; font-size:0.9rem; line-height:1.4; animation:msgIn 0.2s ease; }
        @keyframes msgIn { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
        .msg.sent { background:var(--primary); color:#fff; align-self:flex-end; border-bottom-right-radius:6px; }
        .msg.received { background:var(--surface); align-self:flex-start; border-bottom-left-radius:6px; box-shadow:var(--shadow-sm); }
        .chat-input-row { display:flex; gap:6px; padding:10px 12px; border-top:1px solid var(--border); background:var(--surface); align-items:center; }
        .chat-input-row input { flex:1; padding:10px 16px; border-radius:24px; border:1.5px solid var(--border); background:var(--surface2); }
        .emoji-picker { position:absolute; bottom:70px; right:12px; background:var(--surface); border-radius:var(--radius-lg); box-shadow:var(--shadow-lg); padding:12px; display:grid; grid-template-columns:repeat(6,1fr); gap:4px; z-index:100; max-width:300px; border:1px solid var(--border); }
        .emoji-picker span { font-size:1.5rem; cursor:pointer; padding:6px; text-align:center; border-radius:8px; }
        .emoji-picker span:active { background:var(--primary-soft); transform:scale(1.2); }
        .bottom-nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; background:var(--surface); border-top:1px solid var(--border); display:flex; justify-content:space-around; padding:6px 4px max(10px,env(safe-area-inset-bottom)); z-index:100; }
        .nav-item { display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; color:var(--text-tertiary); font-size:0.65rem; font-weight:500; padding:10px 14px; border-radius:12px; transition:0.15s; touch-action:manipulation; -webkit-tap-highlight-color:transparent; border:none; background:none; font-family:inherit; }
        .nav-item i { font-size:1.4rem; pointer-events:none; }
        .nav-item.active { color:var(--primary); }
        .badge-crown { color:#f59e0b; } .badge-verify { color:#6366f1; }
        .badge { display:inline-block; padding:3px 10px; border-radius:12px; font-size:0.7rem; font-weight:600; }
        .badge-pending { background:#fef3c7; color:#92400e; } .badge-approved { background:#d1fae5; color:#065f46; } .badge-rejected { background:#fee2e2; color:#991b1b; }
        .toast { position:fixed; bottom:120px; left:50%; transform:translateX(-50%); background:#1a1a1a; color:#fff; padding:12px 24px; border-radius:24px; font-size:0.85rem; font-weight:500; z-index:300; display:none; box-shadow:var(--shadow-lg); }
        .dark .toast { background:#f1f1f1; color:#1a1a1a; }
        .link-text { color:var(--primary); cursor:pointer; font-weight:600; }
        .user-row { display:flex; align-items:center; gap:12px; justify-content:space-between; }
        .settings-item { display:flex; align-items:center; justify-content:space-between; padding:16px; cursor:pointer; }
        .settings-item:active { background:var(--primary-soft); border-radius:var(--radius-sm); }
        .toggle-switch { width:48px; height:28px; background:var(--border); border-radius:14px; position:relative; cursor:pointer; transition:0.2s; flex-shrink:0; }
        .toggle-switch.active { background:var(--primary); }
        .toggle-switch::after { content:''; position:absolute; top:3px; left:3px; width:22px; height:22px; background:#fff; border-radius:50%; transition:0.2s; box-shadow:var(--shadow-sm); }
        .toggle-switch.active::after { left:23px; }
        .profile-banner { width:100%; height:140px; object-fit:cover; border-radius:var(--radius-lg) var(--radius-lg) 0 0; background:linear-gradient(135deg,#6366f1,#8b5cf6,#a5b4fc); cursor:pointer; }
        .profile-avatar-lg { width:84px; height:84px; border-radius:50%; border:4px solid var(--surface); object-fit:cover; margin-top:-42px; position:relative; z-index:2; background:linear-gradient(135deg,#6366f1,#8b5cf6); display:flex; align-items:center; justify-content:center; font-size:1.8rem; color:#fff; font-weight:700; overflow:hidden; }
        .profile-avatar-lg img { width:100%; height:100%; object-fit:cover; }
        .profile-avatar-edit { position:absolute; bottom:0; right:-5px; background:var(--primary); color:#fff; width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.75rem; cursor:pointer; border:3px solid var(--surface); z-index:3; }
    </style>
</head>
<body>
    <div class="app" id="app"></div>
    <div class="toast" id="toast"></div>

    <script>
        const SUPABASE_URL = 'https://byniblcezicrvyyqbafc.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_exBhK1ZwxY3uSoErm0jVFA_gR97KaAy';
        const OWNER_EMAIL = 'ilyabelyev344@gmail.com';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null, currentPage = 'feed', currentChatId = null, chatTimer = null;
        let theme = localStorage.getItem('godmode_theme') || 'light';
        let mediaRecorder = null, audioChunks = [], isRecording = false;
        if (theme === 'dark') document.body.classList.add('dark');

        function toast(m) { const t=document.getElementById('toast'); t.textContent=m; t.style.display='block'; t.style.animation='none'; t.offsetHeight; t.style.animation='toastIn 0.3s ease'; clearTimeout(t._t); t._t=setTimeout(()=>t.style.display='none',2000); }
        function timeAgo(d) { const s=Math.floor((Date.now()-new Date(d))/1000); if(s<60) return 'сейчас'; if(s<3600) return Math.floor(s/60)+' мин'; if(s<86400) return Math.floor(s/3600)+' ч'; return new Date(d).toLocaleDateString('ru-RU'); }
        function stopChatTimer() { if(chatTimer){clearInterval(chatTimer); chatTimer=null;} }
        function getInitials(n) { return (n||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }
        function avHtml(u) { if(u?.avatar_url) return `<img src="${u.avatar_url}" alt="">`; return getInitials(u?.full_name||'?'); }
        function randAvatar() { return 'https://i.pravatar.cc/150?img='+Math.floor(Math.random()*70); }

        // ==================== АВТОРИЗАЦИЯ ====================
        function renderLogin(err) {
            let h = '<div class="screen-center"><div class="logo-icon">💠</div><div class="logo-text">Godmode</div>';
            if (err) h += `<div class="error-box">${err}</div>`;
            h += `<input id="loginEmail" type="email" placeholder="Email" value="${OWNER_EMAIL}"><input id="loginPass" type="password" placeholder="Пароль" value="Assasin2)"><button class="full" id="btnLogin">Войти</button><p style="color:var(--text-secondary);">Нет аккаунта? <span class="link-text" id="linkRegister">Регистрация</span></p></div>`;
            document.getElementById('app').innerHTML = h;
            document.getElementById('btnLogin').onclick = doLogin;
            document.getElementById('linkRegister').onclick = () => renderRegister();
        }

        function renderRegister(err) {
            let h = '<div class="screen-center"><div class="logo-icon">💠</div><div class="logo-text">Godmode</div>';
            if (err) h += `<div class="error-box">${err}</div>`;
            h += '<input id="regName" placeholder="Полное имя"><input id="regUser" placeholder="Юзернейм"><input id="regEmail" type="email" placeholder="Email"><input id="regPass" type="password" placeholder="Пароль (мин 6)"><button class="full" id="btnRegister">Зарегистрироваться</button><p style="color:var(--text-secondary);">Уже есть аккаунт? <span class="link-text" id="linkLogin">Войти</span></p></div>';
            document.getElementById('app').innerHTML = h;
            document.getElementById('btnRegister').onclick = doRegister;
            document.getElementById('linkLogin').onclick = () => renderLogin();
        }

        async function doLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPass').value;
            if (!email || !pass) return renderLogin('Заполните все поля');
            const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
            if (error) return renderLogin(error.message);
            currentUser = data.user;
            await loadProfile();
            showMainApp();
        }

        async function doRegister() {
            const name = document.getElementById('regName').value.trim();
            const username = document.getElementById('regUser').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const pass = document.getElementById('regPass').value;
            if (!name || !username || !email || !pass) return renderRegister('Заполните все поля');
            if (pass.length < 6) return renderRegister('Пароль минимум 6 символов');
            const { data, error } = await sb.auth.signUp({ email, password: pass });
            if (error) { if (error.message.includes('already')) return renderLogin('Уже зарегистрирован. Войдите.'); return renderRegister(error.message); }
            const isOwner = (email === OWNER_EMAIL);
            const avatar = randAvatar();
            await sb.from('users').insert({ id: data.user.id, email, username, full_name: name, is_owner: isOwner, verified: isOwner, avatar_url: avatar, banner_url: 'https://picsum.photos/480/160?random='+Date.now() });
            await sb.from('user_settings').insert({ user_id: data.user.id });
            currentUser = data.user;
            currentUser.profile = { id: data.user.id, email, username, full_name: name, is_owner: isOwner, verified: isOwner, avatar_url: avatar, banner_url: '', bio: '' };
            showMainApp();
        }

        async function loadProfile() { const { data } = await sb.from('users').select('*').eq('id', currentUser.id).single(); if (data) currentUser.profile = data; }

        // ==================== ГЛАВНЫЙ ЭКРАН ====================
        function showMainApp() {
            stopChatTimer();
            let h = '<div class="header"><div class="header-logo">💠 Godmode</div>';
            if (currentUser.profile?.is_owner) h += '<i class="fas fa-crown badge-crown" style="font-size:1.1rem;"></i>';
            h += '</div><div class="content" id="mainContent"></div><div class="bottom-nav" id="bottomNav">';
            h += '<button class="nav-item active" data-page="feed"><i class="fas fa-house"></i>Лента</button>';
            h += '<button class="nav-item" data-page="friends"><i class="fas fa-users"></i>Друзья</button>';
            h += '<button class="nav-item" data-page="chats"><i class="fas fa-message"></i>Чаты</button>';
            h += '<button class="nav-item" data-page="profile"><i class="fas fa-circle-user"></i>Профиль</button>';
            h += '<button class="nav-item" data-page="settings"><i class="fas fa-grid-2"></i>Ещё</button>';
            h += '</div>';
            document.getElementById('app').innerHTML = h;

            // Кнопки навигации через event delegation
            document.getElementById('bottomNav').addEventListener('click', function(e) {
                const btn = e.target.closest('.nav-item');
                if (!btn) return;
                nav(btn.dataset.page);
            });

            nav('feed');
        }

        function nav(page) {
            stopChatTimer(); currentPage = page; currentChatId = null;
            document.querySelectorAll('#bottomNav .nav-item').forEach(n => n.classList.remove('active'));
            const t = document.querySelector(`#bottomNav .nav-item[data-page="${page}"]`);
            if (t) t.classList.add('active');
            switch (page) {
                case 'feed': loadFeed(); break;
                case 'profile': loadProfilePage(); break;
                case 'friends': loadFriends(); break;
                case 'chats': loadChats(); break;
                case 'settings': loadSettings(); break;
                case 'editProfile': loadEditProfile(); break;
                case 'moderation': loadModeration(); break;
                case 'channels': loadChannels(); break;
                case 'music': loadMusic(); break;
                case 'verify': loadVerify(); break;
            }
        }

        // ==================== ЛЕНТА ====================
        async function loadFeed() {
            const { data: posts } = await sb.from('posts').select('*, users!posts_user_id_fkey(*)').order('created_at', { ascending: false }).limit(30);
            let h = `<div class="card"><textarea id="postText" placeholder="Что у вас нового?" rows="2" style="border:none;padding:4px 0;background:transparent;resize:none;width:100%;"></textarea><button class="full" id="btnCreatePost" style="margin-top:8px;"><i class="fas fa-paper-plane"></i> Опубликовать</button></div>`;
            if (posts && posts.length > 0) {
                posts.forEach(p => {
                    const u = p.users || {};
                    h += `<div class="card"><div class="post-header" data-uid="${p.user_id}"><div class="post-avatar">${avHtml(u)}</div><div style="flex:1;"><strong>${u.full_name||'?'}</strong>${u.is_owner?' <i class="fas fa-crown badge-crown"></i>':''}${u.verified?' <i class="fas fa-circle-check badge-verify"></i>':''}<div style="font-size:0.75rem;color:var(--text-tertiary);">${timeAgo(p.created_at)}</div></div>${p.user_id===currentUser.id?`<button class="ghost icon-only" data-del="${p.id}"><i class="fas fa-trash" style="color:var(--danger);"></i></button>`:''}</div><p style="white-space:pre-wrap;font-size:0.95rem;line-height:1.5;">${p.text||''}</p><div class="post-actions"><span data-like="${p.id}"><i class="far fa-heart"></i> ${p.likes_count||0}</span><span data-comm="${p.id}"><i class="far fa-message"></i> ${p.comments_count||0}</span><span data-repost="${p.id}"><i class="fas fa-arrow-right-arrow-left"></i> ${p.reposts_count||0}</span></div><div class="comment-box" id="comments-${p.id}" style="display:none;"><div id="cl-${p.id}"></div><div class="comment-input-row"><input id="ci-${p.id}" placeholder="Комментарий..."><button class="ghost icon-only" data-addcomm="${p.id}"><i class="fas fa-paper-plane" style="color:var(--primary);"></i></button></div></div></div>`;
                });
            } else h += '<div class="card"><p style="text-align:center;color:var(--text-tertiary);">Нет постов. Будьте первым!</p></div>';
            document.getElementById('mainContent').innerHTML = h;

            const mc = document.getElementById('mainContent');
            mc.addEventListener('click', function(e) {
                const uid = e.target.closest('[data-uid]');
                const del = e.target.closest('[data-del]');
                const like = e.target.closest('[data-like]');
                const comm = e.target.closest('[data-comm]');
                const repost = e.target.closest('[data-repost]');
                const addcomm = e.target.closest('[data-addcomm]');

                if (uid) { e.stopPropagation(); viewUserProfile(uid.dataset.uid); return; }
                if (del) { e.stopPropagation(); deletePost(del.dataset.del); return; }
                if (like) { likePost(like.dataset.like); return; }
                if (comm) { toggleComments(comm.dataset.comm); return; }
                if (repost) { repostPost(repost.dataset.repost); return; }
                if (addcomm) { addComment(addcomm.dataset.addcomm); return; }
            });

            const btnCreate = document.getElementById('btnCreatePost');
            if (btnCreate) btnCreate.onclick = createPost;
        }

        async function createPost() { const t=document.getElementById('postText')?.value.trim(); if(!t) return toast('Напишите текст'); await sb.from('posts').insert({user_id:currentUser.id,text:t}); toast('✅ Опубликовано!'); loadFeed(); }
        async function deletePost(id) { if(!confirm('Удалить пост?')) return; await sb.from('posts').delete().eq('id',id); toast('Удалён'); loadFeed(); }
        async function likePost(id) { const {data:ex}=await sb.from('likes').select('*').eq('user_id',currentUser.id).eq('post_id',id).single(); if(ex){await sb.from('likes').delete().eq('user_id',currentUser.id).eq('post_id',id); await sb.rpc('decrement_likes',{post_id:id});} else {await sb.from('likes').insert({user_id:currentUser.id,post_id:id}); await sb.rpc('increment_likes',{post_id:id});} loadFeed(); }
        async function repostPost(id) { const {data:o}=await sb.from('posts').select('*').eq('id',id).single(); if(!o) return; await sb.from('posts').insert({user_id:currentUser.id,text:o.text,reposted_from:id}); await sb.rpc('increment_reposts',{post_id:id}); toast('🔄 Репост!'); loadFeed(); }
        async function toggleComments(pid) { const el=document.getElementById('comments-'+pid); if(!el) return; if(el.style.display==='block'){el.style.display='none';return;} el.style.display='block'; const {data:c}=await sb.from('comments').select('*, users!comments_user_id_fkey(*)').eq('post_id',pid).order('created_at',{ascending:true}); document.getElementById('cl-'+pid).innerHTML=(c||[]).map(x=>`<div class="comment"><div class="comment-avatar">${avHtml(x.users)}</div><div><strong>${x.users?.full_name||'?'}</strong><br>${x.text}</div></div>`).join('')||'<p style="font-size:0.85rem;color:var(--text-tertiary);">Нет комментариев</p>'; }

        function changeAvatar() {

                const file = input.files[0]; if(!file) return;
                const reader = new FileReader();

                    await sb.from('users').update({ avatar_url: e.target.result }).eq('id', currentUser.id);
                    currentUser.profile.avatar_url = e.target.result;

                };
                reader.readAsDataURL(file);
            };

            if(error) return toast('Ошибка создания чата');

            nav('chats');

        function openChat(cid) {
            stopChatTimer(); currentChatId=cid;
            document.querySelectorAll('.chat-list-item').forEach(el=>el.classList.remove('active'));
            const ci = document.querySelector(`[data-cid="${cid}"]`);

            `;

        function toggleEmojiPicker() {
            let picker = document.getElementById('emojiPicker');
            if (picker) { picker.remove(); return; }
            const emojis = ['😀','😂','❤️','🔥','👍','😢','😡','🎉','💀','👀','🙏','💪','🤔','😎','🥳','🤯','😴','🤗','🫡','💩','👋','🫶','✨','🌟'];
            picker = document.createElement('div'); picker.id='emojiPicker'; picker.className='emoji-picker';
            picker.innerHTML = emojis.map(e => `<span>${e}</span>`).join('');
            document.getElementById('cinput').appendChild(picker);
            picker.addEventListener('click', function(e) {
                if (e.target.tagName === 'SPAN') {
                    document.getElementById('mi').value += e.target.textContent;
                    picker.remove();
                }
            });
            setTimeout(() => document.addEventListener('click', function close(e) { if (!picker.contains(e.target) && e.target.id!=='btnEmoji') { picker.remove(); document.removeEventListener('click', close); } }), 0);

        function sendMedia() {
            const input = document.createElement('input'); input.type='file'; input.accept='image/*,video/*';
            input.onchange = async function() {
                const file = input.files[0]; if(!file) return;
                await sb.from('messages').insert({ chat_id: currentChatId, from_user_id: currentUser.id, text: `📎 ${file.name}` });
                refreshMessages(currentChatId);
            };
            input.click();
        }

        function toggleVoiceRecord() {
            if (isRecording) { stopVoiceRecord(); return; }
            if (!navigator.mediaDevices) return toast('Микрофон не поддерживается');
            navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                mediaRecorder = new MediaRecorder(stream); audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    await sb.from('messages').insert({ chat_id: currentChatId, from_user_id: currentUser.id, text: '🎤 Голосовое сообщение' });
                    refreshMessages(currentChatId);
                    stream.getTracks().forEach(t => t.stop());
                };
                mediaRecorder.start(); isRecording = true;
                document.getElementById('btnVoice').innerHTML = '<i class="fas fa-stop" style="color:var(--danger);"></i>';
                toast('🔴 Запись...');
            }).catch(() => toast('Нет доступа к микрофону'));
        }

        function stopVoiceRecord() {
            if (mediaRecorder && isRecording) { mediaRecorder.stop(); isRecording = false;
                document.getElementById('btnVoice').innerHTML = '<i class="fas fa-microphone" style="color:var(--text-secondary);"></i>';
                toast('✅ Голосовое отправлено!'); }
        }

            c.scrollTop=c.scrollHeight;
        }

        async function sendMessage() {

            document.getElementById('emojiPicker')?.remove();

        function loadVerify() {
            const p=currentUser.profile||{};
            document.getElementById('mainContent').innerHTML=`<div class="card"><h2>✅ Верификация</h2>${p.is_owner?'<p class="badge-crown"><i class="fas fa-crown"></i> Вы владелец</p>':p.verified?'<p class="badge-verify"><i class="fas fa-circle-check"></i> Верифицирован</p>':'<textarea id="vr" rows="3" placeholder="Почему вы?"></textarea><button class="full" id="brq" style="margin-top:8px;"><i class="fas fa-paper-plane"></i> Отправить</button>'}<button class="secondary full" onclick="nav(\'settings\')" style="margin-top:8px;">← Назад</button></div>`;
            const brq = document.getElementById('brq');
            if (brq) brq.onclick = async () => {
                const r=document.getElementById('vr')?.value.trim();
                if(r){await sb.from('verification_requests').insert({user_id:currentUser.id,reason:r,status:'pending'}); toast('✅ Заявка отправлена!'); nav('settings');}
            };
        }

        async function doLogout() { stopChatTimer(); await sb.auth.signOut(); currentUser=null; renderLogin(); }

        (async () => {
            const { data } = await sb.auth.getSession();
            if (data.session) { currentUser=data.session.user; await loadProfile(); showMainApp(); }
            else renderLogin();
        })();
    </script>
</body>
</html>
